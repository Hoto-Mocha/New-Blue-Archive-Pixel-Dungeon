actors.hero.shops.buydropmulti.desc=아이템 드랍률을 +%1$s%% 증가시킵니다. 최대 +%2$s%%\n현재 아이템 드랍률 배율: %3$s%%_+%4$s%%_

actors.hero.shops.buysearchchance.name=자동 탐색 확률 증가
actors.hero.shops.buysearchchance.short_desc=자동 탐색 확률 +%s%%
actors.hero.shops.buysearchchance.desc=숨겨진 것을 눈치챌 확률을 +%1$s%% 증가시킵니다. 최대 +%2$s%%\n현재 자동 탐색 확률 보너스: _+%3$s%%_

actors.hero.shops.paytowin.name=Pay to Win
actors.hero.shops.paytowin.short_desc=다음 공격의 치명타 확률 100%, 치명타 피해 +20%
actors.hero.shops.paytowin.desc=확정 치명타 타수를 1회 늘리고, 다음 치명타의 치명타 피해를 +20% 늘립니다. 이 효과는 중첩되지 않습니다.

actors.hero.shops.questtracker.name=위치 추적
actors.hero.shops.questtracker.short_desc=퀘스트 대상 적의 위치 파악
actors.hero.shops.questtracker.desc=현재 층에 있는 퀘스트 대상 적들의 위치를 10턴 동안 드러냅니다.
actors.hero.shops.questtracker.no_quest=퀘스트 대상 적이 없는 것 같다.

actors.hero.shops.buycontinueconsole.name=이어하기 콘솔
actors.hero.shops.buycontinueconsole.short_desc=이어하기 콘솔 구매
actors.hero.shops.buycontinueconsole.desc=플레이 중이던 게임을 그대로 이어하게 해 주는 _이어하기 콘솔_을 한 개 얻습니다.

actors.hero.shops.buyfighterconsole.name=파이터 콘솔
actors.hero.shops.buyfighterconsole.short_desc=파이터 콘솔 구매
actors.hero.shops.buyfighterconsole.desc=파이터 콘솔 토큰을 10개 얻고 파이터 게임용 조작 화면을 여는 _파이터 콘솔_을 한 개 얻습니다.

actors.hero.shops.buyfantasyconsole.name=판타지 콘솔
actors.hero.shops.buyfantasyconsole.short_desc=판타지 콘솔 구매
actors.hero.shops.buyfantasyconsole.desc=판타지 콘솔 토큰을 10개 얻고 판타지 게임용 조작 화면을 여는 _판타지 콘솔_을 한 개 얻습니다.

actors.hero.shops.buysandboxconsole.name=샌드박스 콘솔
actors.hero.shops.buysandboxconsole.short_desc=샌드박스 콘솔 구매
actors.hero.shops.buysandboxconsole.desc=샌드박스 콘솔 토큰을 10개 얻고 샌드박스 게임용 조작 화면을 여는 _샌드박스 콘솔_을 한 개 얻습니다.

actors.hero.shops.invulnerable.name=방어막 활성화
actors.hero.shops.invulnerable.short_desc=대량의 방어막을 얻음
actors.hero.shops.invulnerable.desc=_%d_의 방어막을 즉시 얻습니다. VIP 멤버십 능력 사용 한 번당 한 번만 구매할 수 있습니다.

actors.hero.shops.infiniteammo.name=무한 탄창
actors.hero.shops.infiniteammo.short_desc=잠시 동안 탄환을 소모하지 않음
actors.hero.shops.infiniteammo.desc=_%d_턴의 무한 탄창을 즉시 얻습니다. 여러 번 구매 시 지속 시간이 중첩되지 않고, 갱신됩니다.
actors.hero.shops.infiniteammo$infiniteammobuff.name=무한 탄창
actors.hero.shops.infiniteammo$infiniteammobuff.desc=잠시 동안 탄환을 소모하지 않고 총을 발사할 수 있게 되었습니다!\n\n남은 턴: _%s_.

actors.hero.shops.creditduplicate.name=크레딧 환산
actors.hero.shops.creditduplicate.short_desc=VIP 멤버십을 크레딧으로 환산
actors.hero.shops.creditduplicate.desc=VIP 멤버십을 즉시 만료시키고 _%d_의 크레딧을 얻습니다.

###Yuzu Console Contents
actors.hero.console.yuzuconsolecontent.prompt=위치를 선택하세요

actors.hero.console.fighter.fighterconsolecontent$fighterconsolebuff.name=파이터 콘솔
actors.hero.console.fighter.fighterconsolecontent$fighterconsolebuff.desc=파이터 콘솔 토큰이 현재 _%d_만큼 남아 있습니다.\n\n게임용 콘솔을 사용해 새로운 콘솔을 사용하거나, _이어하기 콘솔_을 사용해 토큰을 유지한 채로 파이터 콘솔을 다시 사용할 수 있습니다.

actors.hero.console.fantasy.fantasyconsolecontent$fantasyconsolebuff.name=판타지 콘솔
actors.hero.console.fantasy.fantasyconsolecontent$fantasyconsolebuff.desc=판타지 콘솔 토큰이 현재 _%d_만큼 남아 있습니다.\n\n게임용 콘솔을 사용해 새로운 콘솔을 사용하거나, _이어하기 콘솔_을 사용해 토큰을 유지한 채로 판타지 콘솔을 다시 사용할 수 있습니다.

actors.hero.console.sandbox.sandboxconsolecontent$sandboxconsolebuff.name=샌드박스 콘솔
actors.hero.console.sandbox.sandboxconsolecontent$sandboxconsolebuff.desc=샌드박스 콘솔 토큰이 현재 _%d_만큼 남아 있습니다.\n\n게임용 콘솔을 사용해 새로운 콘솔을 사용하거나, _이어하기 콘솔_을 사용해 토큰을 유지한 채로 샌드박스 콘솔을 다시 사용할 수 있습니다.

actors.hero.console.yuzuconsolecontent.token_cost=사용 토큰: _%d_

actors.hero.console.fighter.moveup.name=위
actors.hero.console.fighter.moveup.desc=위쪽 방향으로 1타일 이동합니다. 이동에 소모하는 턴의 _33%_만큼 턴을 소모합니다.
actors.hero.console.fighter.moveup.desc_enhanced=위쪽 방향으로 1타일 이동합니다. _턴을 소모하지 않습니다._

actors.hero.console.fighter.movedown.name=아래
actors.hero.console.fighter.movedown.desc=아래쪽 방향으로 1타일 이동합니다. 이동에 소모하는 턴의 _33%_만큼 턴을 소모합니다.
actors.hero.console.fighter.movedown.desc_enhanced=아래쪽 방향으로 1타일 이동합니다. _턴을 소모하지 않습니다._

actors.hero.console.fighter.moveleft.name=왼쪽
actors.hero.console.fighter.moveleft.desc=왼쪽 방향으로 1타일 이동합니다. 이동에 소모하는 턴의 _33%_만큼 턴을 소모합니다.
actors.hero.console.fighter.moveleft.desc_enhanced=왼쪽 방향으로 1타일 이동합니다. _턴을 소모하지 않습니다._

actors.hero.console.fighter.moveright.name=오른쪽
actors.hero.console.fighter.moveright.desc=오른쪽 방향으로 1타일 이동합니다. 이동에 소모하는 턴의 _33%_만큼 턴을 소모합니다.
actors.hero.console.fighter.moveright.desc_enhanced=오른쪽 방향으로 1타일 이동합니다. _턴을 소모하지 않습니다._

actors.hero.console.fighter.charge.name=기 모으기
actors.hero.console.fighter.charge.desc=1턴을 소모하고 다음에 누를 버튼을 _강화합니다._
actors.hero.console.fighter.charge.desc_enhanced=1턴을 소모하고 다음에 누를 버튼을 _강화하고, 추가로 1토큰을 얻습니다._

actors.hero.console.fighter.weakattack.name=약공격
actors.hero.console.fighter.weakattack.desc=가까이 있는 무작위 적 하나에게 0.5턴을 소모해 _50%_의 피해를 입힙니다. 다음 공격 버튼을 강화합니다.
actors.hero.console.fighter.weakattack.desc_enhanced=가까이 있는 무작위 적 하나에게 0.5턴을 소모해 _100%_의 피해를 입힙니다. 다음 공격 버튼을 강화합니다.

actors.hero.console.fighter.strongattack.name=강공격
actors.hero.console.fighter.strongattack.desc=가까이 있는 적 하나에게 1턴을 소모해 _150%의 피해를 입힙니다._
actors.hero.console.fighter.strongattack.desc_enhanced=가까이 있는 적 하나에게 1턴을 소모해 _150%의 피해를 입히고 3타일 뒤로 날려보냅니다._

actors.hero.console.fantasy.fireball.name=파이어볼
actors.hero.console.fantasy.fireball.desc=지정한 위치로 파이어볼을 날려 _1타일 반경 범위_에 100%의 불 피해를 입히고 불을 붙입니다.
actors.hero.console.fantasy.fireball.desc_enhanced=지정한 위치로 파이어볼을 날려 _3타일 반경 범위_에 100%의 불 피해를 입히고 불을 붙입니다.

actors.hero.console.fantasy.hydropump.name=하이드로펌프
actors.hero.console.fantasy.hydropump.desc=시야 내의 지정한 위치에 물을 폭발시켜 그 위치에 있는 적에게 50%의 물 피해를 입히고 근처의 적들을 밀어내며 물을 흩뿌립니다.\n비어 있는 우물에 쓴다면...
actors.hero.console.fantasy.hydropump.desc_enhanced=시야 내의 지정한 위치에 물을 폭발시켜 그 위치에 있는 적에게 50%의 물 피해를 입히고 근처의 적들을 밀어내며 물을 흩뿌립니다.\n비어 있는 우물에 쓴다면...

actors.hero.console.fantasy.thunder.name=썬더볼트
actors.hero.console.fantasy.thunder.desc=적이 있는 위치에 낙뢰를 발생시켜 40%의 전기 피해를 입히고 주변의 적에게 16%의 피해를 주는 연쇄 번개를 _3번_ 발생시킵니다.\n대상이 물 타일 위에 있을 경우 연쇄 번개가 전달되는 최대 거리가 2타일로 증가합니다.
actors.hero.console.fantasy.thunder.desc_enhanced=적이 있는 위치에 낙뢰를 발생시켜 40%의 전기 피해를 입히고 주변의 적에게 16%의 피해를 주는 연쇄 번개를 _5번_ 발생시킵니다.\n대상이 물 타일 위에 있을 경우 연쇄 번개가 전달되는 최대 거리가 2타일로 증가합니다.

actors.hero.console.fantasy.icelance.name=아이스 랜스
actors.hero.console.fantasy.icelance.desc=지정한 위치에 얼음 창을 날려 _200%_의 얼음 피해를 입히고 적을 얼립니다.
actors.hero.console.fantasy.icelance.desc_enhanced=지정한 위치에 얼음 창을 날려 _400%_의 얼음 피해를 입히고 적을 얼립니다.

actors.hero.console.fantasy.blackhole.name=블랙홀
actors.hero.console.fantasy.blackhole.desc=지정한 위치 반경 3타일 범위에 있는 모든 대상을 1턴 뒤에 다음 층으로 떨어뜨립니다. _자신도 떨어질 수 있습니다.\n보스 층에서는 사용할 수 없습니다.
actors.hero.console.fantasy.blackhole.desc_enhanced=지정한 위치 반경 3타일 범위에 있는 모든 대상을 1턴 뒤에 다음 층으로 떨어뜨립니다. _시전 시 2턴의 부유를 얻습니다._\n보스 층에서는 사용할 수 없습니다.

actors.hero.console.sandbox.farming.name=농사 짓기
actors.hero.console.sandbox.farming.desc=빈 타일을 물 타일로, 물 타일을 길게 자란 풀 타일로 바꿉니다.

actors.hero.console.sandbox.barricadebuild.name=장애물 건설
actors.hero.console.sandbox.barricadebuild.desc=빈 타일에는 석상을 건설하고, 문에는 바리케이드를 건설합니다.

actors.hero.console.sandbox.bridgebuild.name=다리 건설
actors.hero.console.sandbox.bridgebuild.desc=낭떠러지에 이동 가능한 타일을 건설합니다.

actors.hero.console.sandbox.walldig.name=벽 철거
actors.hero.console.sandbox.walldig.desc=단단한 타일을 파괴합니다.\n보스 층에서는 사용할 수 없습니다.

actors.hero.console.sandbox.welldig.name=우물 파기
actors.hero.console.sandbox.welldig.desc=빈 타일에 비어 있는 우물을 건설합니다. 어디에 쓰는 걸까요?

actors.buffs.chasemark.name=대상 추적
actors.buffs.chasemark.desc=앗, 주군! 지금 이즈나는 적을 추적하고 있습니다! 최근에 제가 투척 무기로 맞춘 적이 어디에 있는지 완벽하게 예측할 수 있어요!\n지금은 그 녀석에게 즉시 다가가서 공격할 수 있지만, 시간이 지나면 적을 따라갈 수 없게 돼요.\n\n다음 _%s턴_ 까지는 적을 곧바로 따라가서 공격할 수 있을 거예요.
actors.buffs.chasemark.action_name=쓱싹! 해 버리기
actors.buffs.chasemark.no_target=쓱싹! 할 대상이 없다.

actors.hero.talent$instantthrowtracker.name=허 찌르기
actors.hero.talent$instantthrowtracker.desc=이즈나가 빈틈을 발견했습니다! 잠시 동안 투척 공격에 턴을 소모하지 않습니다.

actors.hero.talent$instantthrowcooldown.name=재사용 대기 시간: 허 찌르기
actors.hero.talent$instantthrowcooldown.desc=당신은 최근에 이 특성을 사용하여, 다시 사용할 수 있을 때까지 기다려야 합니다.\n\n남은 턴: _%s._

actors.mobs.npcs.sandbag.name=샌드백
actors.mobs.npcs.sandbag.desc=아무리 세게 때려도 망가지지 않는 샌드백입니다. 공격하면 당신이 입힌 피해를 알 수 있습니다.
actors.mobs.npcs.sandbag.damage=이번 공격에 입힌 피해량: %s