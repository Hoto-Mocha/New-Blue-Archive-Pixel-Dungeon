actors.hero.hero.yuzu_health_warn_2=이, 이 정도는...
actors.hero.hero.yuzu_health_warn_3=조금 아프네요...

actors.hero.hero.yuzu_die=아... 안돼...!

actors.hero.hero.yuzu_enemy_defeated_1=다음 상대도 각오해주세요!
actors.hero.hero.yuzu_enemy_defeated_2=도움이 되어서 기쁘네요...
actors.hero.hero.yuzu_enemy_defeated_3=처, 처치 완료입니다...!
