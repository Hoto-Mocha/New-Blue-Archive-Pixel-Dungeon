###Aris sentences
actors.hero.heroclass.aris=아리스
actors.hero.heroclass.aris_desc_short=오늘은 어떤 모험을 떠나실 건가요? 아리스는 함께 떠날 준비가 되어 있습니다.\n\n난이도: _특별_
actors.hero.heroclass.aris_desc=아리스는 방어막을 생성하는 _밀레니엄 엠블럼_을 가지고 시작합니다. 아리스의 보물인 이 소중한 엠블럼은 교복들 간에 옮겨 붙일 수 있으며, 엠블럼에 붙은 _1만큼의 강화 수치_를 옮겨 가져갈 수 있습니다.\n\n아리스는 던전을 탐험하는 용사로서, 총기가 아닌 근접 무기를 사용합니다. 던전에서 총기가 아닌 _근접 무기_를 얻을 수 있습니다.\n\n아리스는 또한 _낡은 소검_, _세 개의 투척용 돌_, _빛의 검: 슈퍼노바_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n아리스는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.aris_unlock=아리스는 자동으로 해금됩니다.

actors.hero.herosubclass.light_hero=빛의 용사
actors.hero.herosubclass.light_hero_short_desc=빛의 용사의 사명을 짊어지게 된 아리스는 _빛의 검: 슈퍼노바를 근접 무기로서 휘두를 수 있게 됩니다_.
actors.hero.herosubclass.light_hero_desc=아리스는 빛의 용사의 사명을 받아, 빛의 검: 슈퍼노바를 근접 무기로서 휘두를 수 있게 됩니다.
actors.hero.herosubclass.battery_charge=배터리 충전입니다!
actors.hero.herosubclass.battery_charge_short_desc=아리스는 근접 공격을 명중시킬 때마다 슈퍼노바 충전을 쌓아, _다음 밸런스 붕괴 발사를 빠르게 준비하거나 피해를 강화시킬 수 있습니다_.
actors.hero.herosubclass.battery_charge_desc=아리스는 근접 공격을 명중시킬 때마다 슈퍼노바 충전 중첩을 1회 쌓습니다.\n\n중첩은 밸런스 붕괴 재사용 대기 시간 중에 소모하여 소모한 양만큼의 시간을 줄일 수 있으며, 중첩이 있는 상태에서 밸런스 붕괴 사용 시 가진 중첩 하나 당 +1%의 피해를 추가로 입힙니다.

actors.hero.hero.aris_cannot_self=끄앙! 이건 아리스에겐 발사할 수 없습니다!
actors.hero.hero.aris_supernova_1=빛이여!
actors.hero.hero.aris_supernova_2=이 빛에 의지를 담아...
actors.hero.hero.aris_supernova_3=아리스, 전력으로 갑니다!
actors.hero.hero.aris_supernova_shoot_1=에너지 오버로드... 릴리즈!
actors.hero.hero.aris_supernova_shoot_2=꿰뚫어라! 밸런스 붕괴!
actors.hero.hero.aris_supernova_shoot_3=밸런스 붕괴!!!
actors.hero.hero.aris_supernova_cooldown=스킬 충전 중입니다!
actors.hero.hero.aris_supernova_ready_1=빛의 검: 슈퍼노바가 준비되었습니다!
actors.hero.hero.aris_supernova_ready_2=궁극기 준비 완료. 지시를 기다립니다.
actors.hero.hero.aris_supernova_ready_3=스킬 충전 완료! 발사 준비되었습니다!

actors.hero.hero.aris_health_critical_1=치명적인 오작동 감지. 진단 중... HP 위험.
actors.hero.hero.aris_health_critical_2=치명적인 시스템 에러! 위험합니다!
actors.hero.hero.aris_health_critical_3=HP 회복 엘릭서가 필요합니다!

actors.hero.hero.aris_health_warn_1=아리스의 HP 회복이 필요합니다.
actors.hero.hero.aris_health_warn_2=휴식이 필요합니다.
actors.hero.hero.aris_health_warn_3=시스템 오작동 감지. HP가 부족합니다.

actors.hero.hero.aris_die=시스템... 정지...

actors.hero.hero.aris_enemy_defeated_1=용기, 그것은 최고의 마법입니다.
actors.hero.hero.aris_enemy_defeated_2=선생님, 지금 아리스는 이 세계 최강의 전사입니다.
actors.hero.hero.aris_enemy_defeated_3=경험치를 많이 얻었습니다!
actors.hero.hero.aris_enemy_defeated_4=용사 아리스은(는) 경험치를 얻었습니다!
actors.hero.hero.aris_enemy_defeated_5=용사여... 힘을 원하는가... 앗, 제가 용사였네요...

actors.hero.hero.aris_levelup_1=레벨 업. 경험치를 많이 획득했습니다.
actors.hero.hero.aris_levelup_2=한층 성장한 아리스입니다!
actors.hero.hero.aris_levelup_3=새로운 능력을 가질 준비가 되었습니다!
actors.hero.hero.aris_levelup_4=아리스.레벨++; ...앗, 이게 아닌가요.
actors.hero.hero.aris_levelup_5=뽜밤뽜밤! 용사 아리스의 레벨이 올랐습니다!
actors.hero.hero.aris_levelup_rare=신기하지 않나요, 숫자가 1 오른다고 신체 능력이 뿅 하고 증가한다는 게... 앗, 제 4의 벽이 무너지고 있습니다! 취소! 취소!

actors.hero.hero.aris_found_path=데이터 분석 중... 다음 층으로 가는 최적의 경로를 발견했습니다!
actors.hero.hero.aris_cant_find_path=연산 실패. 다음 층으로 가는 경로를 발견하지 못했습니다.
actors.hero.hero.aris_no_cooldown=앗, 지금은 슈퍼노바가 이미 준비되어 있습니다. 언제든지 사용 가능합니다!
actors.hero.hero.aris_battery_change=배터리를 교체합니다!
actors.hero.hero.aris_extendedlaser_activate=확장 부품 활성화 확인. 강화 파츠를 장착합니다.
actors.hero.hero.aris_division_activate=왕녀의 부름을 명 받았습니다. 전투 보조를 시작합니다.
actors.hero.hero.aris_division_detach=다시 용사가 된 아리스입니다!

actors.buffs.supernovacharge.name=배터리 충전: 슈퍼노바
actors.buffs.supernovacharge.desc=확장 배터리 충전 중입니다! 충전에 사용할 수도 있지만, 다음 발사 때 더 큰 출력을 낼 수 있게 해 줍니다.\n\n현재 추가 피해량: _%s%%_.
actors.buffs.supernovacharge.action_name=배터리 충전!

actors.hero.talent.aris_t1_1.title=모험의 시작
actors.hero.talent.aris_t1_1.desc=_+1:_ 근접 공격력이 _+1_ 증가합니다.\n\n_+2:_ 근접 공격력이 _+2_ 증가합니다.
actors.hero.talent.aris_t1_2.title=스캔
actors.hero.talent.aris_t1_2.desc=_+1:_ 근접 무기와 교복의 감정 속도가 _x2.5배_ 증가합니다.\n\n_+2:_ 근접 무기와 교복을 장착 시 즉시 감정합니다.
actors.hero.talent.aris_t1_3.title=호기심
actors.hero.talent.aris_t1_3.desc=_+1:_ 물약 또는 주문서를 감정하면 _5_의 경험치를 얻습니다.\n\n_+2:_ 물약 또는 주문서를 감정하면 _8_의 경험치를 얻습니다.
actors.hero.talent.aris_t1_4.title=견고한 방어
actors.hero.talent.aris_t1_4.desc=_+1:_ 아리스의 엠블럼이 제공하는 방어막의 최대치가 _1_ 증가합니다.\n\n_+2:_ 아리스의 엠블럼이 제공하는 방어막의 최대치가 _2_ 증가합니다.

actors.hero.talent.aris_t2_1.title=든든합니다!
actors.hero.talent.aris_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 중 받는 피해를 _75%_ 경감합니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 중 받는 피해를 _100%_ 경감합니다.
actors.hero.talent.aris_t2_2.title=빛이여!
actors.hero.talent.aris_t2_2.desc=_+1:_ 적을 처음 공격하면 _2턴_의 실명을 부여합니다.\n\n_+2:_ 적을 처음 공격하면 _3턴_의 실명을 부여합니다.
actors.hero.talent.aris_t2_3.title=메모리 활성화
actors.hero.talent.aris_t2_3.desc=_+1:_ 아리스의 엠블럼이 강화 수치를 옮길 때와 같은 방식으로 _상형문자를 옮길 수 있게 됩니다._\n\n_+2:_ +1의 효과에 더불어, _방어구 강화 시 부여된 상형문자를 없애지 않습니다._
actors.hero.talent.aris_t2_4.title=치트 커맨드
actors.hero.talent.aris_t2_4.desc=_+1:_ 밸런스 붕괴의 최소 피해량이 _5%_ 확률로 적의 현재 HP가 됩니다.\n\n_+2:_ 밸런스 붕괴의 최소 피해량이 _10%_ 확률로 적의 현재 HP가 됩니다.
actors.hero.talent.aris_t2_5.title=밸런스 조정
actors.hero.talent.aris_t2_5.desc=_+1:_ 밸런스 붕괴의 재사용 대기 시간이 _20%_ 감소합니다.\n\n_+2:_ 밸런스 붕괴의 재사용 대기 시간이 _30%_ 감소합니다.

actors.hero.talent.aris_t3_1.title=로봇 청소기
actors.hero.talent.aris_t3_1.desc=_+1:_ 이동 속도가 _+5%_ 증가합니다.\n\n_+2:_ 이동 속도가 _+10%_ 증가합니다.\n\n_+3:_ 이동 속도가 _+15%_ 증가합니다.
actors.hero.talent.aris_t3_2.title=스토리 스킵
actors.hero.talent.aris_t3_2.desc=_+1:_ 층에 처음 진입 시 다음 층으로 가는 최단 경로가 _33%_ 확률로 드러납니다.\n\n_+2:_ 층에 처음 진입 시 다음 층으로 가는 최단 경로가 _67%_ 확률로 드러납니다.\n\n_+3:_ 층에 처음 진입 시 다음 층으로 가는 최단 경로가 _100%_ 확률로 드러납니다.

actors.hero.talent.aris_ex1_1.title=메인 딜러
actors.hero.talent.aris_ex1_1.desc=_+1:_ 밸런스 붕괴의 준비가 완료되면 빛의 검: 슈퍼노바의 강화 수치가 _+1_ 증가합니다.\n\n_+2:_ 밸런스 붕괴의 준비가 완료되면 빛의 검: 슈퍼노바의 강화 수치가 _+2_ 증가합니다.\n\n_+3:_ 밸런스 붕괴의 준비가 완료되면 빛의 검: 슈퍼노바의 강화 수치가 _+3_ 증가합니다.
actors.hero.talent.aris_ex1_2.title=방어 준비 완료
actors.hero.talent.aris_ex1_2.desc=_+1:_ 밸런스 붕괴가 충전 중일 때 방어력이 _+1-4_ 증가합니다.\n\n_+2:_ 밸런스 붕괴가 충전 중일 때 방어력이 _+2-8_ 증가합니다.\n\n_+3:_ 밸런스 붕괴가 충전 중일 때 방어력이 _+3-12_ 증가합니다.
actors.hero.talent.aris_ex1_3.title=슈퍼노바, 각성입니다!
actors.hero.talent.aris_ex1_3.desc=_+1:_ 빛의 검: 슈퍼노바로 근접 공격을 명중시킬 때 밸런스 붕괴의 재사용 대기 시간을 _1턴_씩 감소시킵니다.\n\n_+2:_ 빛의 검: 슈퍼노바로 근접 공격을 명중시킬 때 밸런스 붕괴의 재사용 대기 시간을 _2턴_씩 감소시킵니다.\n\n_+3:_ 빛의 검: 슈퍼노바로 근접 공격을 명중시킬 때 밸런스 붕괴의 재사용 대기 시간을 _3턴_씩 감소시킵니다.

actors.hero.talent.aris_ex2_1.title=밸런스가 이상합니다...
actors.hero.talent.aris_ex2_1.desc=_+1:_ 근접 공격 시 쌓는 배터리 충전 중첩이 _-1~+2_가 됩니다.\n\n_+2:_ 근접 공격 시 쌓는 배터리 충전 중첩이 _+0~+2_가 됩니다.\n\n_+3:_ 근접 공격 시 쌓는 배터리 충전 중첩이 _+1~+3_이 됩니다.
actors.hero.talent.aris_ex2_2.title=히든 트리거
actors.hero.talent.aris_ex2_2.desc=_+1:_ 공격을 받으면 _10%_ 확률로 공격을 막고 즉시 반격합니다.\n\n_+2:_ 공격을 받으면 _20%_ 확률로 공격을 막고 즉시 반격합니다.\n\n_+3:_ 공격을 받으면 _30%_ 확률로 공격을 막고 즉시 반격합니다.
actors.hero.talent.aris_ex2_3.title=주인공 버프
actors.hero.talent.aris_ex2_3.desc=_+1:_ 배터리 충전 중첩 _100_당 반지의 강화 수치가 +1 증가합니다.\n\n_+2:_ 배터리 충전 중첩 _50_당 반지의 강화 수치가 +1 증가합니다.\n\n_+3:_ 배터리 충전 중첩 _30_당 반지의 강화 수치가 +1 증가합니다.\n\n추가 강화 수치는 최대 +3까지 얻을 수 있습니다.

actors.hero.talent.aris_armor1_1.title=과열 감소
actors.hero.talent.aris_armor1_1.desc=_+1:_ 능력 사용 후 밸런스 붕괴의 재사용 대기 시간이 _13%_ 감소합니다.\n\n_+2:_ 능력 사용 후 밸런스 붕괴의 재사용 대기 시간이 _25%_ 감소합니다.\n\n_+3:_ 능력 사용 후 밸런스 붕괴의 재사용 대기 시간이 _38%_ 감소합니다.\n\n_+4:_ 능력 사용 후 밸런스 붕괴의 재사용 대기 시간이 _50%_ 감소합니다.
actors.hero.talent.aris_armor1_2.title=에너지 보호막
actors.hero.talent.aris_armor1_2.desc=_+1:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적 하나 당 _2_의 보호막을 얻습니다.\n\n_+2:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적 하나 당 _4_의 보호막을 얻습니다.\n\n_+3:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적 하나 당 _6_의 보호막을 얻습니다.\n\n_+4:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적 하나 당 _8_의 보호막을 얻습니다.\n\n최대 8체까지 적용됩니다.
actors.hero.talent.aris_armor1_3.title=빛이 당신을...
actors.hero.talent.aris_armor1_3.desc=_+1:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적에게 _25%_ 확률로 불을 붙입니다.\n\n_+2:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적에게 _50%_ 확률로 불을 붙입니다.\n\n_+3:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적에게 _75%_ 확률로 불을 붙입니다.\n\n_+4:_ 능력 사용 후 밸런스 붕괴에 피해를 입은 적에게 _100%_ 확률로 불을 붙입니다.

actors.hero.talent.aris_armor2_1.title=보호의 힘
actors.hero.talent.aris_armor2_1.desc=_+1:_ Divi:Sion 발동 시 _8_의 방어막을 얻습니다.\n\n_+2:_ Divi:Sion 발동 시 _16_의 방어막을 얻습니다.\n\n_+3:_ Divi:Sion 발동 시 _24_의 방어막을 얻습니다.\n\n_+4:_ Divi:Sion 발동 시 _32_의 방어막을 얻습니다.
actors.hero.talent.aris_armor2_2.title=생명력 흡수
actors.hero.talent.aris_armor2_2.desc=_+1:_ Divi:Sion의 능력으로 적을 타락시키면 _2_의 체력을 회복합니다.\n\n_+2:_ Divi:Sion의 능력으로 적을 타락시키면 _4_의 체력을 회복합니다.\n\n_+3:_ Divi:Sion의 능력으로 적을 타락시키면 _6_의 체력을 회복합니다.\n\n_+4:_ Divi:Sion의 능력으로 적을 타락시키면 _8_의 체력을 회복합니다.
actors.hero.talent.aris_armor2_3.title=지속되는 힘
actors.hero.talent.aris_armor2_3.desc=_+1:_ Divi:Sion의 능력으로 적을 타락시키면 능력의 지속 시간이 _2턴_ 연장됩니다.\n\n_+2:_ Divi:Sion의 능력으로 적을 타락시키면 능력의 지속 시간이 _4턴_ 연장됩니다.\n\n_+3:_ Divi:Sion의 능력으로 적을 타락시키면 능력의 지속 시간이 _6턴_ 연장됩니다.\n\n_+4:_ Divi:Sion의 능력으로 적을 타락시키면 능력의 지속 시간이 _8턴_ 연장됩니다.\n\n최대 8체까지 적용됩니다.

actors.hero.talent.aris_armor3_1.title=고효율 배터리
actors.hero.talent.aris_armor3_1.desc=_+1:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 재사용 대기 시간이 _10%_ 감소합니다.\n\n_+2:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 재사용 대기 시간이 _20%_ 감소합니다.\n\n_+3:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 재사용 대기 시간이 _30%_ 감소합니다.\n\n_+4:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 재사용 대기 시간이 _40%_ 감소합니다.
actors.hero.talent.aris_armor3_2.title=고성능 배터리
actors.hero.talent.aris_armor3_2.desc=_+1:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 피해량이 _10%_ 증가합니다.\n\n_+2:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 피해량이 _20%_ 증가합니다.\n\n_+3:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 피해량이 _30%_ 증가합니다.\n\n_+4:_ 배터리 교체 발동 후에 발사하는 밸런스 붕괴의 피해량이 _40%_ 증가합니다.
actors.hero.talent.aris_armor3_3.title=고속 교체
actors.hero.talent.aris_armor3_3.desc=_+1:_ 배터리 교체 발동 시 _25%_ 확률로 턴을 소모하지 않습니다.\n\n_+2:_ 배터리 교체 발동 시 _50%_ 확률로 턴을 소모하지 않습니다.\n\n_+3:_ 배터리 교체 발동 시 _75%_ 확률로 턴을 소모하지 않습니다.\n\n_+4:_ 배터리 교체 발동 시 _100%_ 확률로 턴을 소모하지 않습니다.

actors.hero.abilities.aris.extendedlaser.name=확장 부품
actors.hero.abilities.aris.extendedlaser.short_desc=아리스는 빛의 검: 슈퍼노바에 일회성 부품을 장착해 _밸런스 붕괴를 크게 강화할 수 있습니다_.
actors.hero.abilities.aris.extendedlaser.desc=아리스는 다음 밸런스 붕괴 발사를 강화시켜 공격 가로 범위를 3배, 최대 거리를 2배로 늘릴 수 있습니다. 확장 부품 사용 후 발사한 밸런스 붕괴의 재사용 대기 시간이 2배로 증가합니다.
actors.hero.abilities.aris.extendedlaser.cooldown=빛의 검: 슈퍼노바가 과열된 상태에서는 부품을 장착할 수 없다.
actors.hero.abilities.aris.extendedlaser.already_used=이미 확장 부품이 장착되어 있다!
actors.hero.abilities.aris.extendedlaser$extendedlaserbuff.name=확장 부품
actors.hero.abilities.aris.extendedlaser$extendedlaserbuff.desc=확장 부품 준비 완료입니다! 위험하니 잠깐 저 쪽에 숨어 계세요.\n\n다음에 발사하는 밸런스 붕괴의 공격 가로 범위가 3배, 최대 거리가 2배 증가합니다.
actors.hero.abilities.aris.division.name=Divi:SION
actors.hero.abilities.aris.division.short_desc=아리스는 왕녀의 힘을 각성해 잠시 동안 날아다닐 수 있게 되며, _처치한 적을 타락시킬 수 있습니다_.
actors.hero.abilities.aris.division.desc=아리스는 20턴 동안 이름 없는 신들의 왕녀의 힘을 되찾아 공중을 날아다닐 수 있게 됩니다. 또한 효과 지속 중에 처치한 대부분의 적들은 타락시켜 아군으로 만들 수 있습니다.
actors.hero.abilities.aris.division.already_activated=힘을 각성한 상태에서는 다시 사용할 수 없다!
actors.hero.abilities.aris.division$divisionbuff.name=이름 없는 신들의 왕녀
actors.hero.abilities.aris.division$divisionbuff.desc=아리스가 잠시 동안 Key의 인격을 일부 각성했습니다. 공중을 날아다니며, 적을 처치할 때마다 그 적을 아군으로 만들어 버릴 수 있습니다.\n\n남은 턴: %s.
actors.hero.abilities.aris.batterychange.name=배터리 교체
actors.hero.abilities.aris.batterychange.short_desc=아리스는 밸런스 붕괴의 재사용 대기 중에 배터리를 교체해 _밸런스 붕괴를 즉시 준비할 수 있습니다_.
actors.hero.abilities.aris.batterychange.desc=아리스는 빛의 검: 슈퍼노바의 배터리를 교체해 밸런스 붕괴를 즉시 준비할 수 있습니다.

###Nonomi sentences
actors.hero.heroclass.nonomi=노노미
actors.hero.heroclass.nonomi_desc_short=오늘도 좋은 하루~ 선생님! 뭐든지 맡겨주세요.\n\n난이도: _쉬움_
actors.hero.heroclass.nonomi_desc=노노미는 지속적인 자산의 투자를 통해 적을 처치할 때마다 가진 크레딧의 양을 _1%씩 증가_시켜 복리의 마법을 실현합니다.\n\n노노미는 MG를 잘 다루며, MG를 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n노노미는 또한 _1티어 MG_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n노노미는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.nonomi_unlock=노노미는 자동으로 해금됩니다.

actors.hero.herosubclass.shoot_all=전탄 발사
actors.hero.herosubclass.shoot_all_short_desc=노노미는 장착한 총기에 장전된 모든 탄환을 _한 번에 발사할 수 있습니다._
actors.hero.herosubclass.shoot_all_desc=노노미는 장착한 총기에 장전된 모든 탄환을 한 번에 발사할 수 있습니다.\n\n전탄 발사 후에는 과열 효과가 적용되어 일정 시간 동안 총을 바꾸거나 발사할 수 없게 됩니다.\n\n추가적인 조작을 통해 전탄 발사 ON/OFF 여부를 변경할 수 있습니다.
actors.hero.herosubclass.spread_shot=혼날 시간이에요~
actors.hero.herosubclass.spread_shot_short_desc=노노미는 총을 넓은 범위에 발사해 _넓은 범위의 적들에게 피해를 입힐 수 있습니다._
actors.hero.herosubclass.spread_shot_desc=노노미는 부채꼴 범위에 총을 발사해 여러 적들에게 탄환 피해를 입힐 수 있습니다.\n\n먼 곳을 노릴수록 범위의 각도가 좁아지며, 탄환의 명중 횟수가 많을수록 범위의 각도가 넓어집니다.

actors.hero.hero.nonomi_push=안 돼요!
actors.hero.hero.nonomi_spread_no_gun=어머, 총 드는 걸 깜빡했네요~ 총을 먼저 장착해야 해요.

actors.hero.hero.nonomi_health_critical_1=어디 안전한 곳에서 잠시 쉬지 않을래요? 조금 힘드네요...
actors.hero.hero.nonomi_health_critical_2=이제 한계예요...
actors.hero.hero.nonomi_health_critical_3=상태는 괜찮으신가요? 저는 조금 위험한 것 같아요...

actors.hero.hero.nonomi_health_warn_1=조금 위험할지도...
actors.hero.hero.nonomi_health_warn_2=조금 힘이 드네요. 잠시 회복이 필요할 것 같아요.
actors.hero.hero.nonomi_health_warn_3=무리하지 않는 편이 좋을 것 같아요.

actors.hero.hero.nonomi_die=으으... 죄송합니다...

actors.hero.hero.nonomi_enemy_defeated_1=벌 받을 시간이에요~
actors.hero.hero.nonomi_enemy_defeated_2=흐흥~ 최고의 전투였어요~
actors.hero.hero.nonomi_enemy_defeated_3=최고의 지휘였어요!
actors.hero.hero.nonomi_enemy_defeated_4=다친 곳은 없나요~?
actors.hero.hero.nonomi_enemy_defeated_5=이 정도는 식은 죽 먹기죠!

actors.hero.hero.nonomi_levelup_1=지금 이 순간에도 성장하고 있으니까요!
actors.hero.hero.nonomi_levelup_2=후후, 일보전진했네요!
actors.hero.hero.nonomi_levelup_3=저, 더 노력할게요!
actors.hero.hero.nonomi_levelup_4=더 강해진 기분이에요.
actors.hero.hero.nonomi_levelup_5=후후, 최고의 컨디션이랍니다!
actors.hero.hero.nonomi_levelup_rare=응응. 힘이라는 건 양날의 검이지만, 선생님과 모두를 위해서라면 필요하다고 생각해요. 소중하게 쓸 테니 지켜봐 주세요, 선생님.

actors.buffs.shootallbuff.action_name_off=전탄 발사 비활성화
actors.buffs.shootallbuff.action_name_on=전탄 발사 활성화
actors.buffs.shootallbuff$overheat.name=과열
actors.buffs.shootallbuff$overheat.desc=총이 너무 뜨거워진 상태입니다. 과열 상태에서는 총을 쏘거나 재장전하거나 바꾸는 것이 불가능합니다.\n\n남은 턴: %d.
actors.buffs.spreadshotbuff.action_name=광역 사격

actors.hero.talent.nonomi_t1_1.title=휴식 시간
actors.hero.talent.nonomi_t1_1.desc=_+1:_ 식사 시 남은 체력이 40% 미만일 때 _3_의 체력을 회복합니다.\n\n_+2:_ 식사 시 남은 체력이 40% 미만일 때 _5_의 체력을 회복합니다.
actors.hero.talent.nonomi_t1_2.title=기관총 전문가
actors.hero.talent.nonomi_t1_2.desc=_+1:_ MG를 _장착 시_ 즉시 감정합니다.\n\n_+2:_ MG를 _획득 시_ 즉시 감정합니다.
actors.hero.talent.nonomi_t1_3.title=충격 탄환
actors.hero.talent.nonomi_t1_3.desc=_+1:_ 탄환의 피해량이 _+0-1_ 증가합니다.\n\n_+2:_ 탄환의 피해량이 _+1_ 증가합니다.
actors.hero.talent.nonomi_t1_4.title=안전 지대
actors.hero.talent.nonomi_t1_4.desc=_+1:_ 총기 장전 시 _장전에 필요한 턴 수_만큼의 방어막을 얻습니다.\n\n_+2:_ 총기 장전 시 _장전에 필요한 턴 수+1_만큼의 방어막을 얻습니다.

actors.hero.talent.nonomi_t2_1.title=피크닉 타임
actors.hero.talent.nonomi_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 시 _장착한 총기를 턴 소모 없이 재장전_합니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 시 _장착한 총기를 턴 소모 없이 재장전하고 1발의 탄환을 추가로 장전_합니다.
actors.hero.talent.nonomi_t2_2.title=골드 카드
actors.hero.talent.nonomi_t2_2.desc=_+1:_ 상점의 모든 물건이 _20%_ 할인됩니다.\n\n_+2:_ 상점의 모든 물건이 _40%_ 할인됩니다.
actors.hero.talent.nonomi_t2_3.title=인기인
actors.hero.talent.nonomi_t2_3.desc=_+1:_ 시야 내의 적 하나 당 받는 피해가 _5%_ 감소합니다.\n\n_+2:_ 시야 내의 적 하나 당 받는 피해가 _7.5%_ 감소합니다.
actors.hero.talent.nonomi_t2_4.title=서프라이즈
actors.hero.talent.nonomi_t2_4.desc=_+1:_ 기습 시 탄환 피해량이 _+1_ 증가합니다.\n\n_+2:_ 기습 시 탄환 피해량이 _+2_ 증가합니다.
actors.hero.talent.nonomi_t2_5.title=안 돼요!
actors.hero.talent.nonomi_t2_5.desc=_+1:_ 적을 처음으로 근접 공격 시 적을 _2 타일_ 뒤로 밀쳐냅니다.\n\n_+2:_ 적을 처음으로 근접 공격 시 적을 _3 타일_ 뒤로 밀쳐냅니다.\n\n이 공격으로 적을 낭떠러지에 떨어뜨릴 수 없습니다.

actors.hero.talent.nonomi_t3_1.title=전용 무기
actors.hero.talent.nonomi_t3_1.desc=_+1:_ 노노미의 전용 MG를 얻습니다.\n\n_+2:_ 노노미의 전용 MG의 강화 수치가 +1 증가합니다.\n\n_+3:_ 노노미의 전용 MG의 강화 수치가 +2 증가합니다.
actors.hero.talent.nonomi_t3_2.title=자동 수급 탄환
actors.hero.talent.nonomi_t3_2.desc=_+1:_ 매 턴마다 _5%_ 확률로 장착한 총기에 탄환이 1발 장전됩니다.\n\n_+2:_ 매 턴마다 _10%_ 확률로 장착한 총기에 탄환이 1발 장전됩니다.\n\n_+3:_ 매 턴마다 _15%_ 확률로 장착한 총기에 탄환이 1발 장전됩니다.

actors.hero.talent.nonomi_ex1_1.title=확장 탄창
actors.hero.talent.nonomi_ex1_1.desc=_+1:_ 장전에 필요한 턴 수가 1턴 증가하며, 장착한 총기의 최대 장탄수가 _1발_ 증가합니다.\n\n_+2:_ 장전에 필요한 턴 수가 1턴 증가하며, 장착한 총기의 최대 장탄수가 _2발_ 증가합니다.\n\n_+3:_ 장전에 필요한 턴 수가 1턴 증가하며, 장착한 총기의 최대 장탄수가 _3발_ 증가합니다.
actors.hero.talent.nonomi_ex1_2.title=냉각 솔루션
actors.hero.talent.nonomi_ex1_2.desc=_+1:_ 과열 중에 적을 근접 공격하면 _33%_ 확률로 과열의 지속 시간을 추가로 1턴 감소시킵니다.\n\n_+2:_ 과열 중에 적을 근접 공격하면 _67%_ 확률로 과열의 지속 시간을 추가로 1턴 감소시킵니다.\n\n_+3:_ 과열 중에 적을 근접 공격하면 _100%_ 확률로 과열의 지속 시간을 추가로 1턴 감소시킵니다.
actors.hero.talent.nonomi_ex1_3.title=열 전도
actors.hero.talent.nonomi_ex1_3.desc=_+1:_ 과열 중에 적을 근접 공격하면 _과열 지속 시간x10%_의 확률로 적에게 불을 붙입니다.\n\n_+2:_ 과열 중에 적을 근접 공격하면 _(과열 지속 시간+1)x10%_의 확률로 적에게 불을 붙입니다.\n\n_+3:_ 과열 중에 적을 근접 공격하면 _(과열 지속 시간+2)x10%_의 확률로 적에게 불을 붙입니다.

actors.hero.talent.nonomi_ex2_1.title=청소 시간
actors.hero.talent.nonomi_ex2_1.desc=_+1:_ 부채꼴 범위의 기본 각도가 _+10º_ 증가합니다.\n\n_+2:_ 부채꼴 범위의 기본 각도가 _+20º_ 증가합니다.\n\n_+3:_ 부채꼴 범위의 기본 각도가 _+30º_ 증가합니다.
actors.hero.talent.nonomi_ex2_2.title=관통 사격
actors.hero.talent.nonomi_ex2_2.desc=_+1:_ 능력이 _20%_ 확률로 벽을 관통하여 피해를 입힙니다.\n\n_+2:_ 능력이 _40%_ 확률로 벽을 관통하여 피해를 입힙니다.\n\n_+3:_ 능력이 _60%_ 확률로 벽을 관통하여 피해를 입힙니다.
actors.hero.talent.nonomi_ex2_3.title=밀쳐내는 사격
actors.hero.talent.nonomi_ex2_3.desc=_+1:_ 능력에 맞은 적이 _10%_ 확률로 1타일 뒤로 밀려납니다.\n\n_+2:_ 능력에 맞은 적이 _20%_ 확률로 1타일 뒤로 밀려납니다.\n\n_+3:_ 능력에 맞은 적이 _30%_ 확률로 1타일 뒤로 밀려납니다.

actors.hero.talent.nonomi_armor1_1.title=커다란 선물
actors.hero.talent.nonomi_armor1_1.desc=_+1:_ 매혹의 지속 시간이 _+33%_ 증가합니다.\n\n_+2:_ 매혹의 지속 시간이 _+67%_ 증가합니다.\n\n_+3:_ 매혹의 지속 시간이 _+100%_ 증가합니다.\n\n_+4:_ 매혹의 지속 시간이 _+133%_ 증가합니다.
actors.hero.talent.nonomi_armor1_2.title=눈을 뗄 수가 없어
actors.hero.talent.nonomi_armor1_2.desc=_+1:_ 능력이 추가로 실명을 _1턴_ 만큼 부여합니다.\n\n_+2:_ 능력이 추가로 실명을 _2턴_ 만큼 부여합니다.\n\n_+3:_ 능력이 추가로 실명을 _3턴_ 만큼 부여합니다.\n\n_+4:_ 능력이 추가로 실명을 _4턴_ 만큼 부여합니다.
actors.hero.talent.nonomi_armor1_3.title=매혹적인 선물
actors.hero.talent.nonomi_armor1_3.desc=_+1:_ 능력에 영향을 받은 적이 _2%_ 확률로 아군이 됩니다.\n\n_+2:_ 능력에 영향을 받은 적이 _4%_ 확률로 아군이 됩니다.\n\n_+3:_ 능력에 영향을 받은 적이 _6%_ 확률로 아군이 됩니다.\n\n_+4:_ 능력에 영향을 받은 적이 _8%_ 확률로 아군이 됩니다.

actors.hero.talent.nonomi_armor2_1.title=어른의 카드
actors.hero.talent.nonomi_armor2_1.desc=_+1:_ 1 피해를 입히는 데에 소모되는 크레딧이 _5_ 감소합니다.\n\n_+2:_ 1 피해를 입히는 데에 소모되는 크레딧이 _10_ 감소합니다.\n\n_+3:_ 1 피해를 입히는 데에 소모되는 크레딧이 _15_ 감소합니다.\n\n_+4:_ 1 피해를 입히는 데에 소모되는 크레딧이 _20_ 감소합니다.
actors.hero.talent.nonomi_armor2_2.title=투자금 회수
actors.hero.talent.nonomi_armor2_2.desc=_+1:_ 능력으로 적을 처치하면 _20 크레딧_을 얻습니다.\n\n_+2:_ 능력으로 적을 처치하면 _40 크레딧_을 얻습니다.\n\n_+3:_ 능력으로 적을 처치하면 _60 크레딧_을 얻습니다.\n\n_+4:_ 능력으로 적을 처치하면 _80 크레딧_을 얻습니다.
actors.hero.talent.nonomi_armor2_3.title=빛나는 황금
actors.hero.talent.nonomi_armor2_3.desc=_+1:_ 능력이 소모한 크레딧 1당 _1턴_의 발광 효과를 얻습니다.\n\n_+2:_ 능력이 소모한 크레딧 1당 _2턴_의 발광 효과를 얻습니다.\n\n_+3:_ 능력이 소모한 크레딧 1당 _3턴_의 발광 효과를 얻습니다.\n\n_+4:_ 능력이 소모한 크레딧 1당 _4턴_의 발광 효과를 얻습니다.

actors.hero.talent.nonomi_armor3_1.title=급탄 솔루션
actors.hero.talent.nonomi_armor3_1.desc=_+1:_ 능력 사용 중에 매 _8턴_마다 1발의 탄환을 자동으로 장전합니다.\n\n_+2:_ 능력 사용 중에 매 _7턴_마다 1발의 탄환을 자동으로 장전합니다.\n\n_+3:_ 능력 사용 중에 매 _6턴_마다 1발의 탄환을 자동으로 장전합니다.\n\n_+4:_ 능력 사용 중에 매 _5턴_마다 1발의 탄환을 자동으로 장전합니다.
actors.hero.talent.nonomi_armor3_2.title=안정적인 사격
actors.hero.talent.nonomi_armor3_2.desc=_+1:_ 능력 사용 중 탄환의 명중률이 _20%_ 증가합니다.\n\n_+2:_ 능력 사용 중 탄환의 명중률이 _40%_ 증가합니다.\n\n_+3:_ 능력 사용 중 탄환의 명중률이 _80%_ 증가합니다.\n\n_+4:_ 능력 사용 중 탄환의 명중률이 _80%_ 증가합니다.
actors.hero.talent.nonomi_armor3_3.title=포지션 조정
actors.hero.talent.nonomi_armor3_3.desc=_+1:_ 능력이 해제되고 나서 _1턴_ 이내에 능력을 사용하면 50% 적은 에너지를 사용합니다.\n\n_+2:_ 능력이 해제되고 나서 _2턴_ 이내에 능력을 사용하면 50% 적은 에너지를 사용합니다.\n\n_+3:_ 능력이 해제되고 나서 _3턴_ 이내에 능력을 사용하면 50% 적은 에너지를 사용합니다.\n\n_+4:_ 능력이 해제되고 나서 _4턴_ 이내에 능력을 사용하면 50% 적은 에너지를 사용합니다.

actors.hero.abilities.nonomi.present.name=모두에게 선물
actors.hero.abilities.nonomi.present.short_desc=노노미는 보이는 모든 적에게 선물을 주어 _잠시 동안 노노미를 공격하지 못하게 만들 수 있습니다._
actors.hero.abilities.nonomi.present.desc=노노미는 시야 내에 있는 모두에게 선물을 주어, 5턴 동안 매혹에 빠져 노노미를 공격하지 못하게 만들 수 있습니다.
actors.hero.abilities.nonomi.blackcard.name=블랙 카드
actors.hero.abilities.nonomi.blackcard.short_desc=노노미는 가진 크레딧을 전부 소모하고 _시야 내의 모든 적에게 방어력 관통 피해를 입힐 수 있습니다._
actors.hero.abilities.nonomi.blackcard.desc=노노미는 블랙 카드의 힘을 사용해 가진 크레딧을 전부 소모하고, 시야 내의 모든 적에게 소모한 크레딧 30당 1의 방어력 무시 피해를 입힐 수 있습니다.
actors.hero.abilities.nonomi.blackcard.no_gold=충분한 크레딧이 없다!
actors.hero.abilities.nonomi.bipod.name=양각대 설치
actors.hero.abilities.nonomi.bipod.short_desc=노노미는 양각대를 설치해 다른 행동을 하기 전까지 _총기 발사에 턴을 소모하지 않을 수 있습니다._
actors.hero.abilities.nonomi.bipod.desc=노노미는 양각대를 설치해, 이동하거나, 총기를 재장전하거나, 근접 공격을 하기 전까지 안정적인 반동으로 총을 발사하며, 총기 발사에 턴을 소모하지 않게 됩니다.
actors.hero.abilities.nonomi.bipod$bipodbuff.name=양각대
actors.hero.abilities.nonomi.bipod$bipodbuff.desc=노노미가 양각대를 펼쳐 지형에 단단히 고정한 상태입니다.\n\n노노미가 양각대를 설치한 동안 근접 공격을 하거나 움직이기 전까지 총기 발사에 턴을 소모하지 않게 됩니다.
actors.hero.abilities.nonomi.bipod$bipodtracker.name=포지션 조정
actors.hero.abilities.nonomi.bipod$bipodtracker.desc=노노미가 양각대의 위치를 조정하고 있습니다!\n\n지금 양각대를 다시 설치하면 50%% 적은 에너지를 소모합니다.\n\n남은 턴: %s.



###Miyako Sentences
actors.hero.heroclass.miyako=미야코
actors.hero.heroclass.miyako_desc_short=SRT 특수학원, RABBIT 소대의 츠키유키 미야코입니다. 선생님, 지시를.\n\n난이도: _보통_
actors.hero.heroclass.miyako_desc=미야코는 넓은 범위에 피해를 입히고 짧은 시간 동안 느려지게 만드는 _클레이모어_를 가지고 시작합니다.\n\n미야코는 SMG를 잘 다루며, SMG를 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n미야코는 또한 _1티어 SMG_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n미야코는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.miyako_unlock=노노미는 자동으로 해금됩니다.

actors.hero.herosubclass.rabbit_squad=RABBIT 소대 출동!
actors.hero.herosubclass.rabbit_squad_short_desc=미야코는 _RABBIT 소대원의 지원을 받아 함께 전투를 수행할 수 있습니다_.
actors.hero.herosubclass.rabbit_squad_desc=미야코는 능력을 사용할 때마다 사키, 미유, 모에 순서로 소대원의 지원을 받습니다.\n\n_사키:_ 사키가 투입되어 미야코를 따라 전투를 보조합니다.\n사키의 전투 역량은 미야코의 전투 역량에 영향을 받습니다.\n재사용 대기 시간: 250턴\n\n_미유:_ 턴 소모 없이 지정한 위치에 강력한 SR 탄환을 발사합니다.\n피해량은 미야코가 착용한 무기의 성능에 영향을 받습니다.\n재사용 대기 시간: 50턴\n\n_모에:_ 지정한 위치 근처 3x3 지역의 무작위 위치에 강력한 폭격을 6번 가합니다.\n피해량은 현재 계층과 미야코의 레벨에 영향을 받습니다.\n재사용 대기 시간: 100턴
actors.hero.herosubclass.support_drone=보조 공격 드론
actors.hero.herosubclass.support_drone_short_desc=미야코는 적을 처치할 때마다 _전투를 보조하는 보조 공격 드론_을 얻습니다.
actors.hero.herosubclass.support_drone_desc=미야코가 적을 처치할 때마다 보조 공격 드론을 1개씩 최대 3개까지 얻으며, 탄환 명중 시 각 드론이 약한 전기 피해를 입힙니다.\n\n보조 공격 드론은 미야코가 피격받을 때마다 피해를 50% 경감하고 하나씩 파괴됩니다.

actors.hero.hero.miyako_health_critical_1=상태가 위험합니다. 회복이 필요합니다.
actors.hero.hero.miyako_health_critical_2=윽... 위험한 것 같네요.
actors.hero.hero.miyako_health_critical_3=전... 괜찮... 아니, 괜찮지 않네요...

actors.hero.hero.miyako_health_warn_1=조금 상태가 좋지 않습니다... 잠시 쉴 자리를 찾는 편이 좋아 보이네요.
actors.hero.hero.miyako_health_warn_2=임무 성공의 지름길은 컨디션 조절에 있습니다. 조금 휴식하는 편이 좋을 것 같네요.
actors.hero.hero.miyako_health_warn_3=잠깐 재정비를 하는 편이 좋을 것 같습니다.

actors.hero.hero.miyako_die=임무... 실패...

actors.hero.hero.miyako_enemy_defeated_1=무의미한 저항입니다.
actors.hero.hero.miyako_enemy_defeated_2=임무는 아직 끝나지 않았습니다.
actors.hero.hero.miyako_enemy_defeated_3=다음 적은 어디 있나요?
actors.hero.hero.miyako_enemy_defeated_4=전투 보고, 이상 무. 전진하겠습니다.
actors.hero.hero.miyako_enemy_defeated_5=처치 확인. 항상 경계를 늦추지 말아야 합니다.

actors.hero.hero.miyako_levelup_1=더욱 강해진 느낌이 듭니다.
actors.hero.hero.miyako_levelup_2=이것도... 성장...?
actors.hero.hero.miyako_levelup_3=성장이라는 건, 이렇게 기분 좋은 일이었던 거군요.
actors.hero.hero.miyako_levelup_4=기대에 따를 수 있도록, 더 힘내겠습니다.
actors.hero.hero.miyako_levelup_5=반드시 기대에 부응하겠습니다.
actors.hero.hero.miyako_levelup_rare=낯선 공간이지만, 그럭저럭 적응하고 있는 것 같네요. 점점 나아지고 있습니다.

actors.hero.talent.miyako_t1_1.title=고폭 수류탄
actors.hero.talent.miyako_t1_1.desc=_+1:_ 수류탄의 피해량이 _2_ 증가합니다.\n\n_+2:_ 수류탄의 피해량이 _3_ 증가합니다.
actors.hero.talent.miyako_t1_2.title=SMG 전문가
actors.hero.talent.miyako_t1_2.desc=_+1:_ SMG를 _장착 시_ 즉시 감정합니다.\n\n_+2:_ SMG를 _획득 시_ 즉시 감정합니다.
actors.hero.talent.miyako_t1_3.title=CQC
actors.hero.talent.miyako_t1_3.desc=_+1:_ 총기의 근접 피해량이 _1_ 증가합니다.\n\n_+2:_ 총기의 근접 피해량이 _1-2_ 증가합니다.
actors.hero.talent.miyako_t1_4.title=교란 작전
actors.hero.talent.miyako_t1_4.desc=_+1:_ 적을 처음으로 기습 공격하면 _2턴_의 현기증을 부여합니다.\n\n_+2:_ 적을 처음으로 기습 공격하면 _3턴_의 현기증을 부여합니다.

actors.hero.talent.miyako_t2_1.title=전투 식량
actors.hero.talent.miyako_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 시 최대 체력의 _10%_만큼의 방어막을 얻습니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 시 최대 체력의 _15%_만큼의 방어막을 얻습니다.
actors.hero.talent.miyako_t2_2.title=전투 보급품
actors.hero.talent.miyako_t2_2.desc=_+1:_ _수류탄_의 최대 소지량이 1 증가합니다.\n\n_+2:_ +1의 효과에 더불어, _소형 클레이모어_의 최대 소지량이 1 증가합니다.
actors.hero.talent.miyako_t2_3.title=첩보 입수
actors.hero.talent.miyako_t2_3.desc=_+1:_ 주변 _2타일_ 근처에 있는 적들에 대한 심안 효과를 얻습니다.\n\n_+2:_ 주변 _3타일_ 근처에 있는 적들에 대한 심안 효과를 얻습니다.
actors.hero.talent.miyako_t2_4.title=전술 기동
actors.hero.talent.miyako_t2_4.desc=_+1:_ 공격을 회피할 때마다 _25%_ 확률로 장착한 총기에 탄환을 1발 장전합니다.\n\n_+2:_ 공격을 회피할 때마다 _50%_ 확률로 장착한 총기에 탄환을 1발 장전합니다.
actors.hero.talent.miyako_t2_5.title=특수 방탄판 장착
actors.hero.talent.miyako_t2_5.desc=_+1:_ 최대 체력이 _10%_ 증가합니다.\n\n_+2:_ 최대 체력이 _20%_ 증가합니다.

actors.hero.talent.miyako_t3_1.title=높이 던져 넣기
actors.hero.talent.miyako_t3_1.desc=_+1:_ 수류탄이 3타일 이내의 _캐릭터_를 통과합니다.\n\n_+2:_ 수류탄이 3타일 이내의 _캐릭터, 문_을 통과합니다.\n\n_+3:_ 수류탄이 3타일 이내의 _캐릭터, 문, 벽_을 통과합니다.
actors.hero.talent.miyako_t3_2.title=Rabbit Open Up!
actors.hero.talent.miyako_t3_2.desc=_+1:_ 문에서 소형 클레이모어를 사용하면 문을 파괴하고 클레이모어의 범위와 피해량을 _100%_ 증가시킵니다.\n\n_+2:_ 문에서 소형 클레이모어를 사용하면 문을 파괴하고 클레이모어의 범위와 피해량을 _200%_ 증가시킵니다.\n\n_+3:_ 문에서 소형 클레이모어를 사용하면 문을 파괴하고 클레이모어의 범위와 피해량을 _300%_ 증가시킵니다.

actors.hero.talent.miyako_ex1_1.title=신속한 백업
actors.hero.talent.miyako_ex1_1.desc=_+1:_ 사키의 재사용 대기 시간이 _50턴_ 감소합니다.\n\n_+2:_ 사키의 재사용 대기 시간이 _100턴_ 감소합니다.\n\n_+3:_ 사키의 재사용 대기 시간이 _150턴_ 감소합니다.
actors.hero.talent.miyako_ex1_2.title=완벽한 스나이퍼
actors.hero.talent.miyako_ex1_2.desc=_+1:_ 미유의 저격이 _+100%_의 명중률을 얻습니다.\n\n_+2:_ 미유의 저격이 _+300%_의 명중률을 얻습니다.\n\n_+3:_ 미유의 저격이 _+500%_의 명중률을 얻습니다.
actors.hero.talent.miyako_ex1_3.title=무차별 폭격
actors.hero.talent.miyako_ex1_3.desc=_+1:_ 집중 포화의 투사체 수가 _+3발_ 증가합니다.\n\n_+2:_ 집중 포화의 투사체 수가 _+6발_ 증가합니다.\n\n_+3:_ 집중 포화의 투사체 수가 _+9발_ 증가합니다.

actors.hero.talent.miyako_ex2_1.title=확장 포트
actors.hero.talent.miyako_ex2_1.desc=_+1:_ 적 처치 시 _20%_ 확률로 2개의 드론을 활성화시킵니다.\n\n_+2:_ +1의 효과에 더불어, 적에게 공격받으면 _20%_ 확률로 드론을 잃지 않습니다.\n\n_+3:_ +2의 효과에 더불어, _활성화 가능한 최대 드론의 개수가 1개 증가_합니다.
actors.hero.talent.miyako_ex2_2.title=고전압 충격
actors.hero.talent.miyako_ex2_2.desc=_+1:_ 드론의 전기 충격 최대 피해량이 _+0.5_ 증가합니다.\n\n_+2:_ 드론의 전기 충격 최대 피해량이 _+1_ 증가합니다.\n\n_+3:_ 드론의 전기 충격 최대 피해량이 _+1.5_ 증가합니다.\n\n소수점 아래의 피해량은 그만큼의 확률로 적용됩니다.
actors.hero.talent.miyako_ex2_3.title=드론 정찰
actors.hero.talent.miyako_ex2_3.desc=_+1:_ 가지고 있는 드론 하나 당 벽 너머 +1타일 범위에 있는 적들에 대해 심안 효과를 얻습니다. 최대 _1기_까지 적용됩니다.\n\n_+2:_ 가지고 있는 드론 하나 당 벽 너머 +1타일 범위에 있는 적들에 대해 심안 효과를 얻습니다. 최대 _2기_까지 적용됩니다.\n\n_+3:_ 가지고 있는 드론 하나 당 벽 너머 +1타일 범위에 있는 적들에 대해 심안 효과를 얻습니다. 최대 _3기_까지 적용됩니다.\n\n이 특성은 다른 심안 효과와 중첩이 가능합니다.

actors.hero.talent.miyako_armor1_1.title=철사 묶기
actors.hero.talent.miyako_armor1_1.desc=_+1:_ 철사 갈고리로 끌어온 적을 _1턴_ 동안 속박시킵니다.\n\n_+2:_ 철사 갈고리로 끌어온 적을 _2턴_ 동안 속박시킵니다.\n\n_+3:_ 철사 갈고리로 끌어온 적을 _3턴_ 동안 속박시킵니다.\n\n_+4:_ 철사 갈고리로 끌어온 적을 _4턴_ 동안 속박시킵니다.
actors.hero.talent.miyako_armor1_2.title=다중 갈고리
actors.hero.talent.miyako_armor1_2.desc=_+1:_ 철사 갈고리를 사용한 후 3턴 이내에 철사 갈고리를 사용하면 _10%_ 적은 에너지를 사용합니다.\n\n_+2:_ 철사 갈고리를 사용한 후 3턴 이내에 철사 갈고리를 사용하면 _19%_ 적은 에너지를 사용합니다.\n\n_+3:_ 철사 갈고리를 사용한 후 3턴 이내에 철사 갈고리를 사용하면 _27%_ 적은 에너지를 사용합니다.\n\n_+4:_ 철사 갈고리를 사용한 후 3턴 이내에 철사 갈고리를 사용하면 _34%_ 적은 에너지를 사용합니다.\n\n이 특성으로 인해 사용 에너지가 감소한 상태에서의 철사 갈고리 사용에는 적용되지 않습니다.
actors.hero.talent.miyako_armor1_3.title=접사
actors.hero.talent.miyako_armor1_3.desc=_+1:_ 적을 끌고 온 후 근접한 적에 대한 탄환 정확성이 _4턴_ 동안 +200% 증가합니다.\n\n_+2:_ 적을 끌고 온 후 근접한 적에 대한 탄환 정확성이 _8턴_ 동안 +200% 증가합니다.\n\n_+3:_ 적을 끌고 온 후 근접한 적에 대한 탄환 정확성이 _12턴_ 동안 +200% 증가합니다.\n\n_+4:_ 적을 끌고 온 후 근접한 적에 대한 탄환 정확성이 _16턴_ 동안 +200% 증가합니다.

actors.hero.talent.miyako_armor2_1.title=사다리 훈련
actors.hero.talent.miyako_armor2_1.desc=_+1:_ 착지 후 턴 소모가 _20%_ 감소합니다.\n\n_+2:_ 착지 후 턴 소모가 _40%_ 감소합니다.\n\n_+3:_ 착지 후 턴 소모가 _60%_ 감소합니다.\n\n_+4:_ 착지 후 턴 소모가 _80%_ 감소합니다.
actors.hero.talent.miyako_armor2_2.title=탑승 중 사격
actors.hero.talent.miyako_armor2_2.desc=_+1:_ 능력 사용 시 _25% 확률_로 이동한 경로에 있는 모든 적들에게 현재 장착 중인 총을 발사합니다.\n\n_+2:_ 능력 사용 시 _50% 확률_로 이동한 경로에 있는 모든 적들에게 현재 장착 중인 총을 발사합니다.\n\n_+3:_ 능력 사용 시 _75% 확률_로 이동한 경로에 있는 모든 적들에게 현재 장착 중인 총을 발사합니다.\n\n_+4:_ 능력 사용 시 _100% 확률_로 이동한 경로에 있는 모든 적들에게 현재 장착 중인 총을 발사합니다.
actors.hero.talent.miyako_armor2_3.title=사전 조사
actors.hero.talent.miyako_armor2_3.desc=_+1:_ 능력으로 적의 위치를 드러냈을 때의 에너지 소모량이 _25%_ 감소합니다.\n\n_+2:_ 능력으로 적의 위치를 드러냈을 때의 에너지 소모량이 _50%_ 감소합니다.\n\n_+3:_ 능력으로 적의 위치를 드러냈을 때의 에너지 소모량이 _75%_ 감소합니다.\n\n_+4:_ 능력으로 적의 위치를 드러냈을 때의 에너지 소모량이 _100%_ 감소합니다.

actors.hero.talent.miyako_armor3_1.title=네이팜 폭격
actors.hero.talent.miyako_armor3_1.desc=_+1:_ 폭격이 떨어진 지점에 _2턴_ 동안 불이 남습니다.\n\n_+2:_ 폭격이 떨어진 지점에 _4턴_ 동안 불이 남습니다.\n\n_+3:_ 폭격이 떨어진 지점에 _6턴_ 동안 불이 남습니다.\n\n_+4:_ 폭격이 떨어진 지점에 _8턴_ 동안 불이 남습니다.
actors.hero.talent.miyako_armor3_2.title=보급품 투하
actors.hero.talent.miyako_armor3_2.desc=_+1:_ 능력을 사용하면 _1개의 수류탄_을 얻습니다.\n\n_+2:_ 능력을 사용하면 _1-2개의 수류탄_을 얻습니다.\n\n_+3:_ 능력을 사용하면 _2개의 수류탄_을 얻습니다.\n\n_+4:_ 능력을 사용하면 _2개의 수류탄과 1개의 소형 클레이모어_를 얻습니다.
actors.hero.talent.miyako_armor3_3.title=고장약 폭탄
actors.hero.talent.miyako_armor3_3.desc=_+1:_ 폭발의 피해량이 _25%_ 증가합니다.\n\n_+2:_ 폭발의 피해량이 _50%_ 증가합니다.\n\n_+3:_ 폭발의 피해량이 _75%_ 증가합니다.\n\n_+4:_ 폭발의 피해량이 _100%_ 증가합니다.

actors.hero.abilities.miyako.wirehook.name=철사 갈고리
actors.hero.abilities.miyako.wirehook.short_desc=미야코는 철사 갈고리를 사용해 _멀리 있는 적을 끌어올 수 있습니다_.
actors.hero.abilities.miyako.wirehook.desc=미야코는 철사 갈고리를 던져, 멀리 있는 적을 바로 앞으로 끌어옴과 동시에 대상을 5턴간 불구로 만듭니다.
actors.hero.abilities.miyako.wirehook.prompt=끌어당길 대상 선택
actors.hero.abilities.miyako.wirehook.no_char=끌어당길 대상이 없다.
actors.hero.abilities.miyako.wirehook.failed=끌어당기기가 실패했다.
actors.hero.abilities.miyako.wirehook.cant_pull=그 대상은 끌어당길 수 없다.
actors.hero.abilities.miyako.wirehook.does_nothing=아무 일도 일어나지 않았다.
actors.hero.abilities.miyako.wirehook$pointblankshot.name=접사
actors.hero.abilities.miyako.wirehook$pointblankshot.desc=미야코는 현재 근접한 대상에 대한 집중력을 극도로 끌어올린 상태이며, 덕분에 적과 근접한 상태에서 탄환을 3배 정확하게 맞출 수 있게 되었습니다.\n\n남은 턴: %s.
actors.hero.abilities.miyako.helicopter.name=헬리콥터 지원
actors.hero.abilities.miyako.helicopter.short_desc=미야코는 헬리콥터에 탑승해 _원하는 위치로 이동_할 수 있습니다.
actors.hero.abilities.miyako.helicopter.desc=미야코는 헬리콥터 이동 지원을 요청해 헬리콥터에 탑승하며, 턴 소모 없이 원하는 위치에 도착한 후 5턴을 소모합니다.\n\n도달할 수 없는 위치나 잠긴 방 안에는 사용할 수 없습니다.\n시야 밖의, 적이나 다른 대상이 있는 위치를 선택하면 이동하는 대신 그 대상에 대한 심안 효과를 3턴간 얻고 충전량을 소모합니다.
actors.hero.abilities.miyako.helicopter.cannot_reach=그 위치로는 이동할 수 없다.
actors.hero.abilities.miyako.helicopter.already_char=그 위치에 누군가 있어 이동할 수 없다.
actors.hero.abilities.miyako.closeairsupport.name=근접 항공 지원 요청
actors.hero.abilities.miyako.closeairsupport.short_desc=미야코는 _지정한 위치까지의 경로 전체에 폭발_을 일으킬 수 있습니다.
actors.hero.abilities.miyako.closeairsupport.desc=미야코는 근접 항공 지원을 요청해, 미야코의 한 타일 앞부터 지정한 위치까지의 직선 경로에 폭격을 투하합니다.
actors.hero.abilities.miyako.closeairsupport.prompt=목표 지점 선택
actors.hero.abilities.miyako.closeairsupport.does_nothing=그 방향으로는 폭격할 지점이 없다.

actors.hero.hero.miyako_summon_saki=여기는 Rabbit 1, 지원 병력을 요청합니다.
actors.hero.hero.miyako_attack_saki=여기는 Rabbit 1, 이 타겟을 공격합니다!
actors.hero.hero.miyako_attack_miyu=여기는 Rabbit 1, 지원 사격을 요청합니다.
actors.hero.hero.miyako_attack_moe=여기는 Rabbit 1, 집중 포화를 요청합니다!
actors.hero.hero.miyako_cannot_see=보이지 않는 곳에 지원 사격을 요청할 수는 없습니다.
actors.hero.hero.miyako_no_char=그곳에 지원 사격을 요청할 수는 없습니다.

actors.buffs.rabbitsquadbuff.name=Rabbit 소대 출동!
actors.buffs.rabbitsquadbuff.desc=설명
actors.buffs.rabbitsquadbuff.no_space=공간이 없다.
actors.buffs.rabbitsquadbuff.no_action=지금은 아무런 지원을 요청할 수 없다.
actors.buffs.rabbitsquadbuff.action_name_summon=지원 병력 요청
actors.buffs.rabbitsquadbuff.action_name_snipe=저격 요청
actors.buffs.rabbitsquadbuff.action_name_airsupport=집중 포화 요청
actors.buffs.rabbitsquadbuff.action_name=요청 불가능
actors.buffs.rabbitsquadbuff.saki_reloading=재장전 중!
actors.buffs.rabbitsquadbuff.saki_react=여기는 Rabbit 2, 우선 목표 대상 확인, 타겟을 변경하겠다.
actors.buffs.rabbitsquadbuff.miyu=미유
actors.buffs.rabbitsquadbuff.miyu_react=여, 여기는 Rabbit 4, 저격하겠습니다...!
actors.buffs.rabbitsquadbuff.moe=모에
actors.buffs.rabbitsquadbuff.moe_react=자, 화려하게 가볼까!
actors.buffs.rabbitsquadbuff$saki.name=사키
actors.buffs.rabbitsquadbuff$saki.desc=RABBIT 2, 사키다. 미야코 소대장으로부터 지원을 명령받고 출동했다.\n\n무기: _%1$d티어 SMG +%2$d_\n장탄수: _%3$d/%4$d_\n재장전에 필요한 턴: _%5$s_\n\n나는 시야에 들어온 위협적인 적을 자동으로 공격하지만, 미야코 소대장이 공격하는 대상을 우선적으로 공격할 거야.
actors.buffs.rabbitsquadbuff$sakicooldown.name=재사용 대기 시간: 사키
actors.buffs.rabbitsquadbuff$sakicooldown.desc=사키가 전투에서 후퇴하여, 회복 중입니다.\n\n남은 턴: %s.
actors.buffs.rabbitsquadbuff$miyucooldown.name=재사용 대기 시간: 미유
actors.buffs.rabbitsquadbuff$miyucooldown.desc=미유가 최근에 지원 사격을 하여, 다음 사격을 위해 준비 중입니다.\n\n남은 턴: %s.
actors.buffs.rabbitsquadbuff$moecooldown.name=재사용 대기 시간: 모에
actors.buffs.rabbitsquadbuff$moecooldown.desc=모에가 최근에 집중 포화를 하여, 다음 공격을 위해 준비 중입니다.\n\n남은 턴: %s.

actors.buffs.supportdrone.name=보조 공격 드론
actors.buffs.supportdrone.desc=보조 공격 드론이 미야코의 주변을 빙빙 돌고 있으며, 미야코가 공격하는 적을 자동으로 공격합니다!\n\n적을 처치하면 드론이 하나씩 활성화되며, 적에게 물리 공격을 받으면 피해를 50%% 경감하고 드론 하나가 파괴됩니다.\n\n남은 드론: %d.

###Hoshino Sentences
actors.hero.heroclass.hoshino=호시노
actors.hero.heroclass.hoshino_desc_short=하아~암. 적당히 하자고. 여유가 중요한 거니까.\n\n난이도: _쉬움_
actors.hero.heroclass.hoshino_desc=호시노는 움직이기 전까지 추가 방어력을 얻는 _진압 방패 '아이언 호루스'_를 가지고 시작합니다. HG를 사용 중일 경우 방패의 방어력이 감소하지만, 움직여도 효과가 해제되지 않습니다.\n\n호시노는 SG를 잘 다루며, SG를 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n호시노는 탄환이 모두 장전된 총을 재장전하면 추가로 _1발_을 더 장전할 수 있습니다.\n\n호시노는 또한 _1티어 SG_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n호시노는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.hoshino_unlock=호시노는 자동으로 해금됩니다.

actors.hero.herosubclass.shield_bash=방패 돌진
actors.hero.herosubclass.shield_bash_short_desc=호시노는 방패 사용 중 _짧은 거리를 돌진_하여 적에게 피해를 입히고 밀쳐낼 수 있습니다.
actors.hero.herosubclass.shield_bash_desc=호시노는 방패 돌진을 사용해 짧은 거리를 1턴만에 이동할 수 있으며, 이동 후 적에게 부딪혔을 경우 방패의 방어력만큼 피해를 입히고 대상을 밀쳐냅니다. 능력 사용 후 방패 사용을 해제합니다.\n\nHG 이외의 다른 총을 사용 중일 경우:\n이동 가능 거리: 1타일, 밀쳐내는 거리: 4타일\n\nHG를 사용 중일 경우:\n이동 가능 거리: 3타일, 밀쳐내는 거리: 2타일
actors.hero.herosubclass.swift_movement=재빠른 움직임
actors.hero.herosubclass.swift_movement_short_desc=호시노는 근처 위치로 순식간에 이동하고 잔상을 남겨 _적을 교란_할 수 있습니다.
actors.hero.herosubclass.swift_movement_desc=호시노는 주변 1타일 이내의 원하는 위치로 이동하고, 잔상을 남길 수 있습니다. 적은 잔상을 우선 공격하며, 잔상이 공격받을 경우 시야 내 적들의 추적 상태가 해제됩니다. 총을 재장전하면 능력이 다시 활성화됩니다.

actors.hero.hero.hoshino_health_critical_1=으헤, 싸우는 건 익숙하지만, 내 몸 상태는 그렇지 않은가 보네.
actors.hero.hero.hoshino_health_critical_2=저기~ 어디 가서 좀 자면 안 될까?
actors.hero.hero.hoshino_health_critical_3=저기 말이야. 나를 너무 험하게 굴리는 것 같은데, 그러지 말라구.

actors.hero.hero.hoshino_health_warn_1=힘들지 않아~? 저기 가서 낮잠 좀 자자~
actors.hero.hero.hoshino_health_warn_2=좀만 자고 가자~ 응~?
actors.hero.hero.hoshino_health_warn_3=힘들어~ 졸려~ 쉬자~

actors.hero.hero.hoshino_die=이럴 생각은 아니었는데...

actors.hero.hero.hoshino_enemy_defeated_1=소용없어.
actors.hero.hero.hoshino_enemy_defeated_2=후암~ 승리승리~
actors.hero.hero.hoshino_enemy_defeated_3=소용없다구~
actors.hero.hero.hoshino_enemy_defeated_4=후암~ 적당히 이겨버렸네.
actors.hero.hero.hoshino_enemy_defeated_5=으아~ 귀찮아-

actors.hero.hero.hoshino_levelup_1=후아, 더 강해진 건가.
actors.hero.hero.hoshino_levelup_2=응, 좋은 느낌~
actors.hero.hero.hoshino_levelup_3=하~ 더 강해져버렸나.
actors.hero.hero.hoshino_levelup_4=으헤~ 이걸로 더 튼튼해졌어.
actors.hero.hero.hoshino_levelup_5=응? 나쁘지 않구만.
actors.hero.hero.hoshino_levelup_rare=흐음. 나쁘지 않을지도. 이래봬도 점점 강해지고 있다구.

actors.hero.hero.hoshino_too_far=가까운 데로 움직여야 해. 거긴 너무 멀다구.
actors.hero.hero.hoshino_rooted=발이 묶여서 움직일 수가 없어.
actors.hero.hero.hoshino_bad_location=거기로는 움직일 수 없어.
actors.hero.hero.hoshino_shield_cooldown=아직 준비가 안 됐어.

actors.hero.talent.hoshino_t1_1.title=응급 치료
actors.hero.talent.hoshino_t1_1.desc=_+1:_ 공격을 받아 체력이 25% 미만이 되면 _4_의 체력을 즉시 회복합니다.\n\n_+2:_ 공격을 받아 체력이 25% 미만이 되면 _6_의 체력을 즉시 회복합니다.\n\n50턴의 재사용 대기 시간이 있습니다.
actors.hero.talent.hoshino_t1_2.title=산탄총 전문가
actors.hero.talent.hoshino_t1_2.desc=_+1:_ SG를 _착용 시_ 즉시 감정합니다.\n\n_+2:_ SG를 _획득 시_ 즉시 감정합니다.
actors.hero.talent.hoshino_t1_3.title=경무장
actors.hero.talent.hoshino_t1_3.desc=_+1:_ 3티어 이하 방어구의 최대 방어력이 _2_ 증가합니다.\n\n_+2:_ 3티어 이하 방어구의 최대 방어력이 _3_ 증가합니다.
actors.hero.talent.hoshino_t1_4.title=장전 숙련
actors.hero.talent.hoshino_t1_4.desc=_+1:_ 탄환을 모두 소모하고 재장전 시 _3_의 보호막을 얻습니다.\n\n_+2:_ 탄환을 모두 소모하고 재장전 시 _5_의 보호막을 얻습니다.

actors.hero.talent.hoshino_t2_1.title=밥만 먹으면 졸려...
actors.hero.talent.hoshino_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 시 _200_턴의 졸림 효과를 얻습니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 시 _125_턴의 졸림 효과를 얻습니다.\n\n이미 졸림 효과를 가지고 있을 경우 지속 시간을 갱신하지 않습니다.
actors.hero.talent.hoshino_t2_2.title=세상을 꿰뚫어 보는 눈
actors.hero.talent.hoshino_t2_2.desc=_+1:_ 주문서 사용 시 주변 반경 _8타일_을 탐색합니다.\n\n_+2:_ 주문서 사용 시 주변 반경 _12타일_을 탐색합니다.\n\n탐색 범위는 강화의 주문서, 변환의 주문서 및 이 주문서를 재료로 사용하여 만든 연금술 아이템을 사용했을 때 거리가 2배 증가합니다.\n\n사용한 주문서의 수보다 많은 양의 결과물을 제작하는 연금술 아이템(예: 주문)의 경우, 이 특성은 그 결과물의 개수에 따라 탐색 거리가 달라집니다.
actors.hero.talent.hoshino_t2_3.title=진실을 꿰뚫어 보는 눈
actors.hero.talent.hoshino_t2_3.desc=_+1:_ 주변 _2 타일_에 있는 모든 캐릭터에 대해 심안 효과를 얻습니다.\n\n_+2:_ 주변 _3 타일_에 있는 모든 캐릭터에 대해 심안 효과를 얻습니다.
actors.hero.talent.hoshino_t2_4.title=방어막 전개
actors.hero.talent.hoshino_t2_4.desc=_+1:_ 진압 방패 사용 중, 방패 방어력의 _50%_만큼 마법 방어력을 얻습니다.\n\n_+2:_ 진압 방패 사용 중, 방패 방어력의 _75%_만큼 마법 방어력을 얻습니다.
actors.hero.talent.hoshino_t2_5.title=기선 제압
actors.hero.talent.hoshino_t2_5.desc=_+1:_ 적 처치 시 다음 _2발_의 탄환 피해량이 1 증가합니다.\n\n_+2:_ 적 처치 시 다음 _3발_의 탄환 피해량이 1 증가합니다.\n\n발사 횟수는 중첩이 불가능하며, 탄환 피해량은 10까지 중첩 가능합니다.\n탄환으로 적 처치 시 얻는 발사 횟수가 1회 감소합니다.
actors.hero.talent$intimidatebonusdamagebuff.name=탄환 피해 증가
actors.hero.talent$intimidatebonusdamagebuff.desc=일시적으로 탄환의 피해량이 증가했으며, 탄환으로 적을 명중시킬 때마다 효과 지속 횟수가 감소합니다.\n\n피해 증가량: %1$d.\n남은 횟수: %2$d.

actors.hero.talent.hoshino_t3_1.title=전술 진압
actors.hero.talent.hoshino_t3_1.desc=_+1:_ 탄환이 명중한 적에게 가하는 다음 근접 공격이 _7%_ 이하의 체력을 가진 적을 즉시 처치합니다.\n\n_+2:_ 탄환이 명중한 적에게 가하는 다음 근접 공격이 _13%_ 이하의 체력을 가진 적을 즉시 처치합니다.\n\n_+3:_ 탄환이 명중한 적에게 가하는 다음 근접 공격이 _20%_ 이하의 체력을 가진 적을 즉시 처치합니다.
actors.hero.talent.hoshino_t3_2.title=진압 숙련
actors.hero.talent.hoshino_t3_2.desc=_+1:_ 탄환의 근거리 명중률 보정이 기존 -50%에서 _-25%_로 변경됩니다.\n\n_+2:_ 탄환의 근거리 명중률 보정이 기존 -50%에서 _0%_로 변경됩니다.\n\n_+3:_ 탄환의 근거리 명중률 보정이 기존 -50%에서 _+25%_로 변경됩니다.\n\n원거리에서의 탄환은 항상 +50%의 명중률을 얻습니다.

actors.hero.talent.hoshino_ex1_1.title=강한 충격
actors.hero.talent.hoshino_ex1_1.desc=_+1:_ 밀쳐진 대상에게 _2턴_의 멍해짐을 부여하고 방어력을 _1_ 낮춥니다.\n\n_+2:_ 밀쳐진 대상에게 _4턴_의 멍해짐을 부여하고 방어력을 _2_ 낮춥니다.\n\n_+3:_ 밀쳐진 대상에게 _6턴_의 멍해짐을 부여하고 방어력을 _3_ 낮춥니다.
actors.hero.talent.hoshino_ex1_2.title=격돌
actors.hero.talent.hoshino_ex1_2.desc=_+1:_ 방패 돌진이 입히는 피해가 _50%_ 증가하지만, 자신 또한 _4-10_의 피해를 입습니다.\n\n_+2:_ 방패 돌진이 입히는 피해가 _100%_ 증가하지만, 자신 또한 _8-20_의 피해를 입습니다.\n\n_+3:_ 방패 돌진이 입히는 피해가 _150%_ 증가하지만, 자신 또한 _12-30_의 피해를 입습니다.\n\n자가 피해는 방어력을 통해 경감시킬 수 있습니다.
actors.hero.talent.hoshino_ex1_3.title=순간 집중
actors.hero.talent.hoshino_ex1_3.desc=_+1:_ 돌진으로 적을 밀쳐낸 후 5턴 이내에 가하는 다음 물리 공격의 정확성이 _x2배_ 증가합니다.\n\n_+2:_ 돌진으로 적을 밀쳐낸 후 5턴 이내에 가하는 다음 물리 공격의 정확성이 _x5배_ 증가합니다.\n\n_+3:_ 돌진으로 적을 밀쳐낸 후 5턴 이내에 가하는 다음 물리 공격이 _반드시 명중합니다._

actors.hero.talent.hoshino_ex2_1.title=작전 상 후퇴
actors.hero.talent.hoshino_ex2_1.desc=_+1:_ 시야 내에 적이 _4체_ 이상 있다면 잔상이 공격받을 때 5턴의 투명화를 얻습니다.\n\n_+2:_ 시야 내에 적이 _3체_ 이상 있다면 잔상이 공격받을 때 5턴의 투명화를 얻습니다.\n\n_+3:_ 시야 내에 적이 _2체_ 이상 있다면 잔상이 공격받을 때 5턴의 투명화를 얻습니다.
actors.hero.talent.hoshino_ex2_2.title=약점 노출
actors.hero.talent.hoshino_ex2_2.desc=_+1:_ 잔상을 공격한 적을 공격했을 때 해당 적의 체력이 _13%_ 미만이 되면 즉시 처치합니다.\n\n_+2:_ 잔상을 공격한 적을 공격했을 때 해당 적의 체력이 _27%_ 미만이 되면 즉시 처치합니다.\n\n_+3:_ 잔상을 공격한 적을 공격했을 때 해당 적의 체력이 _40%_ 미만이 되면 즉시 처치합니다.
actors.hero.talent.hoshino_ex2_3.title=부비트랩
actors.hero.talent.hoshino_ex2_3.desc=_+1:_ 잔상이 공격당할 때마다 폭발하여 주변 적들에게 _3_의 피해를 입힙니다.\n\n_+2:_ 잔상이 공격당할 때마다 폭발하여 주변 적들에게 _5_의 피해를 입힙니다.\n\n_+3:_ 잔상이 공격당할 때마다 폭발하여 주변 적들에게 _7_의 피해를 입힙니다.\n\n아군은 해당 피해를 입지 않습니다.

actors.hero.talent.hoshino_armor1_1.title=강한 추진력
actors.hero.talent.hoshino_armor1_1.desc=_+1:_ 추격의 사용 가능 범위가 _+1타일_ 증가하고, 추격이 일격사 체력 임곗값보다 _5_ 높은 체력을 가진 적도 즉시 처치합니다.\n\n_+2:_ 추격의 사용 가능 범위가 _+2타일_ 증가하고, 추격이 일격사 체력 임곗값보다 _10_ 높은 체력을 가진 적도 즉시 처치합니다.\n\n_+3:_ 추격의 사용 가능 범위가 _+3타일_ 증가하고, 추격이 일격사 체력 임곗값보다 _15_ 높은 체력을 가진 적도 즉시 처치합니다.\n\n_+4:_ 추격의 사용 가능 범위가 _+4타일_ 증가하고, 추격이 일격사 체력 임곗값보다 _20_ 높은 체력을 가진 적도 즉시 처치합니다.
actors.hero.talent.hoshino_armor1_2.title=밀쳐내기
actors.hero.talent.hoshino_armor1_2.desc=_+1:_ 추격으로 적을 처치하지 못 한 경우 대상을 _2타일_ 밀어내고 _5_의 방어막을 얻습니다.\n\n_+2:_ 추격으로 적을 처치하지 못 한 경우 대상을 _4타일_ 밀어내고 _10_의 방어막을 얻습니다.\n\n_+3:_ 추격으로 적을 처치하지 못 한 경우 대상을 _6타일_ 밀어내고 _15_의 방어막을 얻습니다.\n\n_+4:_ 추격으로 적을 처치하지 못 한 경우 대상을 _8타일_ 밀어내고 _20_의 방어막을 얻습니다.
actors.hero.talent.hoshino_armor1_3.title=연속 추격
actors.hero.talent.hoshino_armor1_3.desc=_+1:_ 추격으로 적을 즉시 처치하면 다음에 사용하는 추격이 _13%_ 적은 충전량을 소모합니다.\n\n_+2:_ 추격으로 적을 즉시 처치하면 다음에 사용하는 추격이 _25%_ 적은 충전량을 소모합니다.\n\n_+3:_ 추격으로 적을 즉시 처치하면 다음에 사용하는 추격이 _38%_ 적은 충전량을 소모합니다.\n\n_+4:_ 추격으로 적을 즉시 처치하면 다음에 사용하는 추격이 _50%_ 적은 충전량을 소모합니다.

actors.hero.talent.hoshino_armor2_1.title=날카로운 가시
actors.hero.talent.hoshino_armor2_1.desc=_+1:_ 가시 방패가 입히는 출혈량이 _25%_ 증가합니다.\n\n_+2:_ 가시 방패가 입히는 출혈량이 _50%_ 증가합니다.\n\n_+3:_ 가시 방패가 입히는 출혈량이 _75%_ 증가합니다.\n\n_+4:_ 가시 방패가 입히는 출혈량이 _100%_ 증가합니다.
actors.hero.talent.hoshino_armor2_2.title=방어 자세
actors.hero.talent.hoshino_armor2_2.desc=_+1:_ 가시 방패 효과 중 진압 방패가 제공하는 방어력이 _+2_ 증가합니다.\n\n_+2:_ 가시 방패 효과 중 진압 방패가 제공하는 방어력이 _+4_ 증가합니다.\n\n_+3:_ 가시 방패 효과 중 진압 방패가 제공하는 방어력이 _+6_ 증가합니다.\n\n_+4:_ 가시 방패 효과 중 진압 방패가 제공하는 방어력이 _+8_ 증가합니다.
actors.hero.talent.hoshino_armor2_3.title=재빠른 준비
actors.hero.talent.hoshino_armor2_3.desc=_+1:_ 진압 방패 재사용 대기 시간 중 능력 사용 시 _10%_ 적은 충전량을 사용하고 재사용 대기 시간을 제거합니다.\n\n_+2:_ 진압 방패 재사용 대기 시간 중 능력 사용 시 _19%_ 적은 충전량을 사용하고 재사용 대기 시간을 제거합니다.\n\n_+3:_ 진압 방패 재사용 대기 시간 중 능력 사용 시 _27%_ 적은 충전량을 사용하고 재사용 대기 시간을 제거합니다.\n\n_+4:_ 진압 방패 재사용 대기 시간 중 능력 사용 시 _33%_ 적은 충전량을 사용하고 재사용 대기 시간을 제거합니다.

actors.hero.talent.hoshino_armor3_1.title=충격 흡수
actors.hero.talent.hoshino_armor3_1.desc=_+1:_ 공격을 막을 때마다 _2_의 체력을 회복합니다.\n\n_+2:_ 공격을 막을 때마다 _4_의 체력을 회복합니다.\n\n_+3:_ 공격을 막을 때마다 _6_의 체력을 회복합니다.\n\n_+4:_ 공격을 막을 때마다 _8_의 체력을 회복합니다.
actors.hero.talent.hoshino_armor3_2.title=충격 반사
actors.hero.talent.hoshino_armor3_2.desc=_+1:_ 공격을 막을 때마다 _25%_ 확률로 공격자를 마비시킵니다.\n\n_+2:_ 공격을 막을 때마다 _50%_ 확률로 공격자를 마비시킵니다.\n\n_+3:_ 공격을 막을 때마다 _75%_ 확률로 공격자를 마비시킵니다.\n\n_+4:_ 공격을 막을 때마다 _100%_ 확률로 공격자를 마비시킵니다.
actors.hero.talent.hoshino_armor3_3.title=연계 동작
actors.hero.talent.hoshino_armor3_3.desc=_+1:_ 공격을 막아내면 _0.5발_의 탄환을 추가로 장전합니다.\n\n_+2:_ 공격을 막아내면 _1발_의 탄환을 추가로 장전합니다.\n\n_+3:_ 공격을 막아내면 _1.5발_의 탄환을 추가로 장전합니다.\n\n_+4:_ 공격을 막아내면 _2발_의 탄환을 추가로 장전합니다.\n\n소수점 이하의 개수는 확률로 적용됩니다.

actors.hero.abilities.hoshino.chase.name=추격
actors.hero.abilities.hoshino.chase.short_desc=호시노는 짧은 거리를 도약해 _목표한 적을 공격할 수 있습니다._
actors.hero.abilities.hoshino.chase.desc=호시노는 추격을 사용해 2타일 이내의 적에게 도약해 공격할 수 있습니다. 적의 체력이 최대 체력의 25% 이하일 경우 적을 즉시 처치하며, 그렇지 않을 경우 20의 방어력 무시 피해를 입힙니다.
actors.hero.abilities.hoshino.chase.too_far=능력을 사용하기에는 너무 멀다.
actors.hero.abilities.hoshino.spikeshield.name=가시 방패
actors.hero.abilities.hoshino.spikeshield.short_desc=호시노는 방패 사용 중 _공격받을 때마다 적에게 출혈 피해를 입힐 수 있습니다._
actors.hero.abilities.hoshino.spikeshield.desc=호시노는 진압 방패 '아이언 호루스' 사용 중 가시 방패를 사용할 수 있으며, 방패의 효과가 유지되는 동안 적에게 물리 피해를 받을 때마다 공격자의 최대 체력에 비례한 출혈 피해를 입힙니다.\n\n가시 방패는 능력 사용에 턴을 소모하지 않으며, 방패 사용이 해제될 때 가시 방패 효과 또한 사라집니다.
actors.hero.abilities.hoshino.spikeshield.no_shield=능력을 사용하기 위해선 진압 방패 '아이언 호루스'를 사용 중이어야 한다!
actors.hero.abilities.hoshino.spikeshield.already_active=이미 능력을 사용 중이다.
actors.hero.abilities.hoshino.spikeshield$spikeshieldbuff.name=가시 방패
actors.hero.abilities.hoshino.spikeshield$spikeshieldbuff.desc=으헤, 가까이 오면 위험하다구. 멀리 가 있어.\n\n아이언 호루스를 전개하는 동안 방패에 가시를 달았어. 이걸 공격하는 녀석들은 꽤나 아플 거야.
actors.hero.abilities.hoshino.shieldparry.name=방패 튕겨내기
actors.hero.abilities.hoshino.shieldparry.short_desc=호시노는 방패 사용 중 1턴 동안 _모든 공격을 막아낼 수 있습니다._
actors.hero.abilities.hoshino.shieldparry.desc=호시노는 진압 방패 '아이언 호루스' 사용 중 방패 튕겨내기를 사용할 수 있으며, 1턴 동안 받는 모든 공격을 피해 없이 막아낼 수 있습니다.
actors.hero.abilities.hoshino.shieldparry.no_shield=능력을 사용하기 위해선 진압 방패 '아이언 호루스'를 사용 중이어야 한다!

###Shiroko Sentences
actors.hero.heroclass.shiroko=시로코
actors.hero.heroclass.shiroko_desc_short=아비도스 대책위원회 2학년 스나오오카미 시로코야. 잘 부탁해.\n\n난이도: _보통_
actors.hero.heroclass.shiroko_desc=시로코는 일정 거리를 두 배의 속도로 빠르게 이동할 수 있는 _자전거_를 가지고 시작합니다.\n\n시로코는 AR을 잘 다루며, AR을 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n시로코는 폭발 속성의 탄을 사용하여 _탄환 명중 시 현재 층수에 비례한 낮은 추가 피해를 입힙니다_.\n\n시로코는 또한 _1티어 AR_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n시로코는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.shiroko_unlock=시로코는 자동으로 해금됩니다.

actors.hero.herosubclass.professional_riding=프로페셔널 라이딩
actors.hero.herosubclass.professional_riding_short_desc=시로코는 _프로페셔널 라이딩_을 배워 자전거를 탑승하는 동안 충전량을 사용해 다양한 액션을 수행할 수 있습니다.
actors.hero.herosubclass.professional_riding_desc=시로코는 자전거 탑승 중 추가적인 충전량을 사용해 다양한 액션을 사용할 수 있습니다.\n\n스키드 마크(충전량 10): 1턴을 소모해 최대 3타일까지 돌진합니다. 낭떠러지를 뛰어넘을 수 있으며, 낭떠러지를 제외한 지나온 자리에 2턴 동안 불을 붙입니다.\n라이딩 리로드(충전량 10): 현재 장착한 총기를 턴 소모 없이 재장전합니다.\n가중 추돌(충전량 15): 근접한 적을 3타일 밀쳐냅니다.\n순간 가속(충전량 20): 다음 1타일 이동에 턴을 소모하지 않고, 이동 후 3턴의 신속을 얻습니다.\n드리프트(충전량 20): 재사용 대기 시간, 턴 소모 없이 자전거에서 내리고 다음 20턴 동안 자전거의 충전 속도가 3배 증가합니다.
actors.hero.herosubclass.bank_robber=은행 털이
actors.hero.herosubclass.bank_robber_short_desc=시로코는 은행 털이범이 되어 모두에게 _공포_를 선사합니다.
actors.hero.herosubclass.bank_robber_desc=시로코는 은행 털이 능력을 사용해 장전된 탄을 모두 소모하고 보이는 모든 적에게 총의 티어와 사용한 탄환 수에 비례한 공포 효과를 부여합니다. 적의 체력이 높을수록 공포 효과가 적게 걸리며, 완전히 건강한 적은 공포 효과에 거의 걸리지 않습니다.\n\n이 방법으로 공포 효과가 20턴 이상 누적될 경우 공포는 20턴의 두려움 효과로 변경되며 해당 적은 전리품을 버리고 당신을 피해 도망치며, 던전에서 완전히 사라질 것입니다.\n\n시로코는 공포와 두려움에 걸린 적을 공격할 때마다 입힌 피해에 따른 골드를 뜯어냅니다.

actors.hero.hero.shiroko_health_critical_1=조금 상태가 안 좋은데.
actors.hero.hero.shiroko_health_critical_2=휴식이 필요할 것 같아.
actors.hero.hero.shiroko_health_critical_3=조금 지치는데.

actors.hero.hero.shiroko_health_warn_1=윽... 조금 위험할지도.
actors.hero.hero.shiroko_health_warn_2=체력을 회복할 만한 물건이 필요해.
actors.hero.hero.shiroko_health_warn_3=몸 상태가 많이 안 좋아...

actors.hero.hero.shiroko_die=조금, 역부족이었나...

actors.hero.hero.shiroko_enemy_defeated_1=흥.
actors.hero.hero.shiroko_enemy_defeated_2=타겟의 무력화를 확인.
actors.hero.hero.shiroko_enemy_defeated_3=전술의 승리다.
actors.hero.hero.shiroko_enemy_defeated_4=클리어.
actors.hero.hero.shiroko_enemy_defeated_5=이동하자.

actors.hero.hero.shiroko_levelup_1=조금 성장한 것 같아.
actors.hero.hero.shiroko_levelup_2=성장하는 걸 알 수 있어.
actors.hero.hero.shiroko_levelup_3=강해지고 있어...
actors.hero.hero.shiroko_levelup_4=기분이 좀 낫네.
actors.hero.hero.shiroko_levelup_5=더 강해진 기분이야.
actors.hero.hero.shiroko_levelup_rare=음... 여기엔 은행은 없는 건가... 아쉽네.

actors.hero.hero.shiroko_bicycle_charged=컨디션이 완전히 회복됐어.
actors.hero.hero.shiroko_ride_cooldown=지금은 자전거를 탈 수 없어.
actors.hero.hero.shiroko_cannot_ride=자전거를 타려면 조금 휴식이 필요해.
actors.hero.hero.shiroko_no_charge=...더 이상 자전거를 타는 건 무리야.
actors.hero.hero.shiroko_dash_bad_position=그 쪽으로는 할 수 없어.
actors.hero.hero.shiroko_cannot_slam=그렇게는 할 수 없어.
actors.hero.hero.shiroko_rooted=...발이 묶여 있어서 안 될 것 같은데...
actors.hero.hero.shiroko_need_gun=음... 그렇게 하려면 총이 필요해.
actors.hero.hero.shiroko_low_str=총이 너무 무거워.
actors.hero.hero.shiroko_no_ammo=발사할 탄환이 없어...
actors.hero.hero.shiroko_cant_find_path=음... 아무래도 길이 없는 것 같아.
actors.hero.hero.shiroko_found_path=길을 찾았어. 따라가 보자.

actors.hero.talent.shiroko_t1_1.title=잠깐 휴식...
actors.hero.talent.shiroko_t1_1.desc=_+1:_ 식사 시 _1_의 체력을 회복합니다.\n\n_+2:_ 식사 시 _2_의 체력을 회복합니다.
actors.hero.talent.shiroko_t1_2.title=돌격소총 전문가
actors.hero.talent.shiroko_t1_2.desc=_+1:_ AR을 _착용 시_ 즉시 감정합니다.\n\n_+2:_ AR을 _획득 시_ 즉시 감정합니다.
actors.hero.talent.shiroko_t1_3.title=폭발탄 강화
actors.hero.talent.shiroko_t1_3.desc=_+1:_ 탄환의 추가 피해량이 _1_ 증가합니다. \n\n_+2:_ 탄환의 추가 피해량이 _2_ 증가합니다.
actors.hero.talent.shiroko_t1_4.title=방어적인 피드백
actors.hero.talent.shiroko_t1_4.desc=_+1:_ 적 처치 시 _5_의 방어막을 얻습니다.\n\n_+2:_ 적 처치 시 _8_의 방어막을 얻습니다.

actors.hero.talent.shiroko_t2_1.title=다시 힘차게
actors.hero.talent.shiroko_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 시 _2턴_의 신속을 얻습니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 시 _3턴_의 신속을 얻습니다.
actors.hero.talent.shiroko_t2_2.title=에너지 드링크
actors.hero.talent.shiroko_t2_2.desc=_+1:_ 물약 사용 시 자전거의 충전량을 _20_ 회복합니다.\n\n_+2:_ 물약 사용 시 자전거의 충전량을 _30_ 회복합니다.\n\n자전거 충전 효과는 힘의 물약, 경험의 물약 및 이 물약을 재료로 사용하여 만든 연금술 아이템을 사용했을 때 2배가 됩니다.\n\n사용한 물약의 수보다 많은 양의 결과물을 제작하는 연금술 아이템(예: 물 혼합물)의 경우, 이 특성은 그 결과물의 개수에 따라 충전량이 달라집니다.
actors.hero.talent.shiroko_t2_3.title=야생의 본능
actors.hero.talent.shiroko_t2_3.desc=_+1:_ 풀 타일 위에 서 있을 때 주변 _3_타일 내의 모든 캐릭터에 대해 심안 효과를 얻습니다.\n\n_+2:_ 풀 타일 위에 서 있을 때 주변 _5_타일 내의 모든 캐릭터에 대해 심안 효과를 얻습니다.
actors.hero.talent.shiroko_t2_4.title=자물쇠 따?기
actors.hero.talent.shiroko_t2_4.desc=_+1:_ 잠긴 문을 _폭발로 열 수 있게 됩니다._\n\n_+2:_ +1의 효과에 더불어, 층에 처음 진입할 때 _잠긴 문 주변 3x3지역을 드러냅니다._\n\n수정 문은 해당하지 않습니다.
actors.hero.talent.shiroko_t2_5.title=자가 발전
actors.hero.talent.shiroko_t2_5.desc=_+1:_ 자전거를 타고 이동할 때마다 마법 막대의 충전량을 _0.05_만큼 추가로 충전합니다.\n\n_+2:_ 자전거를 타고 이동할 때마다 마법 막대의 충전량을 _0.08_만큼 추가로 충전합니다.

actors.hero.talent.shiroko_t3_1.title=완벽한 균형 감각
actors.hero.talent.shiroko_t3_1.desc=_+1:_ 자전거 탑승 중 명중률 보정이 기존 -50%에서 _-25%_로 변경됩니다.\n\n_+2:_ 자전거 탑승 중 명중률 보정이 기존 -50%에서 _0%_로 변경됩니다.\n\n_+3:_ 자전거 탑승 중 명중률 보정이 기존 -50%에서 _+25%_로 변경됩니다.
actors.hero.talent.shiroko_t3_2.title=추적 탄환
actors.hero.talent.shiroko_t3_2.desc=_+1:_ 탄환을 맞춘 적에 대해 _10턴_의 심안 효과를 얻습니다.\n\n_+2:_ 탄환을 맞춘 적에 대해 _20턴_의 심안 효과를 얻습니다.\n\n_+3:_ 탄환을 맞춘 적에 대해 _30턴_의 심안 효과를 얻습니다.

actors.hero.talent.shiroko_ex1_1.title=빠른 충전
actors.hero.talent.shiroko_ex1_1.desc=_+1:_ 자전거 충전 속도가 _17%_ 증가합니다.\n\n_+2:_ 자전거 충전 속도가 _33%_ 증가합니다.\n\n_+3:_ 자전거 충전 속도가 _50%_ 증가합니다.
actors.hero.talent.shiroko_ex1_2.title=잔상
actors.hero.talent.shiroko_ex1_2.desc=_+1:_ 자전거 탑승 중, 추가로 얻은 이동 속도의 _17%_만큼 회피가 증가합니다.\n\n_+2:_ 자전거 탑승 중, 추가로 얻은 이동 속도의 _33%_만큼 회피가 증가합니다.\n\n_+3:_ 자전거 탑승 중, 추가로 얻은 이동 속도의 _50%_만큼 회피가 증가합니다.\n\n이동 속도가 평소보다 느릴 때는 회피가 감소하지 않습니다.
actors.hero.talent.shiroko_ex1_3.title=에코 드라이브
actors.hero.talent.shiroko_ex1_3.desc=_+1:_ 프로페셔널 라이딩 액션이 _17%_적은 충전량을 소모합니다.\n\n_+2:_ 프로페셔널 라이딩 액션이 _33%_적은 충전량을 소모합니다.\n\n_+3:_ 프로페셔널 라이딩 액션이 _50%_적은 충전량을 소모합니다.

actors.hero.talent.shiroko_ex2_1.title=인질극
actors.hero.talent.shiroko_ex2_1.desc=_+1:_ 시야 내에 적이 2체 이상 있을 때, 적과 근접해서 능력을 사용하면 근접한 적 모두를 기절시키고 이미 공포가 부여된 적에게 _20%_ 확률로 두려움을 즉시 부여합니다.\n\n_+2:_ 시야 내에 적이 2체 이상 있을 때, 적과 근접해서 능력을 사용하면 근접한 적 모두를 기절시키고 이미 공포가 부여된 적에게 _40%_ 확률로 두려움을 즉시 부여합니다.\n\n_+3:_ 시야 내에 적이 2체 이상 있을 때, 적과 근접해서 능력을 사용하면 근접한 적 모두를 기절시키고 이미 공포가 부여된 적에게 _60%_ 확률로 두려움을 즉시 부여합니다.
actors.hero.talent.shiroko_ex2_2.title=응. 가진 거 다 내놔.
actors.hero.talent.shiroko_ex2_2.desc=_+1:_ 두려움에 빠진 적이 아이템을 떨어뜨릴 확률이 _33%_ 증가합니다.\n\n_+2:_ 두려움에 빠진 적이 아이템을 떨어뜨릴 확률이 _67%_ 증가합니다.\n\n_+3:_ 두려움에 빠진 적이 아이템을 떨어뜨릴 확률이 _100%_ 증가합니다.
actors.hero.talent.shiroko_ex2_3.title=강도 전문
actors.hero.talent.shiroko_ex2_3.desc=_+1:_ 상점에서 능력 사용 시 소라가 도망치며 모든 아이템이 무료가 되고, _100%_ 확률로 FOX소대원 4명이 소환됩니다.\n\n_+2:_ 상점에서 능력 사용 시 소라가 도망치며 모든 아이템이 무료가 되고, _80%_ 확률로 FOX소대원 4명이 소환됩니다.\n\n_+3:_ 상점에서 능력 사용 시 소라가 도망치며 모든 아이템이 무료가 되고, _60%_ 확률로 FOX소대원 4명이 소환됩니다.

actors.hero.talent.shiroko_armor1_1.title=장애물 관통
actors.hero.talent.shiroko_armor1_1.desc=_+1:_ 탄환의 정확성이 _25%_ 증가하며, _2개_의 단단한 지형을 관통할 수 있습니다.\n\n_+2:_ 탄환의 정확성이 _50%_ 증가하며, _4개_의 단단한 지형을 관통할 수 있습니다.\n\n_+3:_ 탄환의 정확성이 _75%_ 증가하며, _6개_의 단단한 지형을 관통할 수 있습니다.\n\n_+4:_ 탄환의 정확성이 _100%_ 증가하며, _8개_의 단단한 지형을 관통할 수 있습니다.
actors.hero.talent.shiroko_armor1_2.title=갑옷 파괴
actors.hero.talent.shiroko_armor1_2.desc=_+1:_ 탄환이 _25%_ 확률로 적의 방어력을 무시하고 10턴의 취약을 부여합니다.\n\n_+2:_ 탄환이 _50%_ 확률로 적의 방어력을 무시하고 10턴의 취약을 부여합니다.\n\n_+3:_ 탄환이 _75%_ 확률로 적의 방어력을 무시하고 10턴의 취약을 부여합니다.\n\n_+4:_ 탄환이 _100%_ 확률로 적의 방어력을 무시하고 10턴의 취약을 부여합니다.
actors.hero.talent.shiroko_armor1_3.title=다단 히트
actors.hero.talent.shiroko_armor1_3.desc=_+1:_ 탄환의 피해량이 _45%_ 감소하며, _2배_ 더 많이 명중합니다.\n\n_+2:_ 탄환의 피해량이 _60%_ 감소하며, _3배_ 더 많이 명중합니다.\n\n_+3:_ 탄환의 피해량이 _68%_ 감소하며, _4배_ 더 많이 명중합니다.\n\n_+4:_ 탄환의 피해량이 _72%_ 감소하며, _5배_ 더 많이 명중합니다.

actors.hero.talent.shiroko_armor2_1.title=강력한 수류탄
actors.hero.talent.shiroko_armor2_1.desc=_+1:_ 수류탄의 피해량이 _25%_ 증가하며 약화의 지속 시간이 _30%_ 증가합니다.\n\n_+2:_ 수류탄의 피해량이 _50%_ 증가하며 약화의 지속 시간이 _50%_ 증가합니다.\n\n_+3:_ 수류탄의 피해량이 _75%_ 증가하며 약화의 지속 시간이 _80%_ 증가합니다.\n\n_+4:_ 수류탄의 피해량이 _100%_ 증가하며 약화의 지속 시간이 _100%_ 증가합니다.
actors.hero.talent.shiroko_armor2_2.title=섬광 수류탄
actors.hero.talent.shiroko_armor2_2.desc=_+1:_ 수류탄이 _30%_ 확률로 적을 실명시킵니다.\n\n_+2:_ 수류탄이 _60%_ 확률로 적을 실명시킵니다.\n\n_+3:_ 수류탄이 _90%_ 확률로 적을 실명시킵니다.\n\n_+4:_ 수류탄이 적을 실명시키고, _20%_ 확률로 적을 기절시킵니다.
actors.hero.talent.shiroko_armor2_3.title=능숙한 동작
actors.hero.talent.shiroko_armor2_3.desc=_+1:_ 능력 사용 시 _1발_의 탄환을 재장전하며, _25%_ 확률로 턴을 소모하지 않습니다.\n\n_+2:_ 능력 사용 시 _2발_의 탄환을 재장전하며, _50%_ 확률로 턴을 소모하지 않습니다.\n\n_+3:_ 능력 사용 시 _3발_의 탄환을 재장전하며, _75%_ 확률로 턴을 소모하지 않습니다.\n\n_+4:_ 능력 사용 시 _4발_의 탄환을 재장전하며, _100%_ 확률로 턴을 소모하지 않습니다.\n\n탄환은 최대 장탄수를 넘어 장전할 수 있지만, 이미 최대 장탄수를 넘은 경우 추가로 장전되지 않습니다.

actors.hero.talent.shiroko_armor3_1.title=이정표
actors.hero.talent.shiroko_armor3_1.desc=_+1:_ 활성화된 경로가 존재하는 동안 능력을 다시 사용하면 처음 능력을 사용했던 위치로 즉시 이동합니다. 이 때 경로 위에서 능력을 사용할 경우 _30%_ 적은 충전량을 사용합니다.\n\n_+2:_ 활성화된 경로가 존재하는 동안 능력을 다시 사용하면 처음 능력을 사용했던 위치로 즉시 이동합니다. 이 때 경로 위에서 능력을 사용할 경우 _51%_ 적은 충전량을 사용합니다.\n\n_+3:_ 활성화된 경로가 존재하는 동안 능력을 다시 사용하면 처음 능력을 사용했던 위치로 즉시 이동합니다. 이 때 경로 위에서 능력을 사용할 경우 _66%_ 적은 충전량을 사용합니다.\n\n_+4:_ 활성화된 경로가 존재하는 동안 능력을 다시 사용하면 처음 능력을 사용했던 위치로 즉시 이동합니다. 이 때 경로 위에서 능력을 사용할 경우 _76%_ 적은 충전량을 사용합니다.
actors.hero.talent.shiroko_armor3_2.title=경로 이탈 유예
actors.hero.talent.shiroko_armor3_2.desc=_+1:_ 경로 지속 시간이 _25%_ 증가합니다.\n\n_+2:_ 경로 지속 시간이 _50%_ 증가합니다.\n\n_+3:_ 경로 지속 시간이 _75%_ 증가합니다.\n\n_+4:_ 경로 지속 시간이 _100%_ 증가합니다.
actors.hero.talent.shiroko_armor3_3.title=지름길
actors.hero.talent.shiroko_armor3_3.desc=_+1:_ 능력 사용 시 _힘의 물약_이 있는 위치를 드러냅니다.\n\n_+2:_ +1의 효과에 더불어, 능력 사용 시 _강화의 주문서_가 있는 위치를 드러냅니다.\n\n_+3:_ +2의 효과에 더불어, 능력 사용 시 _경험의 물약_이 있는 위치를 드러냅니다.\n\n_+4:_ +3의 효과에 더불어, 능력 사용 시 _변환의 주문서_가 있는 위치를 드러냅니다.

actors.hero.abilities.shiroko.penetrationshot.name=관통 사격
actors.hero.abilities.shiroko.penetrationshot.short_desc=시로코는 탄환을 발사해 _경로상의 모든 적_에게 피해를 줄 수 있습니다.
actors.hero.abilities.shiroko.penetrationshot.desc=시로코는 관통 사격을 사용해 장착한 총기를 지정한 위치로 1발 발사하며, 경로 상에 있는 모든 적에게 탄환 명중 피해를 입힙니다.\n\n관통 사격을 사용하기 위해서는 총기를 장착해야 하며, 최소 1발이 장전되어 있어야 합니다.
actors.hero.abilities.shiroko.penetrationshot.prompt=발사할 위치 선택
actors.hero.abilities.shiroko.penetrationshot.need_gun=능력을 사용하려면 총을 장착해야 한다!
actors.hero.abilities.shiroko.penetrationshot.no_rounds=탄환이 다 떨어졌다.
actors.hero.abilities.shiroko.weakeninggrenade.name=약화 수류탄
actors.hero.abilities.shiroko.weakeninggrenade.short_desc=시로코는 원하는 위치에 _수류탄_을 던져 피해를 입힐 수 있습니다.
actors.hero.abilities.shiroko.weakeninggrenade.desc=시로코는 자전거 탑승 중 반드시 명중하는 수류탄을 원하는 위치에 던져 좁은 범위에 즉시 피해를 입히고 약화를 10턴 부여합니다. 수류탄은 적들을 지나쳐 던질 수 있습니다.
actors.hero.abilities.shiroko.weakeninggrenade.cannot_self=스스로에게는 던지지 않는 편이 좋을 것 같다.
actors.hero.abilities.shiroko.gpsroute.name=GPS 경로 탐색기
actors.hero.abilities.shiroko.gpsroute.short_desc=시로코는 다음 층으로 이동하는 _가장 빠른 경로를 탐색_하고 그 경로를 매우 빠르게 이동할 수 있습니다.
actors.hero.abilities.shiroko.gpsroute.desc=시로코는 GPS 경로 탐색기를 사용해 현재 위치에서 다음 층으로 이동하는 가장 빠른 경로를 탐색하고 드러냅니다.\n\n경로는 8턴 동안 유지되며, 경로 위에 서 있으면 지속 시간이 소모되지 않고 3배 빠른 속도로 움직일 수 있습니다.\n\n활성화된 경로가 존재하는 동안에는 능력을 다시 사용할 수 없습니다.
actors.hero.abilities.shiroko.gpsroute.already_active=이미 활성화된 경로가 존재한다.
actors.hero.abilities.shiroko.gpsroute.cannot_use=그렇게는 할 수 없다.
actors.hero.abilities.shiroko.gpsroute$routebuff.name=GPS 경로 탐색
actors.hero.abilities.shiroko.gpsroute$routebuff.desc=응, 지금 보이는 이 길이 다음 층으로 가는 최단 경로인 것 같아.\n\n이 경로를 따라 가면 훨씬 더 빠르게 이동할 수 있어. 지역을 이동하거나 경로를 벗어난 채로 시간이 지나면 찾아낸 경로가 사라지고 말 거야.\n\n앞으로 _%s턴_ 정도는 벗어나 있어도 될 것 같아.

###Noa Sentences
actors.hero.heroclass.noa=노아
actors.hero.heroclass.noa_desc_short=세미나의 서기, 우시오 노아입니다. 잘 부탁드리겠습니다, 선생님. ...여러모로요.\n\n난이도: _보통_
actors.hero.heroclass.noa_desc=노아는 총기에 부착해 성능을 향상시키는 _컨버전 키트_를 가지고 시작합니다. 컨버전 키트는 총기들 간에 옮겨 붙일 수 있으며, 컨버전 키트에 붙은 _1만큼의 강화 수치_를 옮겨 가져갈 수 있습니다.\n\n노아는 HG를 잘 다루며, HG를 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n빠른 판단력을 가진 노아는 _한 번에 더 넓은 범위를 탐색할 수 있습니다._\n\n노아는 또한 _1티어 HG_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n노아는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.noa_unlock=노아는 자동으로 해금됩니다.

actors.hero.herosubclass.double_barrel=더블 배럴
actors.hero.herosubclass.double_barrel_short_desc=노아는 HG를 보조 무기로 장착할 수 있으며, _탄환 명중 후 보조 무기를 즉시 발사할 수 있습니다._
actors.hero.herosubclass.double_barrel_desc=노아는 HG를 보조 무기로 장착할 수 있게 됩니다.\n\n탄환이 명중하면 보조 무기를 해당 적에게 턴 소모 없이 발사할 수 있으며, 67%의 피해를 입힙니다.\n\n보조 무기를 직접 재장전하는 경우 1턴을 추가로 소모합니다.
actors.hero.herosubclass.conversation=이성적이고 합리적인 대화
actors.hero.herosubclass.conversation_short_desc=노아는 지정한 적에게 _무작위 디버프를 부여하거나 아군으로 만들 수 있습니다._
actors.hero.herosubclass.conversation_desc=노아는 지정한 대상에게 말을 걸어, 실명, 졸림, 멍해짐, 매혹, 광란, 현기증 중 하나를 부여해 적을 약화시킬 수 있습니다. 디버프의 지속 시간은 노아의 레벨이 오를수록 길어지며, 약해진 적에게 능력을 사용하면 매료시켜 아군으로 만들 수 있습니다.

actors.hero.hero.noa_health_critical_1=조금 위험, 할지도... 모르겠네요...
actors.hero.hero.noa_health_critical_2=이제 한계예요...
actors.hero.hero.noa_health_critical_3=잠시 쉬는 건 어떨까요...?

actors.hero.hero.noa_health_warn_1=슬슬 힘에 부치기 시작했어요.
actors.hero.hero.noa_health_warn_2=체력이 부족해요. 이것도 기록해야 하려나...
actors.hero.hero.noa_health_warn_3=이 상태로는 기록이 어려워질 수도 있을 것 같아요.

actors.hero.hero.noa_die=조금 과신했을지도 모르겠어요...

actors.hero.hero.noa_enemy_defeated_1=정리는 이 정도로 해 둘까요.
actors.hero.hero.noa_enemy_defeated_2=이 앞에 어떤 변수가 기다리고 있을까요?
actors.hero.hero.noa_enemy_defeated_3=과연... 거기가 약점이었군요.
actors.hero.hero.noa_enemy_defeated_4=가끔씩은 몸을 움직여야겠죠!
actors.hero.hero.noa_enemy_defeated_5=신속하게 제압하겠습니다.

actors.hero.hero.noa_levelup_1=새로운 것을 습득하는 일은, 언제라도 즐거워요.
actors.hero.hero.noa_levelup_2=후훗, 이건 조금 즐거울지도.
actors.hero.hero.noa_levelup_3=확신할 수는 없지만... 전보다 조금 성장한 걸지도 모르겠어요, 후후.
actors.hero.hero.noa_levelup_4=겉보기엔 변함이 없어 보여도, 꽤나 강해졌답니다?
actors.hero.hero.noa_levelup_5=후훗, 역시 성장한다는 건 언제나 즐겁네요.
actors.hero.hero.noa_levelup_rare=이런 기분도 나쁘지 않네요. 기록해 둬야지...

actors.hero.hero.noa_trap_discover=이 층에 존재하는 함정의 구조와 위치를 전부 기록해 두었습니다.
actors.hero.hero.noa_secondwep_no_ammo=탄약이 다 떨어졌어요!
actors.hero.hero.noa_no_charge=지금은 할 만한 말이 떠오르질 않네요.
actors.hero.hero.noa_cannot_see=전 그런 곳에 말을 걸 만한 괴짜는 아니랍니다.
actors.hero.hero.noa_no_target=저 혼자 떠들어 봐야 의미가 없다구요.
actors.hero.hero.noa_unavailable_target=저 녀석에게는 안 통해요.
actors.hero.hero.noa_unreachable_target=거기 있는 녀석에게는 제 말이 닿지 않을 거예요.
actors.hero.hero.noa_debuff_drowsy_1=히비키 씨로부터 받은 흥미로운 논문 중 그 일부를 소개할게요 - (알아듣기 힘든 탄도학 관련 내용) ...어머? 피곤하셨나 보네요...
actors.hero.hero.noa_debuff_drowsy_2=하레 씨가 드론에 관한 재미있는 내용을 보내 줬어요 - (알아듣기 힘든 항공학 관련 내용) ...벌써 잘 시간인가요? 후훗
actors.hero.hero.noa_debuff_drowsy_3=히마리 씨와 해킹에 대해서 이야기를 나누었을 때의 내용이에요 - (알아듣기 힘든 해킹 관련 내용) ...어라, 아직 할 이야기가 많은데, 아쉽네요...
actors.hero.hero.noa_debuff_charm_1=쉿, 이 쪽으로 오세요... ♡
actors.hero.hero.noa_debuff_charm_2=이리 오시면 재미있는 이야기를 들려 드릴게요... ♡
actors.hero.hero.noa_debuff_charm_3=(웃으며 윙크한다)
actors.hero.hero.noa_debuff_vertigo_1=알고 계셨나요? 사실... (충격적인 내용)
actors.hero.hero.noa_debuff_vertigo_2=아니, 글쎄... (충격적인 내용)
actors.hero.hero.noa_debuff_vertigo_3=(충격적인 내용)이라는 소문을 들었는데, 정말일까요?
actors.hero.hero.noa_debuff_blindness_1=미래에 대해 알아 볼까요? 눈을 감아 보세요. 뭐가 보이나요?
actors.hero.hero.noa_debuff_blindness_2=저번에 최면에 대해 배웠어요. 눈을 감아 볼래요? ...후후.
actors.hero.hero.noa_debuff_blindness_3=(손거울을 꺼내 이리저리 움직인다)
actors.hero.hero.noa_debuff_amok_1=어디서 들었는데, 무츠키 씨는 메스가키? 속성이 있다고 하더라고요.
actors.hero.hero.noa_debuff_amok_2=(미래시 스포일러)
actors.hero.hero.noa_debuff_amok_3=(영화 스포일러)
actors.hero.hero.noa_debuff_daze_1=지금부터 아리스의 매력에 대해 알려 드릴게요. (아리스가 귀여운 이유 154가지를 나열하기 시작한다)
actors.hero.hero.noa_debuff_daze_2=제가 정말 좋아하는 시가 있어요. (시를 낭송하기 시작한다)
actors.hero.hero.noa_debuff_daze_3=최근에 정말 감명 깊게 읽은 구절이 있는데... (시 구절을 읊기 시작한다)
actors.hero.hero.noa_cannot_self=후훗, 저 자신에게 발사하면 안 되죠.
actors.hero.hero.noa_supernova_1=충전 시작!
actors.hero.hero.noa_supernova_2=이 빛에 의지를 담아...
actors.hero.hero.noa_supernova_3=빛이여!!!
actors.hero.hero.noa_supernova_shoot_1=...발사합니다! 밸런스 붕괴!
actors.hero.hero.noa_supernova_shoot_2=갑니다! 밸런스 붕괴!
actors.hero.hero.noa_supernova_shoot_3=...이렇게 하면 되니, 아리스?

actors.hero.talent.noa_t1_1.title=공격 보조 장치
actors.hero.talent.noa_t1_1.desc=_+1:_ 컨버전 키트를 장착한 총기의 근접 공격력이 _1-2_ 증가합니다.\n\n_+2:_ 컨버전 키트를 장착한 총기의 근접 공격력이 _2_ 증가합니다.
actors.hero.talent.noa_t1_2.title=자동권총 전문가
actors.hero.talent.noa_t1_2.desc=_+1:_ HG를 _착용 시_ 즉시 감정합니다.\n\n_+2:_ HG를 _획득 시_ 즉시 감정합니다.
actors.hero.talent.noa_t1_3.title=영점 조절
actors.hero.talent.noa_t1_3.desc=_+1:_ 탄환이 빗나가면 다음 탄환의 정확성이 _+3_ 증가합니다.\n\n_+2:_ 탄환이 빗나가면 다음 탄환의 정확성이 _+5_ 증가합니다.\n\n정확성 증가량은 중첩이 가능하며, 탄환이 명중하면 사라집니다.
actors.hero.talent.noa_t1_4.title=빈틈없는 준비성
actors.hero.talent.noa_t1_4.desc=_+1:_ 탄창이 0발이 되면 _2_의 방어막을 얻습니다.\n\n_+2:_ 탄창이 0발이 되면 _3_의 방어막을 얻습니다.

actors.hero.talent.noa_t2_1.title=휴식도 업무의 일부
actors.hero.talent.noa_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 후 _5턴_동안 매 턴 1의 체력을 회복합니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 후 _8턴_동안 매 턴 1의 체력을 회복합니다.
actors.hero.talent.noa_t2_2.title=복사용지
actors.hero.talent.noa_t2_2.desc=_+1:_ 주문서 사용 시 _20%_ 확률로 빈 주문서를 얻습니다.\n\n_+2:_ 주문서 사용 시 _30%_ 확률로 빈 주문서를 얻습니다.\n\n특성 발동 확률은 강화의 주문서, 변환의 주문서 및 이 주문서를 재료로 사용하여 만든 연금술 아이템을 사용했을 때 2배 증가합니다.\n\n사용한 주문서의 수보다 많은 양의 결과물을 제작하는 연금술 아이템(예: 주문)의 경우, 이 특성은 그 결과물의 개수에 따라 확률이 달라집니다.
actors.hero.talent.noa_t2_3.title=능숙한 탐색
actors.hero.talent.noa_t2_3.desc=_+1:_ 탐색 범위가 _7x7 원형_ 범위로 증가합니다.\n\n_+2:_ 탐색 범위가 _7x7 사각형_ 범위로 증가합니다.
actors.hero.talent.noa_t2_4.title=리로딩 스텝
actors.hero.talent.noa_t2_4.desc=_+1:_ 탄창을 비운 채로 재장전 시 _1턴_ 분량의 거리를 턴 소모 없이 이동 가능합니다.\n\n_+2:_ 탄창을 비운 채로 재장전 시 _2턴_ 분량의 거리를 턴 소모 없이 이동 가능합니다.
actors.hero.talent.noa_t2_5.title=구조 파악
actors.hero.talent.noa_t2_5.desc=_+1:_ 층 진입 시 _30%_ 확률로 함정을 드러내고 위치를 밝힙니다.\n\n_+2:_ 층 진입 시 _50%_ 확률로 함정을 드러내고 위치를 밝힙니다.

actors.hero.talent.noa_t3_1.title=완벽한 정밀성
actors.hero.talent.noa_t3_1.desc=_+1:_ 탄환이 명중하면 다음에 발사하는 탄환의 정확성이 _3배_ 증가합니다.\n\n_+2:_ 탄환이 명중하면 다음에 발사하는 탄환의 정확성이 _5배_ 증가합니다.\n\n_+3:_ 탄환이 명중하면 다음에 발사하는 탄환 _반드시 명중_합니다.
actors.hero.talent.noa_t3_2.title=확장 탄창
actors.hero.talent.noa_t3_2.desc=_+1:_ 총의 최대 장탄수가 _+1발_ 증가합니다.\n\n_+2:_ 총의 최대 장탄수가 _+2발_ 증가합니다.\n\n_+3:_ 총의 최대 장탄수가 _+3발_ 증가합니다.

actors.hero.talent.noa_ex1_1.title=동시 재장전
actors.hero.talent.noa_ex1_1.desc=_+1:_ 주 무기를 재장전하면 보조 무기의 탄약이 _1발_ 장전됩니다.\n\n_+2:_ 주 무기를 재장전하면 보조 무기의 탄약이 _2발_ 장전됩니다.\n\n_+3:_ 주 무기를 재장전하면 보조 무기의 탄약이 _3발_ 장전됩니다.\n\n최대 장탄수를 넘어서 장전되지 않습니다.
actors.hero.talent.noa_ex1_2.title=이중 강화
actors.hero.talent.noa_ex1_2.desc=_+1:_ 주 무기와 보조 무기의 티어 차이가 _2 이상_일 경우 강화 수치가 낮은 쪽의 강화 수치가 높은 쪽의 강화 수치가 됩니다.\n\n_+2:_ 주 무기와 보조 무기의 티어 차이가 _1 이상_일 경우 강화 수치가 낮은 쪽의 강화 수치가 높은 쪽의 강화 수치가 됩니다.\n\n_+3:_ 주 무기와 보조 무기의 티어 차이가 _0 이상_일 경우 강화 수치가 낮은 쪽의 강화 수치가 높은 쪽의 강화 수치가 됩니다.
actors.hero.talent.noa_ex1_3.title=신속 대응
actors.hero.talent.noa_ex1_3.desc=_+1:_ 근접 공격 명중 시 _능력이 활성화_됩니다.\n\n_+2:_ +1의 효과에 더불어, 능력으로 발사한 탄환이 _근접한 적에게 반드시 명중_합니다.\n\n_+3:_ +2의 효과에 더불어, 근접한 적을 처치하면 장착 중인 모든 총기를 재장전합니다. 재장전 시 효과는 발동하지 않습니다.

actors.hero.talent.noa_ex2_1.title=영감 얻기
actors.hero.talent.noa_ex2_1.desc=_+1:_ 주문서 혹은 주문을 사용하면 _2_의 충전량을 회복합니다. 사용한 아이템에 따라 회복량이 달라집니다.\n\n_+2:_ +1의 효과에 더불어, 룬석을 사용하면 _1_의 충전량을 회복합니다.\n\n_+3:_ +2의 효과에 더불어, 충전량 회복량이 _+50%_ 증가합니다.
actors.hero.talent.noa_ex2_2.title=속사포
actors.hero.talent.noa_ex2_2.desc=_+1:_ 능력이 _33%_ 확률로 턴을 소모하지 않습니다.\n\n_+2:_ 능력이 _67%_ 확률로 턴을 소모하지 않습니다.\n\n_+3:_ 능력이 _100%_ 확률로 턴을 소모하지 않습니다.
actors.hero.talent.noa_ex2_3.title=회유
actors.hero.talent.noa_ex2_3.desc=_+1:_ 노아에게 매료된 적은 잃은 체력의 _33%_를 회복합니다.\n\n_+2:_ 노아에게 매료된 적은 잃은 체력의 _67%_를 회복합니다.\n\n_+3:_ 노아에게 매료된 적은 잃은 체력의 _100%_를 회복합니다.

actors.hero.talent.noa_armor1_1.title=함정 무력화
actors.hero.talent.noa_armor1_1.desc=_+1:_ 함정을 해제할 때 주변 3x3 범위의 함정을 최대 _2개_까지 해제합니다.\n\n_+2:_ 함정을 해제할 때 주변 3x3 범위의 함정을 최대 _4개_까지 해제합니다.\n\n_+3:_ 함정을 해제할 때 주변 3x3 범위의 함정을 최대 _6개_까지 해제합니다.\n\n_+4:_ 함정을 해제할 때 주변 3x3 범위의 함정을 최대 _8개_까지 해제합니다.
actors.hero.talent.noa_armor1_2.title=폭약 추가
actors.hero.talent.noa_armor1_2.desc=_+1:_ 저장된 함정을 사용한 위치에 _4-12_ 피해를 입히는 폭발을 발생시킵니다.\n\n_+2:_ 저장된 함정을 사용한 위치에 _6-24_ 피해를 입히는 폭발을 발생시킵니다.\n\n_+3:_ 저장된 함정을 사용한 위치에 _8-36_ 피해를 입히는 폭발을 발생시킵니다.\n\n_+4:_ 저장된 함정을 사용한 위치에 _10-48_ 피해를 입히는 폭발을 발생시킵니다.
actors.hero.talent.noa_armor1_3.title=응용력
actors.hero.talent.noa_armor1_3.desc=_+1:_ 함정을 사용한 후 _10%_ 확률로 해당 함정을 다시 사용할 수 있습니다.\n\n_+2:_ 함정을 사용한 후 _20%_ 확률로 해당 함정을 다시 사용할 수 있습니다.\n\n_+3:_ 함정을 사용한 후 _30%_ 확률로 해당 함정을 다시 사용할 수 있습니다.\n\n_+4:_ 함정을 사용한 후 _40%_ 확률로 해당 함정을 다시 사용할 수 있습니다.

actors.hero.talent.noa_armor2_1.title=홀로그램 복제
actors.hero.talent.noa_armor2_1.desc=_+1:_ 능력이 _25%_ 확률로 2체의 홀로그램을 소환합니다.\n\n_+2:_ 능력이 _50%_ 확률로 2체의 홀로그램을 소환합니다.\n\n_+3:_ 능력이 _75%_ 확률로 2체의 홀로그램을 소환합니다.\n\n_+4:_ 능력이 _100%_ 확률로 2체의 홀로그램을 소환합니다.
actors.hero.talent.noa_armor2_2.title=실체화
actors.hero.talent.noa_armor2_2.desc=_+1:_ 홀로그램이 _15_의 방어막과 _1-4_의 방어력을 얻습니다.\n\n_+2:_ 홀로그램이 _30_의 방어막과 _2-8_의 방어력을 얻습니다.\n\n_+3:_ 홀로그램이 _45_의 방어막과 _3-12_의 방어력을 얻습니다.\n\n_+4:_ 홀로그램이 _60_의 방어막과 _4-16_의 방어력을 얻습니다.
actors.hero.talent.noa_armor2_3.title=흐릿한 형체
actors.hero.talent.noa_armor2_3.desc=_+1:_ 홀로그램이 첫 _2회_의 공격을 반드시 회피합니다.\n\n_+2:_ 홀로그램이 첫 _4회_의 공격을 반드시 회피합니다.\n\n_+3:_ 홀로그램이 첫 _6회_의 공격을 반드시 회피합니다.\n\n_+4:_ 홀로그램이 첫 _8회_의 공격을 반드시 회피합니다.

actors.hero.talent.noa_armor3_1.title=빛?이여!
actors.hero.talent.noa_armor3_1.desc=_+1:_ 능력 사용 시 _50턴_의 발광을 얻습니다.\n\n_+2:_ 능력 사용 시 _100턴_의 발광을 얻습니다.\n\n_+3:_ 능력 사용 시 _150턴_의 발광을 얻습니다.\n\n_+4:_ 능력 사용 시 _200턴_의 발광을 얻습니다.
actors.hero.talent.noa_armor3_2.title=출력 증가
actors.hero.talent.noa_armor3_2.desc=_+1:_ 능력의 피해량이 _25%_ 증가합니다.\n\n_+2:_ 능력의 피해량이 _50%_ 증가합니다.\n\n_+3:_ 능력의 피해량이 _75%_ 증가합니다.\n\n_+4:_ 능력의 피해량이 _100%_ 증가합니다.
actors.hero.talent.noa_armor3_3.title=에너지 재활용
actors.hero.talent.noa_armor3_3.desc=_+1:_ 능력 사용 후 5턴 동안 능력 사용에 _10%_ 적은 충전량을 사용합니다.\n\n_+2:_ 능력 사용 후 5턴 동안 능력 사용에 _19%_ 적은 충전량을 사용합니다.\n\n_+3:_ 능력 사용 후 5턴 동안 능력 사용에 _27%_ 적은 충전량을 사용합니다.\n\n_+4:_ 능력 사용 후 5턴 동안 능력 사용에 _34%_ 적은 충전량을 사용합니다.

actors.hero.abilities.noa.trapduplicate.name=메커니즘 복제
actors.hero.abilities.noa.trapduplicate.short_desc=노아는 _함정을 해제_하여 원하는 위치에 사용할 수 있습니다.
actors.hero.abilities.noa.trapduplicate.desc=노아는 시야 내에 드러나 있는 함정을 해제하고, 지정한 위치에 사용할 수 있습니다. 함정을 사용할 때 스스로의 위치를 선택하면 저장된 함정을 제거하며, 함정을 해제할 때에만 턴과 충전량을 소모합니다.
actors.hero.abilities.noa.trapduplicate.out_of_view=시야 밖에 있는 위치는 선택할 수 없다.
actors.hero.abilities.noa.trapduplicate.no_trap=함정이 없다.
actors.hero.abilities.noa.trapduplicate.trap_preserved=함정이 보존되었다!
actors.hero.abilities.noa.trapduplicate.trap_removed=함정을 제거했다.
actors.hero.abilities.noa.hologram.name=홀로그램 소환
actors.hero.abilities.noa.hologram.short_desc=노아는 장착한 총기를 복제해 발사하는 _홀로그램_을 소환할 수 있습니다.
actors.hero.abilities.noa.hologram.desc=노아는 현재 장착 중인 총기의 탄환 피해를 입히는 홀로그램을 소환할 수 있습니다. 홀로그램은 원거리 공격을 할 수 있습니다.
actors.hero.abilities.noa.hologram.no_space=홀로그램을 소환할 공간이 없다.
actors.hero.abilities.noa.hologram$hologramimage.name=홀로그램 이미지
actors.hero.abilities.noa.hologram$hologramimage.desc=이 홀로그램은 당신의 모습을 똑같이 복제한 모습을 가지고 있습니다. 홀로그램은 사라지기 전까지 당신이 장착한 총기의 탄환 피해량만큼을 입히는 공격을 하지만, 내구력이 낮습니다.\n\n홀로그램의 피해량은 장착 중인 총의 탄환 피해량과 해당 탄환의 타격 수를 곱한 값입니다.
actors.hero.abilities.noa.supernovabeam.name=아리스, 잠깐 빌려 줄래?
actors.hero.abilities.noa.supernovabeam.short_desc=노아는 아리스의 _빛의 검: 슈퍼노바_를 발사할 수 있습니다.
actors.hero.abilities.noa.supernovabeam.desc=노아는 아리스에게서 빛의 검: 슈퍼노바를 잠깐 빌려 발사할 수 있습니다. 빛의 검: 슈퍼노바는 12타일 거리 직선 경로 상의 모든 적들에게 _20-100_의 피해를 입힙니다.

###Miyu Sentences
actors.hero.heroclass.miyu=미유
actors.hero.heroclass.miyu_desc_short=SRT 특수학원, RABBIT 소대의 카스미자와 미유입니다... 저... 이만 돌아가면... 안 되겠죠...?\n\n난이도: _어려움_
actors.hero.heroclass.miyu_desc=미유는 자신을 추적해 오는 적을 교란시키는 _은폐 장치_를 가지고 시작합니다. \n\n미유는 SR을 잘 다루며, SR을 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n미유는 적들의 눈에 잘 띄지 않으며, 이 효과는 레벨이 올라갈수록 강화됩니다. 또한 길게 자란 풀을 짓밟지 않습니다.\n\n미유는 또한 _1티어 SR_, _3개의 투척용 단검_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n미유는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.miyu_unlock=미유는 자동으로 해금됩니다.

actors.hero.herosubclass.telescope=쌍안경 관측
actors.hero.herosubclass.telescope_short_desc=미유는 지정한 위치 주변 좁은 범위를 볼 수 있으며 그 곳에 _장애물을 무시하고 총을 발사할 수 있습니다._
actors.hero.herosubclass.telescope_desc=미유는 능력을 사용해 지정한 위치 주변 3x3타일 범위를 10턴 동안 드러내며 해당 위치에 총을 발사하면 그 위치에 저격을 실시합니다. 저격은 현재 장착한 총의 탄환을 발사하며 장애물을 무시하고 반드시 지정한 위치에 도달합니다.
actors.hero.herosubclass.camouflage=수풀 위장
actors.hero.herosubclass.camouflage_short_desc=미유는 _길게 자란 풀 너머를 볼 수 있으며_ 쓰레기통으로 _적의 시야를 가리고_, _적들의 눈에 훨씬 더 띄지 않게 됩니다._
actors.hero.herosubclass.camouflage_desc=미유는 길게 자란 풀 너머를 볼 수 있게 되고, 쓰레기통을 사용하면 주변의 빈 타일에 적의 시야를 가리는 헤쳐나간 풀을 설치합니다. 또한 기존 2만큼의 은신 성능에 더불어 레벨/3만큼의 은신 성능을 추가로 얻습니다.

actors.hero.hero.miyu_health_critical_1=으으... 슬슬 아슬아슬해요.
actors.hero.hero.miyu_health_critical_2=저격수라면 이 정도는 괜찮아...야 하는데...
actors.hero.hero.miyu_health_critical_3=슬슬 한계일지도 모르겠어요...

actors.hero.hero.miyu_health_warn_1=아얏... 앗, 이 정도는 괜찮아요...
actors.hero.hero.miyu_health_warn_2=조금 다쳤어요...
actors.hero.hero.miyu_health_warn_3=숨어서 조금 쉬고 싶네요...

actors.hero.hero.miyu_die=싫어... 미안합니다...

actors.hero.hero.miyu_enemy_defeated_1=이동하겠습니다.
actors.hero.hero.miyu_enemy_defeated_2=포지션 변경하겠습니다.
actors.hero.hero.miyu_enemy_defeated_3=뭔가 적들이 저를 보고도 지나치는 것 같은데... 기분 탓이겠죠?
actors.hero.hero.miyu_enemy_defeated_4=대상의 무력화를 확인.
actors.hero.hero.miyu_enemy_defeated_5=처치 확인. 이상 없습니다.

actors.hero.hero.miyu_levelup_1=전술에 대한 이해가 보다 깊어졌어요.
actors.hero.hero.miyu_levelup_2=적어도, SRT라는 이름이 부끄럽지 않도록... 힘내겠습니다.
actors.hero.hero.miyu_levelup_3=열심히 성장하겠습니다... 모두의 발목을 잡지 않도록.
actors.hero.hero.miyu_levelup_4=저, 잘 하고 있는 걸까요...?
actors.hero.hero.miyu_levelup_5=강해진 기분...
actors.hero.hero.miyu_levelup_rare=따뜻한 코코아나 한 잔 마셨으면...

actors.hero.hero.miyu_bin_use_1=교란 작전을 수행하겠습니다...
actors.hero.hero.miyu_bin_use_2=적의 추적을 교란합니다...
actors.hero.hero.miyu_bin_use_3=가...갔나요...?
actors.hero.hero.miyu_bin_cooldown=...아직은 사용할 수 없어요...
actors.hero.hero.miyu_cannot_see_wall=아무래도 거긴 안 될 것 같네요...
actors.hero.hero.miyu_need_gun=장착 중인 총이 있어야 해요.
actors.hero.hero.miyu_already_got=이미 쓰던 게 있어요.
actors.hero.hero.miyu_switching_new=RABBIT 4, 대전차 SR을 장비합니다.
actors.hero.hero.miyu_switching_original=RABBIT 4, 소총 사용 완료. 해제하겠습니다...

actors.hero.talent.miyu_t1_1.title=전투 식량
actors.hero.talent.miyu_t1_1.desc=_+1:_ 다음에 탐험하는 몇 개의 층 내에서 상자에 보관되어 있는 건빵을 최대 _4개_ 찾을 수 있게 됩니다.\n\n_+2:_ 다음에 탐험하는 몇 개의 층 내에서 상자에 보관되어 있는 건빵을 최대 _6개_ 찾을 수 있게 됩니다.
actors.hero.talent.miyu_t1_2.title=저격소총 전문가
actors.hero.talent.miyu_t1_2.desc=_+1:_ SR을 _장착 시_ 즉시 감정합니다.\n\n_+2:_ SR을 _획득 시_ 즉시 감정합니다.
actors.hero.talent.miyu_t1_3.title=기습 사격
actors.hero.talent.miyu_t1_3.desc=_+1:_ 적을 처음 기습하는 탄환이 _2 만큼의 추가 피해_를 입힙니다.\n\n_+2:_ 적을 처음 기습하는 탄환이 _3 만큼의 추가 피해_를 입힙니다.
actors.hero.talent.miyu_t1_4.title=자연의 친구
actors.hero.talent.miyu_t1_4.desc=_+1:_ 길게 자란 풀을 밟으면 _2_의 방어막을 얻습니다.\n\n_+2:_ 길게 자란 풀을 밟으면 _3_의 방어막을 얻습니다.

actors.hero.talent.miyu_t2_1.title=고독한 식사
actors.hero.talent.miyu_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 시 _5턴_의 투명화를 얻습니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 시 _8턴_의 투명화를 얻습니다.\n\n건빵은 즉시 먹을 수 있게 됩니다.
actors.hero.talent.miyu_t2_2.title=풀에 물 주기
actors.hero.talent.miyu_t2_2.desc=_+1:_ 미유가 물약, 혼합물, 영약을 마시거나 던진 이후 주변 지역에 최대 _4타일_의 풀을 생성하고, 주변에 있는 적들을 _1턴_동안 속박시킵니다.\n\n_+2:_ 미유가 물약, 혼합물, 영약을 마시거나 던진 이후 주변 지역에 최대 _6타일_의 풀을 생성하고, 주변에 있는 적들을 _2턴_동안 속박시킵니다.\n\n풀의 개수와 속박의 지속시간은 힘의 물약, 경험의 물약 및 이 물약을 재료로 사용하여 만든 연금술 아이템을 사용했을 때 2배가 됩니다.\n\n사용한 물약의 수보다 많은 양의 결과물을 제작하는 연금술 아이템(예: 물 혼합물)의 경우, 이 특성은 그 결과물의 개수에 따라 발동할 확률이 달라집니다.
actors.hero.talent.miyu_t2_3.title=은폐 기술
actors.hero.talent.miyu_t2_3.desc=_+1:_ 길게 자란 풀을 밟으면 _2턴_의 투명화를 얻습니다.\n\n_+2:_ 길게 자란 풀을 밟으면 _3턴_의 투명화를 얻습니다.
actors.hero.talent.miyu_t2_4.title=저격 후 이탈
actors.hero.talent.miyu_t2_4.desc=_+1:_ 탄환으로 적을 처치하면 _3턴_ 분량만큼 즉시 움직일 수 있게 됩니다.\n\n_+2:_ 탄환으로 적을 처치하면 _5턴_ 분량만큼 즉시 움직일 수 있게 됩니다.
actors.hero.talent.miyu_t2_5.title=소음기
actors.hero.talent.miyu_t2_5.desc=_+1:_ 총기 발사 시 _50%_ 확률로 적을 유도하는 소음이 발생하지 않습니다.\n\n_+2:_ 총기 발사 시 _100%_ 확률로 적을 유도하는 소음이 발생하지 않습니다.

actors.hero.talent.miyu_t3_1.title=치명적인 탄환
actors.hero.talent.miyu_t3_1.desc=_+1:_ 적을 기습하는 탄환의 최소 피해량이 최대 피해량과 최소 피해량 간 차이의 _25%_만큼 증가합니다.\n\n_+2:_ 적을 기습하는 탄환의 최소 피해량이 최대 피해량과 최소 피해량 간 차이의 _33%_만큼 증가합니다.\n\n_+3:_ 적을 기습하는 탄환의 최소 피해량이 최대 피해량과 최소 피해량 간 차이의 _50%_만큼 증가합니다.
actors.hero.talent.miyu_t3_2.title=혼자 있을 때 편안한 타입
actors.hero.talent.miyu_t3_2.desc=_+1:_ 적들이 미유를 눈치채지 못 했다면 장착 중인 총기의 강화 수치가 _+1_ 증가합니다.\n\n_+2:_ 적들이 미유를 눈치채지 못 했다면 장착 중인 총기의 강화 수치가 _+2_ 증가합니다.\n\n_+3:_ 적들이 미유를 눈치채지 못 했다면 장착 중인 총기의 강화 수치가 _+3_ 증가합니다.

actors.hero.talent.miyu_ex1_1.title=불릿 타임
actors.hero.talent.miyu_ex1_1.desc=_+1:_ 능력 사용 시 범위 내에 있는 적이 미유로부터 _9 타일_ 이상 떨어져 있을 때 해당 적에게 3턴의 느려짐을 부여합니다.\n\n_+2:_ 능력 사용 시 범위 내에 있는 적이 미유로부터 _6 타일_ 이상 떨어져 있을 때 해당 적에게 3턴의 느려짐을 부여합니다.\n\n_+3:_ 능력 사용 시 범위 내에 있는 적이 미유로부터 _3 타일_ 이상 떨어져 있을 때 해당 적에게 3턴의 느려짐을 부여합니다.
actors.hero.talent.miyu_ex1_2.title=광학 스코프
actors.hero.talent.miyu_ex1_2.desc=_+1:_ 미유의 기본 시야가 _25%_ 증가합니다.\n\n_+2:_ 미유의 기본 시야가 _50%_ 증가합니다.\n\n_+3:_ 미유의 기본 시야가 _75%_ 증가합니다.
actors.hero.talent.miyu_ex1_3.title=준비된 사수
actors.hero.talent.miyu_ex1_3.desc=_+1:_ 능력 사용 시 장착 중인 총에 탄환이 _1발_ 장전됩니다.\n\n_+2:_ 능력 사용 시 장착 중인 총에 탄환이 _2발_ 장전됩니다.\n\n_+3:_ 능력 사용 시 장착 중인 총에 탄환이 _3발_ 장전됩니다.\n\n최대 장탄수를 넘어서 장전할 수 있습니다.

actors.hero.talent.miyu_ex2_1.title=어서 숨어야 해...!
actors.hero.talent.miyu_ex2_1.desc=_+1:_ 적 처치 시 _33%_ 확률로 교란 장치를 즉시 사용할 수 있게 됩니다.\n\n_+2:_ 적 처치 시 _67%_ 확률로 교란 장치를 즉시 사용할 수 있게 됩니다.\n\n_+3:_ 적 처치 시 _100%_ 확률로 교란 장치를 즉시 사용할 수 있게 됩니다.
actors.hero.talent.miyu_ex2_2.title=완벽한 위장
actors.hero.talent.miyu_ex2_2.desc=_+1:_ 능력이 물 타일을 _잔디 타일_로 변경합니다.\n\n_+2:_ 능력이 물 타일을 _헤쳐나간 풀 타일_로 변경합니다.\n\n_+3:_ 능력이 물 타일을 _길게 자란 풀 타일_로 변경합니다.
actors.hero.talent.miyu_ex2_3.title=은신 훈련
actors.hero.talent.miyu_ex2_3.desc=_+1:_ 길게 자란 풀을 밟으면 3턴 이내에 받는 1회의 공격을 _반드시 회피_합니다.\n\n_+2:_ +1의 효과에 더불어, 헤쳐나간 풀에서 _재장전 시간이 2턴 감소_합니다. 이 효과로 재장전 시간은 최소 1턴까지 줄일 수 있습니다.\n\n_+3:_ +2의 효과에 더불어, 헤쳐나간 풀에서 _이동 속도가 2배 증가_합니다.

actors.hero.talent.miyu_armor1_1.title=감각 교란
actors.hero.talent.miyu_armor1_1.desc=_+1:_ 섬광탄이 _25%_ 확률로 10턴의 현기증과 멍해짐을 부여합니다.\n\n_+2:_ 섬광탄이 _50%_ 확률로 10턴의 현기증과 멍해짐을 부여합니다.\n\n_+3:_ 섬광탄이 _75%_ 확률로 10턴의 현기증과 멍해짐을 부여합니다.\n\n_+4:_ 섬광탄이 _100%_ 확률로 10턴의 현기증과 멍해짐을 부여합니다.
actors.hero.talent.miyu_armor1_2.title=충격 강화
actors.hero.talent.miyu_armor1_2.desc=_+1:_ 섬광탄이 _25%_ 확률로 3x3 지역에 있는 모든 대상을 5턴 기절시킵니다.\n\n_+2:_ 섬광탄이 _50%_ 확률로 3x3 지역에 있는 모든 대상을 5턴 기절시킵니다.\n\n_+3:_ 섬광탄이 _75%_ 확률로 3x3 지역에 있는 모든 대상을 5턴 기절시킵니다.\n\n_+4:_ 섬광탄이 _100%_ 확률로 3x3 지역에 있는 모든 대상을 5턴 기절시킵니다.
actors.hero.talent.miyu_armor1_3.title=안전 확보
actors.hero.talent.miyu_armor1_3.desc=_+1:_ 섬광탄에 영향을 받은 대상 1체당 _3_의 방어막을 얻습니다.\n\n_+2:_ 섬광탄에 영향을 받은 대상 1체당 _6_의 방어막을 얻습니다.\n\n_+3:_ 섬광탄에 영향을 받은 대상 1체당 _9_의 방어막을 얻습니다.\n\n_+4:_ 섬광탄에 영향을 받은 대상 1체당 _12_의 방어막을 얻습니다.\n\n최대 10체까지 적용됩니다.

actors.hero.talent.miyu_armor2_1.title=다리 사격
actors.hero.talent.miyu_armor2_1.desc=_+1:_ 탄환이 적을 _2턴_동안 속박하며 _4턴_의 불구를 부여합니다.\n\n_+2:_ 탄환이 적을 _4턴_동안 속박하며 _8턴_의 불구를 부여합니다.\n\n_+3:_ 탄환이 적을 _6턴_동안 속박하며 _12턴_의 불구를 부여합니다.\n\n_+4:_ 탄환이 적을 _8턴_동안 속박하며 _16턴_의 불구를 부여합니다.
actors.hero.talent.miyu_armor2_2.title=무력화
actors.hero.talent.miyu_armor2_2.desc=_+1:_ 탄환이 적에게 _2턴_의 약화와 취약을 부여합니다.\n\n_+2:_ 탄환이 적에게 _3턴_의 약화와 취약을 부여합니다.\n\n_+3:_ 탄환이 적에게 _5턴_의 약화와 취약을 부여합니다.\n\n_+4:_ 탄환이 적에게 _6턴_의 약화와 취약을 부여합니다.
actors.hero.talent.miyu_armor2_3.title=저지력 강화
actors.hero.talent.miyu_armor2_3.desc=_+1:_ 능력의 출혈 부여량이 _10%_ 증가합니다.\n\n_+2:_ 능력의 출혈 부여량이 _20%_ 증가합니다.\n\n_+3:_ 능력의 출혈 부여량이 _30%_ 증가합니다.\n\n_+4:_ 능력의 출혈 부여량이 _40%_ 증가합니다.

actors.hero.talent.miyu_armor3_1.title=운동 에너지 전달
actors.hero.talent.miyu_armor3_1.desc=_+1:_ 탄환에 맞은 적이 밀려나는 거리가 _50%_ 증가합니다.\n\n_+2:_ 탄환에 맞은 적이 밀려나는 거리가 _100%_ 증가합니다.\n\n_+3:_ 탄환에 맞은 적이 밀려나는 거리가 _150%_ 증가합니다.\n\n_+4:_ 탄환에 맞은 적이 밀려나는 거리가 _200%_ 증가합니다.
actors.hero.talent.miyu_armor3_2.title=장비 파괴
actors.hero.talent.miyu_armor3_2.desc=_+1:_ 탄환이 대상에게 _5턴_의 취약을 부여합니다.\n\n_+2:_ 탄환이 대상에게 _10턴_의 취약을 부여합니다.\n\n_+3:_ 탄환이 대상에게 _15턴_의 취약을 부여합니다.\n\n_+4:_ 탄환이 대상에게 _20턴_의 취약을 부여합니다.
actors.hero.talent.miyu_armor3_3.title=넉넉한 보급
actors.hero.talent.miyu_armor3_3.desc=_+1:_ 대전차 SR에 탄환이 _50% 확률로 +1발 더 장전_되며, 장착하고 있던 총을 _50% 확률로 재장전_합니다.\n\n_+2:_ 대전차 SR에 탄환이 _+1발 더 장전_되며, 장착하고 있던 총을 _재장전_합니다.\n\n_+3:_ 대전차 SR에 탄환이 _+1발, 50% 확률로 +2발 더 장전_되며, 장착하고 있던 총을 _재장전하고 추가로 +1발 더 장전_합니다.\n\n_+4:_ _+3:_ 대전차 SR에 탄환이 _+2발 더 장전_되며, 장착하고 있던 총을 _재장전하고 추가로 +2발 더 장전_합니다.

actors.hero.abilities.miyu.flashbang.name=섬광탄 투척!
actors.hero.abilities.miyu.flashbang.short_desc=미유는 섬광탄을 던져 폭발 지점 주변의 _모든 대상을 실명_시킵니다.
actors.hero.abilities.miyu.flashbang.desc=미유는 섬광탄을 던져 폭발 지점 주변 반경 2타일 이내의 모든 대상을 10턴 동안 실명시킵니다. 아군과 자신 모두 포함될 수 있습니다.
actors.hero.abilities.miyu.hpbullet.name=대인 저지탄 장전
actors.hero.abilities.miyu.hpbullet.short_desc=미유는 대인 저지탄을 장전해 다음 탄환이 일반적인 피해 대신 _출혈 피해_를 입히게 합니다.
actors.hero.abilities.miyu.hpbullet.desc=미유는 대인 저지탄을 장전해, 장착 중인 총기에 탄환을 1발 장전하고, 다음에 발사하는 탄환이 반드시 명중하며 일반적인 피해 대신 같은 양의 출혈을 발생시킵니다. 출혈에 면역인 적들에게는 출혈이 발생하지 않고, 특성 또한 발동하지 않습니다.\n\n보스나 강력한 적들은 출혈 효과에 저항할 것입니다.
actors.hero.abilities.miyu.hpbullet$hpbulletbuff.name=대인 저지탄
actors.hero.abilities.miyu.hpbullet$hpbulletbuff.desc=다음 사격은 대인 저지탄이 발사되며, 직접적인 피해를 입히는 대신 동일한 양의 출혈 피해를 입힐 것입니다.\n\n_출혈에 면역인 적에게는 일반적인 피해만 입히며, 보스나 강력한 적들은 이 효과에 저항할 것입니다._
actors.hero.abilities.miyu.antimaterialrifle.name=대물 저격총
actors.hero.abilities.miyu.antimaterialrifle.short_desc=미유는 대전차 SR을 사용해 _벽을 관통하고 적을 날려버릴 수 있습니다._
actors.hero.abilities.miyu.antimaterialrifle.desc=미유는 현재 장착 중인 총기의 강화 수치와 마법 등을 유지한 채로 대전차 SR을 장착합니다.\n\n대전차 SR은 1타일 두께의 벽을 관통하며, 관통한 벽을 무너뜨릴 수 있습니다. 벽을 관통하지 않았다면 탄환이 명중한 적을 4타일 거리만큼 날려보냅니다.\n\n대전차 SR은 6티어 SR의 성능을 가지며, 기본 힘 요구 수치가 18입니다. 대전차 SR의 장탄수를 모두 소모하거나, 재장전하거나, 장착을 해제하면 원래의 총기로 되돌아옵니다. 대전차 SR은 던질 수 없습니다.


###Yuzu Sentences
actors.hero.heroclass.yuzu=유즈
actors.hero.heroclass.yuzu_desc_short=게임개발부 부장... 유즈예요. 저, 정말로... 저를 데려가 주시겠어요?\n\n난이도: _보통_
actors.hero.heroclass.yuzu_desc=유즈는 골드를 사용해 추가 컨텐츠를 구매할 수 있는 _유즈의 노트북_을 가지고 시작합니다.\n\n유즈는 GL을 잘 다루며, GL을 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n유즈는 적 8체당 하나를 퀘스트 대상 몬스터로 지정하며, 해당 적을 처치하면 _추가 경험치와 골드_를 얻습니다. 유즈는 또한 총기 폭발 피해를 _75%_ 경감해 받습니다.\n\n유즈는 또한 _1티어 GL_, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n유즈는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.yuzu_unlock=유즈를 해금하려면 적 하나를 처치하세요.

actors.hero.herosubclass.avant_garde_kun=아방가르드군 탑승!
actors.hero.herosubclass.avant_garde_kun_short_desc=유즈는 _아방가르드군에 탑승_해 조종할 수 있습니다.
actors.hero.herosubclass.avant_garde_kun_desc=유즈는 로봇-아방가르드군-을 호출해 탑승할 수 있으며, 로봇을 조종해 가지고 있는 총을 한 턴에 최대 3정까지 발사할 수 있습니다. 로봇으로 근접 공격 시 적을 밀쳐내며 장착 중인 총을 재장전합니다. 로봇은 유즈가 받는 피해를 대신 받으며, 로봇이 파괴되면 200턴의 재사용 대기 시간이 있습니다.
actors.hero.herosubclass.game_start=게임 스타트!
actors.hero.herosubclass.game_start_short_desc=유즈는 다양한 _콘솔을 구매하여 조작_할 수 있습니다.
actors.hero.herosubclass.game_start_desc=유즈는 이어하기 콘솔을 구매할 수 있게 되며, 특성을 통해 새로운 콘솔을 구매하여 사용할 수 있습니다.\n\n파이터 콘솔: 강력한 근접 공격, 제한된 이동\n\n판타지 콘솔: 적에게 부정적 효과를 주는 마법 공격, 이동 불가\n\n샌드박스 콘솔: 지형을 변경, 이동 불가\n\n_조작 버튼을 꾹 눌러 설명을 확인할 수 있습니다._

actors.hero.hero.yuzu_health_critical_1=괜찮아... 할 수 있어...!
actors.hero.hero.yuzu_health_critical_2=아파...!
actors.hero.hero.yuzu_health_critical_3=조, 조금 힘이 들어요...

