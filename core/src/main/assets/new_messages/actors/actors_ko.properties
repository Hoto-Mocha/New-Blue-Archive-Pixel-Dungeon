actors.hero.hero.yuzu_enemy_defeated_5=어떻게든 해냈네요... 계, 계속할게요.

actors.hero.hero.yuzu_levelup_1=저, 저는 조금도 강하지 않지만...열심히 할게요! 모두가 너무 좋으니까.
actors.hero.hero.yuzu_levelup_2=더 자신있는 제가 되고 싶어요.
actors.hero.hero.yuzu_levelup_3=몸 안에서... 힘이 차오르는 느낌이에요. 이것이... 용기일까요?
actors.hero.hero.yuzu_levelup_4=부족한 저이지만, 분발하겠습니다.
actors.hero.hero.yuzu_levelup_5=힘이 넘쳐 흐르고 있어...!
actors.hero.hero.yuzu_levelup_rare=아리스도 이 곳에서 레벨 업을... 한 걸까요...?

actors.hero.hero.yuzu_no_available_guns=발사할 수 있는 총이 없어요.
actors.hero.hero.yuzu_robot_cooldown=지금은 로봇을 호출할 수 없어요.
actors.hero.hero.yuzu_robot_ready=로봇 출격 준비 완료... 인데, 꼭 타야만 하는 건가요...?
actors.hero.hero.yuzu_robot_destroyed_1=전 기능 작동 불능, 탈출하겠습니다...!
actors.hero.hero.yuzu_robot_destroyed_2=로봇 기능 불가, 비상 탈출 시퀀스를 가동합니다...!
actors.hero.hero.yuzu_robot_destroyed_3=장비 이상 발생, 탈출을 실시합니다...!
actors.hero.hero.yuzu_no_active_console=지금은 이어할 수 있는 게임이 없어요.
actors.hero.hero.yuzu_need_to_be_adjacent=가까이 있는 위치만 지정할 수 있어요.
actors.hero.hero.yuzu_cannot_do=그렇게는 할 수 없어요.
actors.hero.hero.yuzu_cannot_do_boss=여기에서는 할 수 없어요...
actors.hero.hero.yuzu_cabinet=좀 더 있고 싶은데...

actors.hero.talent.yuzu_t1_1.title=다음에는 반드시
actors.hero.talent.yuzu_t1_1.desc=_+1:_ 식사 시 다음 _2회_의 공격이 반드시 치명타가 됩니다.\n\n_+2:_ 식사 시 다음 _3회_의 공격이 반드시 치명타가 됩니다.\n\n확정 치명타 효과는 최대 5회까지 중첩할 수 있습니다.
actors.hero.talent.yuzu_t1_2.title=유탄 발사기 전문가
actors.hero.talent.yuzu_t1_2.desc=_+1:_ GL을 _착용 시_ 즉시 감정합니다.\n\n_+2:_ GL을 _획득 시_ 즉시 감정합니다.
actors.hero.talent.yuzu_t1_3.title=운빨 망겜
actors.hero.talent.yuzu_t1_3.desc=_+1:_ 치명타 피해량이 _3_ 증가합니다.\n\n_+2:_ 치명타 피해량이 _5_ 증가합니다.
actors.hero.talent.yuzu_t1_4.title=안전 장치
actors.hero.talent.yuzu_t1_4.desc=_+1:_ 자신의 총기에 피해를 입거나 근접 사격이 빗나가면 _5_의 방어막을 얻습니다.\n\n_+2:_ 자신의 총기에 피해를 입거나 근접 사격이 빗나가면 _8_의 방어막을 얻습니다.\n\n10턴의 재사용 대기 시간이 있습니다.

actors.hero.talent.yuzu_t2_1.title=버그 제거
actors.hero.talent.yuzu_t2_1.desc=_+1:_ 식사에 1턴만 소모하며, 식사 시 _부정적인 효과를 제거_합니다.\n\n_+2:_ 식사에 1턴만 소모하며, 식사 시 _부정적인 효과를 제거하고 2턴의 청정 효과_를 얻습니다. 허기는 제거하지 않습니다.
actors.hero.talent.yuzu_t2_2.title=맵 보기
actors.hero.talent.yuzu_t2_2.desc=_+1:_ 주문서 사용 시 주변 반경 _8타일_을 탐색합니다.\n\n_+2:_ 주문서 사용 시 주변 반경 _12타일_을 탐색합니다.\n\n탐색 범위는 강화의 주문서, 변환의 주문서 및 이 주문서를 재료로 사용하여 만든 연금술 아이템을 사용했을 때 거리가 2배 증가합니다.\n\n사용한 주문서의 수보다 많은 양의 결과물을 제작하는 연금술 아이템(예: 주문)의 경우, 이 특성은 그 결과물의 개수에 따라 탐색 거리가 달라집니다.
actors.hero.talent.yuzu_t2_3.title=버퍼링
actors.hero.talent.yuzu_t2_3.desc=_+1:_ 물리 피해를 받았을 때 피해의 _44%_를 지연시킵니다.\n\n_+2:_ 물리 피해를 받았을 때 피해의 _55%_를 지연시킵니다.\n\n점성의 상형문자와 중첩이 가능합니다.
actors.hero.talent.yuzu_t2_4.title=연속 콤보
actors.hero.talent.yuzu_t2_4.desc=_+1:_ 치명타 시 다음 공격의 치명타 확률이 _+10%_ 증가합니다.\n\n_+2:_ 치명타 시 다음 공격의 치명타 확률이 _+20%_ 증가합니다.\n\n치명타 확률 증가량은 중첩되지 않습니다.
actors.hero.talent.yuzu_t2_5.title=VIP 페이백
actors.hero.talent.yuzu_t2_5.desc=_+1:_ 노트북 상품 구매 시 사용한 크레딧의 _5%_를 얻습니다.\n\n_+2:_ 노트북 상품 구매 시 사용한 크레딧의 _10%_를 얻습니다.

actors.hero.talent.yuzu_t3_1.title=가챠의 신
actors.hero.talent.yuzu_t3_1.desc=_+1:_ 랜덤 박스에서 좋은 아이템이 나올 확률이 _약간 증가_하며 장비 뽑기에서 나온 아이템이 _5%_ 확률로 추가로 +1만큼 강화됩니다.\n\n_+2:_ 랜덤 박스에서 좋은 아이템이 나올 확률이 _증가_하며 장비 뽑기에서 나온 아이템이 _10%_ 확률로 추가로 +1만큼 강화됩니다.\n\n_+3:_ 랜덤 박스에서 좋은 아이템이 나올 확률이 _크게 증가_하며 장비 뽑기에서 나온 아이템이 _15%_ 확률로 추가로 +1만큼 강화됩니다.
actors.hero.talent.yuzu_t3_2.title=UZQ 모드
actors.hero.talent.yuzu_t3_2.desc=_+1:_ 치명타 시 _33%_ 확률로 다음 공격 1회를 반드시 회피합니다.\n\n_+2:_ 치명타 시 _67%_ 확률로 다음 공격 1회를 반드시 회피합니다.\n\n_+3:_ 치명타 시 _100%_ 확률로 다음 공격 1회를 반드시 회피합니다.\n\n회피 횟수는 중첩되지 않습니다.

actors.hero.talent.yuzu_ex1_1.title=자가 수리
actors.hero.talent.yuzu_ex1_1.desc=_+1:_ 적 처치 시 아방가르드군의 체력을 _2_ 회복합니다. 재사용 대기 시간이 있을 경우 대신 재사용 대기 시간을 _10턴_ 감소시킵니다.\n\n_+2:_ 적 처치 시 아방가르드군의 체력을 _4_ 회복합니다. 재사용 대기 시간이 있을 경우 대신 재사용 대기 시간을 _20턴_ 감소시킵니다.\n\n_+3:_ 적 처치 시 아방가르드군의 체력을 _6_ 회복합니다. 재사용 대기 시간이 있을 경우 대신 재사용 대기 시간을 _30턴_ 감소시킵니다.
actors.hero.talent.yuzu_ex1_2.title=화력 증강
actors.hero.talent.yuzu_ex1_2.desc=_+1:_ 아방가르드군으로 발사하는 총기의 강화 수치가 추가로 _+2_만큼, 최대 _+4_까지 증가합니다.\n\n_+2:_ 아방가르드군으로 발사하는 총기의 강화 수치가 추가로 _+3_만큼, 최대 _+5_까지 증가합니다.\n\n_+3:_ 아방가르드군으로 발사하는 총기의 강화 수치가 추가로 _+3_만큼, 최대 _+6_까지 증가합니다.
actors.hero.talent.yuzu_ex1_3.title=드릴 굴착
actors.hero.talent.yuzu_ex1_3.desc=_+1:_ 아방가르드군으로 _3턴_을 소모해 인접한 벽을 파괴할 수 있습니다.\n\n_+2:_ 아방가르드군으로 _2턴_을 소모해 인접한 벽을 파괴할 수 있습니다.\n\n_+3:_ 아방가르드군으로 _1턴_을 소모해 인접한 벽을 파괴할 수 있습니다.\n\n보스 층에서는 벽을 파괴할 수 없습니다.

actors.hero.talent.yuzu_ex2_1.title=파이터 콘솔
actors.hero.talent.yuzu_ex2_1.desc=_+1:_ _파이터 콘솔_을 구매할 수 있게 됩니다.\n\n_+2:_ +1의 효과에 더불어, 파이터 콘솔의 근접 공격력이 _완력의 반지 +2_만큼 증가합니다.\n\n_+3:_ +1의 효과에 더불어, 파이터 콘솔의 근접 공격력이 _완력의 반지 +4_만큼 증가합니다.\n\n파이터 콘솔의 근접 공격력은 완력의 반지 +0을 장착한 것과 동일합니다.
actors.hero.talent.yuzu_ex2_2.title=판타지 콘솔
actors.hero.talent.yuzu_ex2_2.desc=_+1:_ _판타지 콘솔_을 구매할 수 있게 됩니다.\n\n_+2:_ +1의 효과에 더불어, 판타지 콘솔의 기본 피해량이 _10-30_으로 증가합니다.\n\n_+3:_ +1의 효과에 더불어, 판타지 콘솔의 기본 피해량이 _15-40_으로 증가합니다.\n\n판타지 콘솔의 기본 피해량은 _5-20_입니다.
actors.hero.talent.yuzu_ex2_3.title=샌드박스 콘솔
actors.hero.talent.yuzu_ex2_3.desc=_+1:_ _샌드박스 콘솔_을 구매할 수 있게 됩니다.\n\n_+2:_ +1의 효과에 더불어, 샌드박스 콘솔 사용 시 _12_개의 토큰을 얻습니다.\n\n_+3:_ +1의 효과에 더불어, 샌드박스 콘솔 사용 시 _15_개의 토큰을 얻습니다.\n\n샌드박스 콘솔의 기본 토큰 제공량은 10개입니다.

actors.hero.talent.yuzu_armor1_1.title=신들린 컨트롤
actors.hero.talent.yuzu_armor1_1.desc=_+1:_ PVP 신청 시 다음 _0.5회_의 공격을 반드시 회피합니다.\n\n_+2:_ PVP 신청 시 다음 _1회_의 공격을 반드시 회피합니다.\n\n_+3:_ PVP 신청 시 다음 _1.5회_의 공격을 반드시 회피합니다.\n\n_+4:_ PVP 신청 시 다음 _2회_의 공격을 반드시 회피합니다.\n\n소수점 아래의 횟수는 그만큼의 확률로 적용됩니다.
actors.hero.talent.yuzu_armor1_2.title=한숨 돌리기
actors.hero.talent.yuzu_armor1_2.desc=_+1:_ PVP가 끝나기 전 적을 처치할 경우 PVP 동안 받은 총 피해의 _30% + 5_ 만큼의 체력을 회복합니다.\n\n_+2:_ PVP가 끝나기 전 적을 처치할 경우 PVP 동안 받은 총 피해의 _50% + 10_ 만큼의 체력을 회복합니다.\n\n_+3:_ PVP가 끝나기 전 적을 처치할 경우 PVP 동안 받은 총 피해의 _65% + 15_ 만큼의 체력을 회복합니다.\n\n_+4:_ PVP가 끝나기 전 적을 처치할 경우 PVP 동안 받은 총 피해의 _75% + 20_ 만큼의 체력을 회복합니다.
actors.hero.talent.yuzu_armor1_3.title=전투광
actors.hero.talent.yuzu_armor1_3.desc=_+1:_ PVP가 끝난 직후 3턴 이내에 다시 PVP를 신청할 경우 충전량 소모가 _16%_ 감소합니다.\n\n_+2:_ PVP가 끝난 직후 3턴 이내에 다시 PVP를 신청할 경우 충전량 소모가 _30%_ 감소합니다.\n\n_+3:_ PVP가 끝난 직후 3턴 이내에 다시 PVP를 신청할 경우 충전량 소모가 _40%_ 감소합니다.\n\n_+4:_ PVP가 끝난 직후 3턴 이내에 다시 PVP를 신청할 경우 충전량 소모가 _50%_ 감소합니다.

actors.hero.talent.yuzu_armor2_1.title=숨겨둔 간식
actors.hero.talent.yuzu_armor2_1.desc=_+1:_ 능력 사용 시 _25_의 허기와 _3_의 체력을 회복하고, _25%_ 확률로 식사 시 효과가 발동합니다.\n\n_+2:_ 능력 사용 시 _50_의 허기와 _6_의 체력을 회복하고, _50%_ 확률로 식사 시 효과가 발동합니다.\n\n_+3:_ 능력 사용 시 _75_의 허기와 _9_의 체력을 회복하고, _75%_ 확률로 식사 시 효과가 발동합니다.\n\n_+4:_ 능력 사용 시 _100_의 허기와 _12_의 체력을 회복하고, _100%_ 확률로 식사 시 효과가 발동합니다.
actors.hero.talent.yuzu_armor2_2.title=재정비 시간
actors.hero.talent.yuzu_armor2_2.desc=_+1:_ 능력 사용 시 장착 중인 총기를 _1발_ 장전합니다.\n\n_+2:_ 능력 사용 시 장착 중인 총기를 _2발_ 장전합니다.\n\n_+3:_ 능력 사용 시 장착 중인 총기를 _3발_ 장전합니다.\n\n_+4:_ 능력 사용 시 장착 중인 총기를 _4발_ 장전합니다.\n\n최대 장탄수를 넘어서 장전할 수 있습니다.
actors.hero.talent.yuzu_armor2_3.title=도망치기
actors.hero.talent.yuzu_armor2_3.desc=_+1:_ 효과 종료 시 시야 내에 적이 있다면 _2턴_의 초신속을 얻습니다.\n\n_+2:_ 효과 종료 시 시야 내에 적이 있다면 _4턴_의 초신속을 얻습니다.\n\n_+3:_ 효과 종료 시 시야 내에 적이 있다면 _6턴_의 초신속을 얻습니다.\n\n_+4:_ 효과 종료 시 시야 내에 적이 있다면 _8턴_의 초신속을 얻습니다.

actors.hero.talent.yuzu_armor3_1.title=무적
actors.hero.talent.yuzu_armor3_1.desc=_+1:_ 노트북에서 _무적_을 구매할 수 있게 되며, 구매 시 _30_의 방어막을 얻습니다.\n\n_+2:_ 노트북에서 _무적_을 구매할 수 있게 되며, 구매 시 _60_의 방어막을 얻습니다.\n\n_+3:_ 노트북에서 _무적_을 구매할 수 있게 되며, 구매 시 _90_의 방어막을 얻습니다.\n\n_+4:_ 노트북에서 _무적_을 구매할 수 있게 되며, 구매 시 _120_의 방어막을 얻습니다.\n\n무적은 능력 사용 한 번당 1회만 구매할 수 있습니다.
actors.hero.talent.yuzu_armor3_2.title=무한 탄창
actors.hero.talent.yuzu_armor3_2.desc=_+1:_ 노트북에서 _무한 탄창_을 구매할 수 있게 되며, 구매 시 _5턴_의 무한 탄창을 얻습니다.\n\n_+2:_ 노트북에서 _무한 탄창_을 구매할 수 있게 되며, 구매 시 _10턴_의 무한 탄창을 얻습니다.\n\n_+3:_ 노트북에서 _무한 탄창_을 구매할 수 있게 되며, 구매 시 _15턴_의 무한 탄창을 얻습니다.\n\n_+4:_ 노트북에서 _무한 탄창_을 구매할 수 있게 되며, 구매 시 _20턴_의 무한 탄창을 얻습니다.
actors.hero.talent.yuzu_armor3_3.title=크레딧 환산
actors.hero.talent.yuzu_armor3_3.desc=_+1:_ 노트북에서 _크레딧 환산_을 구매할 수 있게 되며, 구매 시 VIP 멤버심의 남은 1턴 당 _100 크레딧_을 얻고 VIP 멤버십을 종료합니다.\n\n_+2:_ 노트북에서 _크레딧 환산_을 구매할 수 있게 되며, 구매 시 VIP 멤버심의 남은 1턴 당 _150 크레딧_을 얻고 VIP 멤버십을 종료합니다.\n\n_+3:_ 노트북에서 _크레딧 환산_을 구매할 수 있게 되며, 구매 시 VIP 멤버심의 남은 1턴 당 _200 크레딧_을 얻고 VIP 멤버십을 종료합니다.\n\n_+4:_ 노트북에서 _크레딧 환산_을 구매할 수 있게 되며, 구매 시 VIP 멤버심의 남은 1턴 당 _250 크레딧_을 얻고 VIP 멤버십을 종료합니다.

actors.hero.abilities.yuzu.pvp.name=PVP
actors.hero.abilities.yuzu.pvp.prompt=PVP할 적을 선택하세요
actors.hero.abilities.yuzu.pvp.already_dueling=당신은 이미 PVP 중이다.
actors.hero.abilities.yuzu.pvp.ally_target=적에게만 PVP를 신청할 수 있다.
actors.hero.abilities.yuzu.pvp.unreachable_target=PVP를 신청하려면 대상에게 도달할 수 있어야 한다.
actors.hero.abilities.yuzu.pvp.distant_target=그 적은 PVP하기에는 너무 멀리 있다.
actors.hero.abilities.yuzu.pvp.short_desc=유즈는 근처의 적에게 _PVP_를 신청해 다른 모든 적들의 행동을 일시적으로 멈춥니다.
actors.hero.abilities.yuzu.pvp.desc=유즈는 근처의 적에게 PVP를 신청합니다. 그 적은 다른 모든 적의 시간이 멈춘 사이 유즈와 싸워야 합니다.\n\n대상은 유즈와 5타일 거리 이내의 도달 가능한 위치에 있어야 합니다. PVP는 10턴이 지나거나, 적이 죽거나, 유즈와 적의 거리가 5타일보다 멀어질 때까지 이어집니다.\n\n시간이 멈춘 다른 적들은 어떤 피해도 받지 않습니다. 유즈의 아군들은 영향을 받지 않지만, 보스와 PVP를 할 경우 보스가 불러낸 부하도 영향을 받지 않습니다.
actors.hero.abilities.yuzu.pvp$duelparticipant.name=PVP 대상
actors.hero.abilities.yuzu.pvp$duelparticipant.desc=이 대상은 PVP에 참여하고 있습니다. 다른 모든 적의 시간이 멈춘 사이 대상과 대상의 아군 내지는 부하들만이 정상적으로 행동할 수 있습니다.\n\nPVP는 정해진 시간이 다하거나 참가자 하나가 죽거나 서로의 거리가 5타일보다 더 멀어질 때까지 이어집니다.\n\n남은 턴: %d.
actors.hero.abilities.yuzu.cabinet.name=캐비닛 숨기
actors.hero.abilities.yuzu.cabinet.short_desc=유즈는 _안전한 캐비닛_에 들어가 잠시 동안 방해받지 않고 시간을 보낼 수 있습니다.
actors.hero.abilities.yuzu.cabinet.desc=유즈는 20턴 동안 캐비넷에 들어가며, 그 동안 적들에게 보이지 않으며 무적이 되고 움직일 수 없습니다.
actors.hero.abilities.yuzu.vipmembership.name=VIP 멤버십
actors.hero.abilities.yuzu.vipmembership.short_desc=유즈는 잠시 동안 _VIP 멤버십 컨텐츠_에 접근할 수 있게 됩니다.
actors.hero.abilities.yuzu.vipmembership.desc=유즈는 30턴의 축복과 30의 방어막을 얻으며, 10턴 동안 VIP 멤버십 컨텐츠를 구매할 수 있습니다. VIP 멤버십 컨텐츠는 특성을 통해 해금하고 강화할 수 있습니다.
actors.hero.abilities.yuzu.vipmembership$vipbuff.name=VIP 멤버십
actors.hero.abilities.yuzu.vipmembership$vipbuff.desc=VIP 컨텐츠에 접근할 수 있는 권한이 생겼습니다!\n\n남은 턴: _%s_.

###Izuna Sentences
actors.hero.heroclass.izuna=이즈나
actors.hero.heroclass.izuna_desc_short=이즈나! 선생님의... 아니, 주군의 부름을 듣고 달려왔습니다~! 닌닌!\n\n난이도: _보통_
actors.hero.heroclass.izuna_desc=이즈나는 짧은 거리를 이동하고 은신할 수 있는 _닌자 망토_를 가지고 시작합니다.\n\n이즈나는 투척 무기를 잘 다루며, 투척 무기를 정상적으로 다루는 데에 _1만큼 적은 힘_을 사용합니다.\n\n이즈나는 적을 기습 공격했을 때 강한 피해를 주는 _암살 쿠나이_를 가지고 시작합니다.\n\n이즈나는 또한 _1티어 SMG_, 3개의 투척용 단검, 천 교복, 가죽 물통, 벨벳 주머니를 가지고 던전에 입장합니다.\n\n이즈나는 다음 아이템을 감정한 채로 시작합니다.\n_-_ 감정의 주문서\n_-_ 치유 물약\n_-_ 분노의 주문서
actors.hero.heroclass.izuna_unlock=이즈나를 해금하려면 적 하나를 처치하세요.

actors.hero.herosubclass.switching=바꿔치기의 술!
actors.hero.herosubclass.switching_short_desc=이즈나는 닌자 망토를 사용 시 적들을 유인하는 _여우 인형_을 소환할 수 있습니다.
actors.hero.herosubclass.switching_desc=바꿔치기의 술을 익힌 이즈나는 닌자 망토의 충전 속도가 50% 증가하고, 닌자 망토를 사용한 후 원래 있던 위치에 적들의 공격을 대신 받는 여우 인형을 소환합니다.\n\n여우 인형은 최대 1체만 유지할 수 있으며, 여우 인형의 체력은 10, 방어력은 1-3입니다.
actors.hero.herosubclass.chase=쓱싹 해치우기!
actors.hero.herosubclass.chase_short_desc=이즈나는 투척 무기 명중 후 적에게 _즉시 다가가 근접 공격을 할 수 있습니다._
actors.hero.herosubclass.chase_desc=이즈나는 투척 무기가 명중한 적에게 4+(투척 무기의 강화수치) 턴 이내에 순간이동하여 근접 공격을 할 수 있습니다.

actors.hero.hero.izuna_health_critical_1=아얏, 이 정도 쯤은...!
actors.hero.hero.izuna_health_critical_2=캥! 캥!
actors.hero.hero.izuna_health_critical_3=조금 아파도 닌자는 울지 않으니까요...

actors.hero.hero.izuna_health_warn_1=조금 지치네요...
actors.hero.hero.izuna_health_warn_2=주군, 주군, 저기에서 쉬었다 가는 건 어때요?
actors.hero.hero.izuna_health_warn_3=주군, 혹시 회복에 쓸 만한 아이템을 못 보셨나요?

actors.hero.hero.izuna_die=꺄악! 눈앞이... 빙글빙글...

actors.hero.hero.izuna_enemy_defeated_1=임무 개시!
actors.hero.hero.izuna_enemy_defeated_2=다음 작전 구역까지 달리기입니다!
actors.hero.hero.izuna_enemy_defeated_3=이즈나, 이동합니다!
actors.hero.hero.izuna_enemy_defeated_4=얍! 이 정도는 여유롭습니다!
actors.hero.hero.izuna_enemy_defeated_5=이즈나에겐 안 통해요!

actors.hero.hero.izuna_levelup_1=인법! 레벨 업의 술!
actors.hero.hero.izuna_levelup_2=제 수리검도 강해지는 게 느껴져요!
actors.hero.hero.izuna_levelup_3=앗, 주군! 방금 레벨이 올랐어요!
actors.hero.hero.izuna_levelup_4=이즈나는 지금 최강을 향해 전진하고 있습니다!
actors.hero.hero.izuna_levelup_5=레벨 업을 해도 달리기 속도는 안 늘어나네요...
actors.hero.hero.izuna_levelup_rare=이즈나가 레벨 업을 많이 하면 도넛을 만들 수 있게 된다고 들었어요!

actors.hero.hero.izuna_fov=이즈나가 볼 수 있는 곳으로만 이동할 수 있어요!
actors.hero.hero.izuna_enemy=그리로 가면 부딪히고 말 거예요...
actors.hero.hero.izuna_distance=거긴 너무 멀어요...
actors.hero.hero.izuna_solid=벽 속으로 들어갈 순 없어요!
actors.hero.hero.izuna_cannot_self=이건 저한테 던지면 안 돼요!
actors.hero.hero.izuna_cannot_move=지금은 움직일 수 없어요...

actors.hero.talent.izuna_t1_1.title=꼼꼼한 관리
actors.hero.talent.izuna_t1_1.desc=_+1:_ 투척 무기의 내구도가 _+3_ 증가합니다.\n\n_+2:_ 투척 무기의 내구도가 _+5_ 증가합니다.
actors.hero.talent.izuna_t1_2.title=투척 무기 전문가
actors.hero.talent.izuna_t1_2.desc=_+1:_ 투척 무기의 감정 속도가 _x3_배 증가합니다.\n\n_+2:_ 투척 무기를 명중 시 _즉시 감정_합니다.
actors.hero.talent.izuna_t1_3.title=이즈나류 인법! 따끔따끔의 술!
actors.hero.talent.izuna_t1_3.desc=_+1:_ 이즈나가 공격받으면 50% 확률로 공격자에게 _1_의 출혈을 발생시킵니다.\n\n_+2:_ 이즈나가 공격받으면 50% 확률로 공격자에게 _1-2_의 출혈을 발생시킵니다.
actors.hero.talent.izuna_t1_4.title=그림자 숨기
actors.hero.talent.izuna_t1_4.desc=_+1:_ 투명화 상태가 되면 _매 2턴마다_ 1 의 방어막을 얻으며, _최대 3_ 까지 얻을 수 있습니다.\n\n_+2:_ 투명화 상태가 되면 _매 1턴마다_ 1 의 방어막을 얻으며, _최대 5_ 까지 얻을 수 있습니다.

actors.hero.talent.izuna_t2_1.title=도시락 시간
actors.hero.talent.izuna_t2_1.desc=_+1:_ 식사에 1 턴만 소모되며, 식사 시 _3 턴의 유물 충전 효과_를 얻습니다.\n\n_+2:_ 식사에 1 턴만 소모되며, 식사 시 _5 턴의 유물 충전 효과_를 얻습니다.\n\n풍요의 뿔로 유물 충전 효과를 얻은 경우 풍요의 뿔은 충전되지 않습니다.
actors.hero.talent.izuna_t2_2.title=보호의 두루마리
actors.hero.talent.izuna_t2_2.desc=_+1:_ 주문서, 주문을 사용한 이후 _10_의 방어막을 얻습니다.\n\n_+2:_ 주문서, 주문을 사용한 이후 _15_의 방어막을 얻습니다.\n\n방어막의 양은 강화의 주문서, 변환의 주문서 및 이 주문서를 재료로 사용하여 만든 연금술 아이템을 사용했을 때 2배가 됩니다.\n\n사용한 물약의 수보다 많은 양의 결과물을 제작하는 연금술 아이템(예: 주문)의 경우, 이 특성은 그 결과물의 개수에 따라 방어막의 양이 달라집니다.
actors.hero.talent.izuna_t2_3.title=물 위 달리기
actors.hero.talent.izuna_t2_3.desc=_+1:_ 물 위에서 이즈나의 이동 속도가 _50%_ 증가합니다.\n\n_+2:_ 물 위에서 이즈나의 이동 속도가 _100%_ 증가합니다.
actors.hero.talent.izuna_t2_4.title=살금살금 걷기
actors.hero.talent.izuna_t2_4.desc=_+1:_ 적이 _3타일 이상_ 떨어져 있을 경우 자고 있는 적을 깨우지 않습니다.\n\n_+2:_ _적에게 근접하지 않는 한_ 자고 있는 적을 깨우지 않습니다.
actors.hero.talent.izuna_t2_5.title=순식간에 사라지기
actors.hero.talent.izuna_t2_5.desc=_+1:_ 근접하지 않은 적을 처치하면 _3턴_의 초신속을 얻습니다.\n\n_+2:_ 근접하지 않은 적을 처치하면 _5턴_의 초신속을 얻습니다.

actors.hero.talent.izuna_t3_1.title=추적
actors.hero.talent.izuna_t3_1.desc=_+1:_ 투척 무기를 맞춘 적에 대해 _5턴_의 심안 효과를 얻습니다.\n\n_+2:_ 투척 무기를 맞춘 적에 대해 _10턴_의 심안 효과를 얻습니다.\n\n_+3:_ 투척 무기를 맞춘 적에 대해 _15턴_의 심안 효과를 얻습니다.
actors.hero.talent.izuna_t3_2.title=경량화 망토
actors.hero.talent.izuna_t3_2.desc=_+1:_ 이즈나는 닌자 망토를 착용하지 않고도 사용할 수 있지만, 착용하지 않은 망토는 충전 속도가 _25%_로 감소합니다.\n\n_+2:_ 이즈나는 닌자 망토를 착용하지 않고도 사용할 수 있지만, 착용하지 않은 망토는 충전 속도가 _50%_로 감소합니다.\n\n_+3:_ 이즈나는 닌자 망토를 착용하지 않고도 사용할 수 있지만, 착용하지 않은 망토는 충전 속도가 _75%_로 감소합니다.

actors.hero.talent.izuna_ex1_1.title=튼튼한 인형
actors.hero.talent.izuna_ex1_1.desc=_+1:_ 여우 인형의 체력이 _20_, 방어력이 _2-6_으로 증가합니다.\n\n_+2:_ 여우 인형의 체력이 _30_, 방어력이 _3-9_로 증가합니다.\n\n_+3:_ 여우 인형의 체력이 _40_, 방어력이 _3-12_로 증가합니다.
actors.hero.talent.izuna_ex1_2.title=방심 유도
actors.hero.talent.izuna_ex1_2.desc=_+1:_ 여우 인형이 공격받을 때마다 공격한 적이 _1턴_의 취약을 얻습니다.\n\n_+2:_ 여우 인형이 공격받을 때마다 공격한 적이 _2턴_의 취약을 얻습니다.\n\n_+3:_ 여우 인형이 공격받을 때마다 공격한 적이 _3턴_의 취약을 얻습니다.
actors.hero.talent.izuna_ex1_3.title=장애물 넘기
actors.hero.talent.izuna_ex1_3.desc=_+1:_ 닌자 망토의 최대 이동 거리가 _1타일_ 증가합니다.\n\n_+2:_ +1의 효과에 더불어, 탐색된 위치에 한해 _시야가 없어도_ 닌자 망토를 사용할 수 있습니다.\n\n_+3:_ +2의 효과에 더불어, 닌자 망토 사용 시 1턴의 초신속을 얻습니다.

actors.hero.talent.izuna_ex2_1.title=허 찌르기
actors.hero.talent.izuna_ex2_1.desc=_+1:_ 닌자 망토 사용 직후 투척 무기 투척에 턴을 소모하지 않습니다. _15턴_의 재사용 대기 시간이 있습니다.\n\n_+2:_ 닌자 망토 사용 직후 투척 무기 투척에 턴을 소모하지 않습니다. _10턴_의 재사용 대기 시간이 있습니다.\n\n_+3:_ 닌자 망토 사용 직후 투척 무기 투척에 턴을 소모하지 않습니다. _5턴_의 재사용 대기 시간이 있습니다.
actors.hero.talent.izuna_ex2_2.title=순신의 술
actors.hero.talent.izuna_ex2_2.desc=_+1:_ 능력으로 적을 처치하면 _1턴_의 투명화와 신속을 얻습니다.\n\n_+2:_ 능력으로 적을 처치하면 _2턴_의 투명화와 신속을 얻습니다.\n\n_+3:_ 능력으로 적을 처치하면 _3턴_의 투명화와 신속을 얻습니다.
actors.hero.talent.izuna_ex2_3.title=투척 무기 마스터
actors.hero.talent.izuna_ex2_3.desc=_+1:_ 투척 무기의 강화 수치가 암살 쿠나이의 강화 수치만큼 증가합니다. 최대 _+2_까지 적용됩니다.\n\n_+2:_ 투척 무기의 강화 수치가 암살 쿠나이의 강화 수치만큼 증가합니다. 최대 _+4_까지 적용됩니다.\n\n_+3:_ 투척 무기의 강화 수치가 암살 쿠나이의 강화 수치만큼 증가합니다. 최대 _+6_까지 적용됩니다.

actors.hero.talent.izuna_armor1_1.title=재빠른 이탈
actors.hero.talent.izuna_armor1_1.desc=_+1:_ 능력 사용 시 _1턴_의 신속과 초신속을 얻습니다.\n\n_+2:_ 능력 사용 시 _2턴_의 신속과 초신속을 얻습니다.\n\n_+3:_ 능력 사용 시 _3턴_의 신속과 초신속을 얻습니다.\n\n_+4:_ 능력 사용 시 _4턴_의 신속과 초신속을 얻습니다.
actors.hero.talent.izuna_armor1_2.title=대용량 연막탄
actors.hero.talent.izuna_armor1_2.desc=_+1:_ 연막의 양이 _25%_ 증가합니다.\n\n_+2:_ 연막의 양이 _50%_ 증가합니다.\n\n_+3:_ 연막의 양이 _75%_ 증가합니다.\n\n_+4:_ 연막의 양이 _100%_ 증가합니다.
actors.hero.talent.izuna_armor1_3.title=밧줄 함정
actors.hero.talent.izuna_armor1_3.desc=_+1:_ 능력 사용 시 주변 3x3타일 범위에 있는 모든 적들을 _2턴_ 동안 속박시킵니다.\n\n_+2:_ 능력 사용 시 주변 3x3타일 범위에 있는 모든 적들을 _4턴_ 동안 속박시킵니다.\n\n_+3:_ 능력 사용 시 주변 3x3타일 범위에 있는 모든 적들을 _6턴_ 동안 속박시킵니다.\n\n_+4:_ 능력 사용 시 주변 3x3타일 범위에 있는 모든 적들을 _8턴_ 동안 속박시킵니다.

actors.hero.talent.izuna_armor2_1.title=가속력 증강
actors.hero.talent.izuna_armor2_1.desc=_+1:_ 능력을 사용할 수 있는 최대 거리가 _1 타일_ 증가합니다.\n\n_+2:_ 능력을 사용할 수 있는 최대 거리가 _2 타일_ 증가합니다.\n\n_+3:_ 능력을 사용할 수 있는 최대 거리가 _3 타일_ 증가합니다.\n\n_+4:_ 능력을 사용할 수 있는 최대 거리가 _4 타일_ 증가합니다.
actors.hero.talent.izuna_armor2_2.title=완벽한 암살
actors.hero.talent.izuna_armor2_2.desc=_+1:_ 능력 사용 후 _1턴_ 이내에 적을 처치하는 공격이 턴을 소모하지 않습니다.\n\n_+2:_ 능력 사용 후 _2턴_ 이내에 적을 처치하는 공격이 턴을 소모하지 않습니다.\n\n_+3:_ 능력 사용 후 _3턴_ 이내에 적을 처치하는 공격이 턴을 소모하지 않습니다.\n\n_+4:_ 능력 사용 후 _4턴_ 이내에 적을 처치하는 공격이 턴을 소모하지 않습니다.
actors.hero.talent.izuna_armor2_3.title=연속 이동
actors.hero.talent.izuna_armor2_3.desc=_+1:_ 능력 사용 후 5턴 이내에 능력을 다시 사용하면 _15%_ 적은 충전량을 소모합니다.\n\n_+2:_ 능력 사용 후 5턴 이내에 능력을 다시 사용하면 _28%_ 적은 충전량을 소모합니다.\n\n_+3:_ 능력 사용 후 5턴 이내에 능력을 다시 사용하면 _39%_ 적은 충전량을 소모합니다.\n\n_+4:_ 능력 사용 후 5턴 이내에 능력을 다시 사용하면 _48%_ 적은 충전량을 소모합니다.

actors.hero.talent.izuna_armor3_1.title=연쇄 번개
actors.hero.talent.izuna_armor3_1.desc=_+1:_ 뇌전이 명중하면 입힌 피해의 _20%_만큼의 피해를 입히는 연쇄 번개를 생성합니다.\n\n_+2:_ 뇌전이 명중하면 입힌 피해의 _40%_만큼의 피해를 입히는 연쇄 번개를 생성합니다.\n\n_+3:_ 뇌전이 명중하면 입힌 피해의 _60%_만큼의 피해를 입히는 연쇄 번개를 생성합니다.\n\n_+4:_ 뇌전이 명중하면 입힌 피해의 _80%_만큼의 피해를 입히는 연쇄 번개를 생성합니다.
actors.hero.talent.izuna_armor3_2.title=고압 전류
actors.hero.talent.izuna_armor3_2.desc=_+1:_ 뇌전의 피해량이 _25%_ 증가합니다.\n\n_+2:_ 뇌전의 피해량이 _50%_ 증가합니다.\n\n_+3:_ 뇌전의 피해량이 _75%_ 증가합니다.\n\n_+4:_ 뇌전의 피해량이 _100%_ 증가합니다.
actors.hero.talent.izuna_armor3_3.title=낙뢰
actors.hero.talent.izuna_armor3_3.desc=_+1:_ 뇌전으로 직접 피해를 입힌 적에게 _25%_ 확률로 불구 대신 마비를 부여합니다.\n\n_+2:_ 뇌전으로 직접 피해를 입힌 적에게 _50%_ 확률로 불구 대신 마비를 부여합니다.\n\n_+3:_ 뇌전으로 직접 피해를 입힌 적에게 _75%_ 확률로 불구 대신 마비를 부여합니다.\n\n_+4:_ 뇌전으로 직접 피해를 입힌 적에게 _100%_ 확률로 불구 대신 마비를 부여합니다.

actors.hero.abilities.izuna.smokespread.name=연막 살포
actors.hero.abilities.izuna.smokespread.short_desc=이즈나는 주변에 _연막을 뿌려_ 적들의 시야를 가릴 수 있습니다.
actors.hero.abilities.izuna.smokespread.desc=이즈나는 주변 3x3 지역에 연막을 뿌려 적들의 시야를 가릴 수 있습니다.
actors.hero.abilities.izuna.blink.name=이즈나류 비기! 고속이동의 술!
actors.hero.abilities.izuna.blink.short_desc=이즈나는 짧은 거리를 _턴 소모 없이 순간 이동_할 수 있습니다.
actors.hero.abilities.izuna.blink.desc=이즈나는 시야 내에 있는 최대 3타일 거리의 위치에 턴 소모 없이 즉시 이동할 수 있습니다. 투명화를 해제하지 않습니다.
actors.hero.abilities.izuna.blink$perfectassassination.name=완벽한 암살
actors.hero.abilities.izuna.blink$perfectassassination.desc=다음 _%s_턴 내에 적을 처치하는 공격 1회가 턴을 소모하지 않습니다.
actors.hero.abilities.izuna.throwingthunder.name=뇌전 날리기
actors.hero.abilities.izuna.throwingthunder.short_desc=이즈나는 반드시 명중하는 _뇌전_을 날려 적에게 큰 피해를 입힐 수 있습니다.
actors.hero.abilities.izuna.throwingthunder.desc=이즈나는 지정한 위치에 반드시 명중하는 뇌전을 날려, 그 위치에 있는 적에게 20-60의 피해를 입히고 10턴의 불구를 부여합니다.



###npcs
actors.mobs.npcs.blacksmith.name=체리노
actors.mobs.npcs.blacksmith.intro_quest_all=이리 와 봐라! 내 명령할 게 있노라.
actors.mobs.npcs.blacksmith.intro_quest_start=저기 저 사다리 보이지? 이 곡괭이를 가지고 _청휘석을 좀 캐 오너라. 40개_ 안 채워 오면 숙청이니까! 아래에 있는 벽은 부술 수 있으니, 잘 해 보던지.\n\n뭐, 보수? 이... 이 녀석이...\n\n...좋아. 내 특별히 우리 붉은겨울 사무국의 대장간을 사용할 수 있게 해 주겠노라.
actors.mobs.npcs.blacksmith.intro_quest_crystal=이 몸이 제군의 임무 성공을 위해 친히 힌트를 주도록 하지. 저 밑에는 수정들이 잔뜩 자라나 있는데, 반짝여서 좋아 보여도 약해 빠져서 쓸모는 없는데다, 위협적이기까지 하단 말이지. 스스로를 지키려고 이상한 마법 같은 것도 쓴다니까. 흠, 흠. 아무튼, 그러니까 _어디에서 채굴하든 간에, 긴장을 늦추지 않는 게 신변에 좋을 것이야_. 그렇지 않으면 그것들의 주의를 끌 테니까.\n\n광산 어딘가에 커다란 수정도 있을 텐데, 그건 훨씬 위험하니까, 그걸 부술 거라면 준비 단단히 하고 가거라. 일단 부수기만 한다면 다른 수정들을 느려지게 만드니까, 만약 그걸 부순다면 내 친히 보수를 추가로 주도록 하지.
actors.mobs.npcs.blacksmith.intro_quest_fungi=조심하는 게 좋을 거야. 그 광산은 너 같이 작은 인간한테는 위협적이니까. 거기엔 일종의 버섯 괴물 같은 게 자라나고 있어. 심지어 그건 버섯 포탑 같은 게 달려 있어서, 들키면 상당히 치명적일 거야. 그 놈들은 일어날 순 없어도, 적어도 널 추적하는건 가능하니까, 살고 싶다면 가능한 한 그 놈들의 _시야 밖에 있는 게 좋을 거라고_.\n\n만약 어떻게든 거기 있는 _가장 큰 버섯_을 해치워 준다면, 보수를 더 주도록 하지. 다만 진짜 힘들긴 할 거야. 그건 벽 안에 숨겨진 수많은 균사 마디에 연결되어 있어서, 실제로 피해를 주려면 그것들을 싸그리 다 부숴 버려야 할 거라고.
actors.mobs.npcs.blacksmith.intro_quest_gnoll=이 몸이 제군의 임무 성공을 위해 친히 힌트를 주도록 하지. 몇몇 놀 녀석들이 내 청휘석에 미친 나머지 거기를 부숴 버리기 시작했다. 단순하고 멍청한 녀석들이라서, 그런 식으로 채굴하고 있으니 온갖 붕괴란 붕괴는 다 일으키고 있지. 그것들 사이에서 청휘석을 캐 와야 할 게야. 그러니 _최근에 떨어진 바위들을 유심히 살펴 보거라_.\n\n그리고 그 놈들 중에 한 놈이 유독 말썽인 것 같구나. 아마도 _흙점쟁이 주술사_나 그런 비슷한 녀석이겠지. 만약 그 녀석을 찾아내서 처리해 준다면, 내 친히 보수를 추가로 주도록 하지. 하지만 장담하건대 그 놈도 쉽게 죽어 주진 않을 게야.
actors.mobs.npcs.blacksmith.reminder=빨리 내려가서 청휘석 가져 오란 말이야! 느리면 숙청이야, 숙청!
actors.mobs.npcs.blacksmith.lost_pick=곡괭이 어따 팔아먹고 온 거야?! 빨리 안 찾아 오면 숙청이야!
actors.mobs.npcs.blacksmith.quest_start_prompt=준비는 끝났나? 그 가방에 청휘석 가져올 공간은 확실하게 남겨 두거라.\n\n_딱 한 번만 내려보내 줄 거니까!_
actors.mobs.npcs.blacksmith.enter_yes=준비됐다
actors.mobs.npcs.blacksmith.enter_no=아직이다
actors.mobs.npcs.blacksmith.exit_warn_none=벌써 끝낸 건가? 일처리가 빠르군. 역시 내 안목이... 뭐야, 청휘석을 하나도 가지고 있질 않잖아! _40개_ 안 가져 오면 숙청이야, 숙청!\n\n_포기하겠다면 별 수 없지만, 다시 들여보내주진 않을 거니까!_
actors.mobs.npcs.blacksmith.exit_warn_low=벌써 끝낸 건가? 그렇게 많은 청휘석을 가지고 있는 것처럼 보이진 않는데. _40개_ 채워 오란 말이야!\n\n_포기하겠다면 별 수 없지만, 다시 들여보내주진 않을 거니까!_
actors.mobs.npcs.blacksmith.exit_warn_med=끝났나? 적어도 청휘석을 좀 가지고 있는 것 같긴 하지만, 아직 광산엔 확실히 많은 청휘석이 남아 있을 텐데... 그래도 _40개_는 가져 오란 말이다!\n\n_포기하겠다면 별 수 없지만, 다시 들여보내주진 않을 거니까!_
actors.mobs.npcs.blacksmith.exit_warn_high=끝났나? 지금도 꽤 많은 청휘석을 가지고 온 것 같지만, 그래도 _40개_는 가져올 수 있을 것이거늘...\n\n_포기하겠다면 별 수 없지만, 다시 들여보내주진 않을 거니까!_
actors.mobs.npcs.blacksmith.exit_warn_full=끝났나? 히히히... 좋아, 좋아. 가방이 청휘석으로 가득하구만. 나오기 전에 빠뜨린 거 없나 잘 확인하거라.\n\n_올라오면 다시 안 들여보내 줄 거니까 확인 잘 해!_
actors.mobs.npcs.blacksmith.exit_warn_crystal=그 거대 수정이 여전히 아래에 남아 있잖아! 그걸 부수면 보수를 더 주겠어.
actors.mobs.npcs.blacksmith.exit_warn_fungi=그 거대 버섯이 여전히 아래에 남아 있어. 그걸 처치하고 오면 보수를 더 주지.
actors.mobs.npcs.blacksmith.exit_warn_gnoll=놀 흙점쟁이가 여전히 아래에 남아 있잖아! 그걸 처리하고 오면 보수를 더 주겠어.
actors.mobs.npcs.blacksmith.exit_yes=끝났다
actors.mobs.npcs.blacksmith.exit_no=아직이다
actors.mobs.npcs.blacksmith.get_lost=볼 일 다 봤으면 이만 물러나거라!
actors.mobs.npcs.blacksmith.entrance_blocked=내려가는 길이 막혀 있다.
actors.mobs.npcs.blacksmith.cant_enter_old=그 지역은 이번 게임에서는 더 이상 갈 수 없습니다. 새로운 게임을 시작해 새로운 퀘스트를 시도해 보세요!
actors.mobs.npcs.blacksmith.def_verb="그러지 않는 편이 좋을 것이다!"
actors.mobs.npcs.blacksmith.desc=붉은겨울 학원 서기장인 체리노입니다. 숱한 쿠데타 위기에서도 수많은 숙청을 통해 권력을 유지하고 있는 무시무시한 인물이지만, 단지 총구를 겨누고 그녀가 "숙청!"이라고 외치면 숙청되는 것이기에, 사실 당신에게는 별 소용이 없습니다.
actors.mobs.npcs.blacksmith.reminder_crystal=가능한 한 많은 양의 청휘석을 가져오란 말이야! ...하는 김에 커다란 크리스탈도 부수면 좋고.
actors.mobs.npcs.blacksmith.reminder_gnoll=가능한 한 많은 양의 청휘석을 가져오란 말이야! ...하는 김에 놀 흙점쟁이도 처리하면 좋고.
actors.mobs.npcs.blacksmith.reminder_fungi=가능한 한 많은 양의 청휘석을 가져오란 말이야! ...하는 김에 거대 버섯도 처리하면 좋고.

actors.mobs.npcs.shopkeeper.name=소라
actors.mobs.npcs.shopkeeper.thief=앗, 도둑이닷!
actors.mobs.npcs.shopkeeper.warn=저기, 이렇게 난동을 피우시면 곤란해요...!
actors.mobs.npcs.shopkeeper.yell=꺄아악!
actors.mobs.npcs.shopkeeper.flee=소라가 정신없이 도망쳤다.
actors.mobs.npcs.shopkeeper.flee_warning=소라가 경비 호출 버튼을 누르고 도망쳤다!
actors.mobs.npcs.shopkeeper.sell=판매할 아이템을 선택하세요
actors.mobs.npcs.shopkeeper.talk=이야기한다
actors.mobs.npcs.shopkeeper.buyback=소라: "여기, 돌려 드릴게요. 다음에는 좀 더 신중하게 판매해 주세요..."
actors.mobs.npcs.shopkeeper.talk_prison_intro=(휴대폰을 보며 성실하게 근무 태만 중이다.)
actors.mobs.npcs.shopkeeper.talk_prison_aris=앗, 안녕하세요, 아리스 씨! 엠블럼 예쁘네요! 밀레니엄 심볼이 잘 어울려요.
actors.mobs.npcs.shopkeeper.talk_prison_nonomi=아, 안녕하세요, 노노미 씨! 헉, 그 카드는......
actors.mobs.npcs.shopkeeper.talk_prison_miyako=오, 안녕하세요, 미야코 씨! 혹시 일 도와주러 오셨나요? 아, 아니구나...
actors.mobs.npcs.shopkeeper.talk_prison_hoshino=아, 안녕하ㅅ... 앗, 여기서 주무시면 안 돼요, 호시노 씨!
actors.mobs.npcs.shopkeeper.talk_prison_shiroko=어서 오세... 헉! (벌벌벌) 여기는 비, 비싼 게 (덜덜덜) 벼벼벼별로 없으니... 다, 다른 곳을...
actors.mobs.npcs.shopkeeper.talk_prison_noa=(황급히 휴대폰을 숨기며) 어, 어서 오세요! 무엇이 필요하신가요, 노아 씨?
actors.mobs.npcs.shopkeeper.talk_prison_miyu=심심해... 앗, 미유 씨, 언제부터 거기에?
actors.mobs.npcs.shopkeeper.talk_prison_yuzu=앗, 유즈 씨! 반가워요. 사이버 구매 말고 여기 상품 쪽도 구매해 주세요.
actors.mobs.npcs.shopkeeper.talk_prison_izuna=아앗, 이즈나 씨! 가게를 헤집고 다니시면 곤란해요! 꺄악!
actors.mobs.npcs.shopkeeper.talk_caves=아, 어서 오세요, 또 보네요! 좀 둘러보고 가세요.
actors.mobs.npcs.shopkeeper.talk_city=앗, 여기까지 오셨군요! 여기 분명 필요한 게 있을 거예요.
actors.mobs.npcs.shopkeeper.talk_halls=앗, 안녕하세요! 여기가 마지막 편의점이에요. 필요한 게 있다면 미리 준비하는 게 좋을 거예요.
actors.mobs.npcs.shopkeeper.talk_ascent=도대체 뭘 하신 건가요? 폭격이 엄청나게 떨어지고 있어요! 빨리 대피하세요!
actors.mobs.npcs.shopkeeper.desc=연방수사부 샬레 건물에 입점한 편의점 <엔젤 24>의 아르바이트생입니다. 평소에는 보통 한가하기 때문에 농땡이를 자주 피우는 편입니다.

actors.mobs.fox.fox.stats_desc=FOX 소대원들은 공포, 두려움, 광란, 목표로 지정됨, 졸림 디버프에 면역이며, 아군으로 만들 수 없습니다. FOX 소대는 서로 뭉쳐 다니며, 적을 찾을 수 없을 때에는 처음 등장했던 위치로 돌아가려 할 것입니다.
actors.mobs.fox.yukino.name=유키노
actors.mobs.fox.yukino.desc=SRT 특수학원 3학년, FOX 소대의 소대장 FOX 1 - 시치도 유키노입니다.\n\n유키노는 _AR_을 착용하고 있습니다.\n유키노는 _원거리 공격_이 가능하며, _근접_했을 때 역시도 공격이 가능합니다.
actors.mobs.fox.yukino.show=FOX 1, 작전 준비 완료. 시작하겠습니다.
actors.mobs.fox.yukino.hit=FOX 1, 공격받고 있음을 알림. 지원이 필요합니다.
actors.mobs.fox.yukino.die=...FOX 1, ...후퇴합니다.
actors.mobs.fox.yukino.kill=한 번 쓸모를 잃은 무기는 폐기되어야 마땅합니다.
actors.mobs.fox.yukino.aggro=FOX 1, 전방에 적 발견. 추적합니다.
actors.mobs.fox.niko.name=니코
actors.mobs.fox.niko.desc=SRT 특수학원 3학년, FOX 소대의 FOX 2 - 요시노 니코입니다.\n\n니코는 _SG_를 착용하고 있습니다.\n니코는 _근거리 공격_만 가능합니다.\n니코는 _정확성_과 _공격 피해량_이 높습니다.\n니코는 _매우 빠르게_ 움직일 수 있습니다.\n니코는 비교적 _체력_이 적습니다.
actors.mobs.fox.niko.show=FOX 2, 진입합니다.
actors.mobs.fox.niko.hit=어머나, 듣던 대로 정말 위험하네요. 조심해야겠는걸...
actors.mobs.fox.niko.die=작전... 불능...
actors.mobs.fox.niko.kill=FOX 2, 임무를 완수했습니다.
actors.mobs.fox.niko.aggro=FOX 2, 적을 발견했습니다.
actors.mobs.fox.kurumi.name=쿠루미
actors.mobs.fox.kurumi.desc=SRT 특수학원 3학년, FOX 소대의 FOX 3 - 타카쿠라 쿠루미입니다.\n\n쿠루미는 _SMG_를 착용하고 있지만, _발사하지는 않는 것 같습니다._\n쿠루미는 _근거리 공격_만 가능합니다.\n쿠루미는 _회피_와 _공격 피해량_이 낮습니다.\n쿠루미는 _체력_과 _방어력_이 비교적 높습니다.
actors.mobs.fox.kurumi.show=FOX 3, 돌입!
actors.mobs.fox.kurumi.hit=정말로 해 보겠다는 거지!
actors.mobs.fox.kurumi.die=이럴... 수가...
actors.mobs.fox.kurumi.kill=특수부대의 힘을 조금은 깨달았으려나?
actors.mobs.fox.kurumi.aggro=FOX 3, 적을 발견했어! 이 쪽이야!
actors.mobs.fox.otogi.name=오토기
actors.mobs.fox.otogi.desc=SRT 특수학원 3학년, FOX 소대의 FOX 4 - 텐진야마 오토기입니다.\n\n오토기는 _SR_을 착용하고 있습니다.\n오토기는 _원거리 공격_만 가능합니다.\n오토기는 _정확성_과 _공격 피해량_이 높습니다.\n오토기는 비교적 _체력_이 적습니다.
actors.mobs.fox.otogi.show=FOX 4, 진입.
actors.mobs.fox.otogi.hit=윽, 공격당하고 있다! 지원 바람!
actors.mobs.fox.otogi.die=일단 물러나야겠어...
actors.mobs.fox.otogi.kill=FOX 소대의 승리입니다! 예이~
actors.mobs.fox.otogi.aggro=FOX 4, 저 쪽에 적이 있다!

###buffs
actors.buffs.armorbreak.name=방어력 감소
actors.buffs.armorbreak.desc=이 대상의 방어력이 감소하여, 더 많은 물리 피해를 입고 있습니다.\n\n방어력 감소량: %1$d.\n남은 턴: %2$s.

actors.hero.talent$instantfocusingtracker.name=순간 집중
actors.hero.talent$instantfocusingtracker.desc=다음 번 일반 근접 공격은 추가 명중률을 얻습니다.\n\n남은 턴: %s.

actors.buffs.swiftmovement.action_name=재빠른 움직임

actors.buffs.bankrobber.action_name=총기 난사

actors.hero.talent$firstaidcooldown.name=재사용 대기 시간: 응급 치료
actors.hero.talent$firstaidcooldown.desc=당신은 최근에 이 특성을 사용하여, 다시 사용하는 데에 시간이 필요합니다.\n\n남은 턴: %s.

actors.hero.talent$perfectprecisiontracker.name=완벽한 정밀성
actors.hero.talent$perfectprecisiontracker.desc=다음 번 탄환 공격은 추가 명중률을 얻습니다.\n\n남은 턴: %s.

actors.buffs.doublebarrelmark.name=더블 배럴
actors.buffs.doublebarrelmark.desc=방금 총을 맞춘 적에게 집중하고 있어요. 원한다면 홀스터에 있는 권총을 재빨리 꺼내서 쏠 수도 있지만, 평소같은 피해를 주진 못 할 거예요.\n\n권총을 쏘기 전에 탄창에 탄환이 남아 있는지 확인하세요.
actors.buffs.doublebarrelmark.action_name=보조 무기 발사!

actors.buffs.conversation.action_name=떠들기
actors.buffs.conversation.prompt=말을 걸 대상을 선택하세요

actors.buffs.snipe.action_name=쌍안경 정찰
actors.buffs.snipe.prompt=정찰할 위치를 선택하세요
actors.buffs.snipe$scopedarea.name=쌍안경 정찰
actors.buffs.snipe$scopedarea.desc=......앗, 집중 중이에요...\n\n지금 제가 저 위치를 주시하고 있어요. 지금 저 위치에 적이 보이면 아주 정확하게 사격할 수 있고... 장애물도 피해서 맞출 수 있어요.\n\n앞으로 _%s턴_ 정도는 더 볼 수 있을 거예요...

actors.buffs.questenemy.name=퀘스트 대상
actors.buffs.questenemy.desc=이 적은 유즈의 퀘스트 대상으로 지정되었으며, 처치 시 두 배의 경험치와 추가 골드를 제공할 것입니다.
actors.buffs.questenemy.warn=어딘가에 퀘스트 대상 적이 출현한 것 같다.

actors.buffs.yuzustatus$uzqmode.name=UZQ 모드
actors.buffs.yuzustatus$uzqmode.desc=...\n\n(아무래도 초 집중 상태인 것 같다. 다음 _%s회_의 공격을 반드시 회피할 수 있을 것이다.)
actors.buffs.yuzustatus$certaincritbuff.name=확정 치명타
actors.buffs.yuzustatus$certaincritbuff.desc=지금 운 따위는 아무런 문제가 되지 않아요!\n\n다음 _%s_회의 공격이 반드시 치명타가 될 거예요.

actors.buffs.avantgardekunbuff.action_onboard=아방가르드군 탑승!
actors.buffs.avantgardekunbuff.action_name=아방가르드군 조작
actors.buffs.avantgardekunbuff.prompt=위치를 선택하세요
actors.buffs.avantgardekunbuff$onboard.name=아방가르드군 탑승!
actors.buffs.avantgardekunbuff$onboard.desc=으으... 이런 로봇을 조작하게 될 줄은 몰랐는데... 아, 여기 조작법이 적혀 있네요.\n\n_원거리_에 능력을 사용하면 그 위치에 소지 중인 총기를 최대 3정까지 한 발씩 발사할 수 있어요.\n_근거리_에 능력을 사용하면 적을 밀쳐내고 소지 중인 모든 총기를 재장전할 거예요.\n_제가 있는 위치_에 능력을 사용하면 로봇에서 내릴 수 있어요.\n\n지금 상태 UI에 현재 내구력은 _%1$d/%2$d_라고 나와 있네요.
actors.buffs.avantgardekunbuff$robotcooldown.name=재사용 대기 시간: 아방가르드군
actors.buffs.avantgardekunbuff$robotcooldown.desc=로봇이 폭발해 버려서, 다시 사용할 수 있을 때까지 기다려야 해요.\n\n로봇은 _%s_턴 후면 준비될 거예요.

actors.hero.talent$safetytriggercooldown.name=재사용 대기 시간: 안전 장치
actors.hero.talent$safetytriggercooldown.desc=당신은 최근에 이 특성을 사용하여, 다시 사용하는 데에 시간이 필요합니다.\n\n남은 턴: %s.

