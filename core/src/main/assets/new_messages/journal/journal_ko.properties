journal.document.intros.sewers.title=밀레니엄 폐허 하수구
journal.document.intros.sewers.body=밀레니엄 폐허는 어째서인지 총학생회가 출입을 금지하고 있는 곳입니다.\n\n폐허 밑 하수구의 무해한 생명체들은 던전 아래에서 올라오는 암흑의 기운 때문에 점점 더 위험해지고 있지만, 총학생회에서는 학생들의 안전 보장이라는 목적 하나만 가지고 이 곳의 출입을 금지한 걸까요?\n\n이곳은 위험한 장소긴 하지만, 그나마 사악한 기운은 강하지 않습니다.